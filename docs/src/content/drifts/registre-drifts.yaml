# Registre des drifts atlas — source de vérité unique (ADR 0056).
#
# Un « drift » = un écart révélé à l'EXÉCUTION (run e2e) que le lint et les tests
# ne voyaient pas. Un « piège de revue » = un bug subtil trouvé en revue de code
# (souvent adversariale), pas au run. Les deux sont consignés ici, distingués par
# le champ `nature`. Ce fichier est LE catalogue indexé ; les pages de synthèse y
# RÉFÈRENT par id, sans dupliquer le détail.
#
# Champs par entrée :
#   id        : Dnn (stable, citable)
#   campagne  : chantier/issue qui l'a révélé
#   nature    : drift-e2e (révélé au run) | piege-revue (trouvé en revue de code)
#   portee    : code (défaut du livrable, vaut pour la prod) | env (artefact d'un
#               banc précis) | harnais (outillage de test, pas le livrable)
#   symptome  : ce qu'on a vu
#   cause     : la cause racine
#   correctif : ce qui a été fait
#   statut    : corrige | caduc (contexte abandonné) | ouvert | en-cours
#               (ouvert/en-cours = non clos → exige une issue de suivi, ADR 0071)
#
# Une entrée se rédige à la main, OU se promeut d'un brouillon capturé à chaud au
# point d'échec d'un run via `pnpm drift:new` (ADR 0080). Le jugement « marquant »
# reste humain : le run ne consigne jamais rien tout seul.
#
# Couverture : D1–D23 (pipeline OpenAlex/Dagster + transformations dbt, juin 2026).

- id: D1
  campagne: "pipeline OpenAlex/Dagster — premier run sur le banc"
  nature: drift-e2e
  portee: code
  symptome: >-
    Au premier run Dagster sur le banc, le K8sRunLauncher échoue :
    « Value in Mapping mismatches expected type for key dagster/image … Got None ».
  cause: >-
    La code-location ne déclarait pas la variable d'environnement
    DAGSTER_CURRENT_IMAGE ; le run-launcher ne sait alors pas quelle image lancer
    pour les pods de run. Invisible aux tests unitaires (qui ne lancent pas de run K8s).
  correctif: >-
    DAGSTER_CURRENT_IMAGE = image de la code-location, déclarée dans le Deployment
    de la code-location.
  statut: corrige

- id: D2
  campagne: "pipeline OpenAlex/Dagster — sync rclone, watermark"
  nature: drift-e2e
  portee: code
  symptome: >-
    Le bootstrap du watermark ne se déclenchait jamais : « rclone cat » d'un objet
    inexistant renvoie un code de retour 0 (pas d'erreur) avec une sortie standard vide.
  cause: >-
    Comportement non-évident de l'outil : l'absence d'objet n'est pas un code d'erreur.
    Le code se fiait au code de retour. Révélé en testant contre un MinIO local.
  correctif: >-
    read_watermark traite une sortie vide ou un JSON invalide comme None (premier run),
    au lieu de se fier au code de retour.
  statut: corrige

- id: D3
  campagne: "pipeline OpenAlex/Dagster — listing des partitions"
  nature: drift-e2e
  portee: code
  symptome: >-
    « rclone lsf --recursive » sur data/works (≈ 250 M fichiers) bloque le run des
    minutes/heures ; le test passait, le run était inexploitable.
  cause: >-
    Listing récursif prohibitif sur une arborescence massive. L'écart n'apparaît qu'à
    l'échelle réelle de la source, jamais sur les fixtures de test.
  correctif: >-
    _list_partitions liste par partition au premier niveau (--dirs-only, sans
    --recursive) ; le volume est borné par partition.
  statut: corrige

- id: D4
  campagne: "pipeline OpenAlex/Dagster — lenteur du banc (cluster#264, #268)"
  nature: drift-e2e
  portee: env
  symptome: >-
    Un « rclone copy » d'un fichier de 915 Ko qui prend 1,2 s en local prend plusieurs
    minutes dans un pod de run sur le banc.
  cause: >-
    Cause réelle (diagnostic cluster #268) : SeaweedFS épuisait ses slots de volume
    (-volume.max=0 → plafonné à 13, tous saturés → « Not enough data nodes found ») ;
    toute écriture d'une nouvelle collection restait bloquée en retries TCP. L'hypothèse
    initiale (pods BestEffort throttlés) était FAUSSE : l'egress était bon, le throttling
    n'existait pas.
  correctif: >-
    Corrigé côté cluster (#268 : -volume.max=100 + volumeSizeLimitMB=1024) — upload S3
    revenu à 1 s. Décision atlas : borner quand même les runs dbt par prudence (DuckDB
    gourmand en RAM) via dagster-k8s/config — choix de prudence, pas correctif de throttling.
  statut: corrige

- id: D5
  campagne: "pipeline OpenAlex/Dagster — source merged_ids (ADR 0054)"
  nature: drift-e2e
  portee: code
  symptome: >-
    Le mécanisme merged_ids attendu sous s3://openalex/data/merged_ids/ est introuvable.
  cause: >-
    merged_ids vit en réalité sous legacy-data/ :
    s3://openalex/legacy-data/merged_ids/<entité>/YYYY-MM-DD.csv.gz (colonnes
    merge_date,id,merge_into_id). L'ADR 0054 supposait data/merged_ids/. Hypothèse fausse
    sur une source externe, révélée en sondant la vraie source.
  correctif: >-
    Chemin corrigé vers legacy-data/merged_ids/ ; ADR 0054 mis à jour.
  statut: corrige

- id: D6
  campagne: "déploiement Argo CD — Application atlas-workflows"
  nature: drift-e2e
  portee: env
  symptome: >-
    L'Application affiche « Synced/Healthy » mais les ressources attendues sont absentes
    du cluster.
  cause: >-
    L'Application réconcilie path:"." en mode NON récursif : les manifestes rangés dans un
    sous-dossier sont ignorés. Révélé au déploiement (sync vert, ressources manquantes).
  correctif: >-
    Manifestes placés à la racine du dépôt Gitea réconcilié.
  statut: corrige

- id: D7
  campagne: "revue adversariale 2.2 — watermark/merged_ids (finding HIGH)"
  nature: piege-revue
  portee: code
  symptome: >-
    Perte silencieuse de fichiers merged_ids : quand max_merged_files tronque un lot, le
    watermark dépasse les fichiers non copiés, qui ne sont alors jamais rapatriés.
  cause: >-
    Un watermark unique partagé entre les partitions et les merged_ids. Avancé sur la date
    des partitions, il « saute » des merged_ids non encore copiés. Trouvé par revue
    adversariale (42 findings, 16 confirmés), pas par les tests.
  correctif: >-
    Watermark merged_ids indépendant (clé merged_ids:<entité>), qui n'avance qu'aux
    fichiers réellement copiés.
  statut: corrige

- id: D8
  campagne: "pipeline OpenAlex/Dagster — comparaison de watermark"
  nature: piege-revue
  portee: code
  symptome: >-
    Le filtre incrémental par updated_date est cassé : toutes les partitions passent le filtre.
  cause: >-
    Comparaison de « updated_date=2019-07-01 » à une date nue « 2020-01-01 » : toujours vraie,
    car 'u' > '2' en ASCII. Trouvé en débogage.
  correctif: >-
    _partition_date extrait et valide la date (YYYY-MM-DD) avant toute comparaison.
  statut: corrige

- id: D9
  campagne: "pipeline OpenAlex/Dagster — chargement de la code-location"
  nature: drift-e2e
  portee: code
  symptome: >-
    Dagster ne résout pas le type de Config d'un asset (« Unable to resolve config type »).
  cause: >-
    « from __future__ import annotations » (PEP 563) transforme les annotations en chaînes ;
    Dagster ne peut plus introspecter le type de config à l'exécution. Révélé au chargement
    de la code-location, pas au lint.
  correctif: >-
    Retrait de « from __future__ import annotations » des modules d'assets Dagster.
  statut: corrige

- id: D10
  campagne: "pipeline OpenAlex/Dagster — dépendance dagster-dbt (étape 3.1)"
  nature: piege-revue
  portee: code
  symptome: >-
    La résolution des dépendances échoue : « no version of dagster-dbt==1.13.7 ».
  cause: >-
    Contrairement à dagster (1.13.7), la librairie dagster-dbt suit une numérotation
    propre 0.YY.Z. La correspondance est : dagster-dbt 0.YY.Z épingle dagster==1.(YY-14).Z.
    Pour dagster 1.13.7 il faut donc dagster-dbt==0.29.7 (et non 1.13.7). Découvert en
    sondant la résolution uv avant de coder l'étape 3.1.
  correctif: >-
    Épingler dagster-dbt==0.29.7 (résout dagster==1.13.7). Les paquets de l'écosystème
    Dagster en 0.YY suivent cette règle (à vérifier au prochain bump de dagster).
  statut: corrige

- id: D11
  campagne: "modèles dbt staging→curated (étape 3.2)"
  nature: piege-revue
  portee: code
  symptome: >-
    Une colonne fantôme « updated_date » (type DATE) apparaît dans les modèles staging
    alors qu'elle n'existe pas dans le JSON brut.
  cause: >-
    read_json_auto active le partitionnement Hive par défaut : la date du chemin
    (updated_date=YYYY-MM-DD/) est injectée comme colonne. Un SELECT * la propagerait.
    Révélé en sondant le schéma inféré sur les fixtures.
  correctif: >-
    hive_partitioning=false sur les sources works/authors + projection EXPLICITE des
    colonnes en staging (jamais SELECT *). La période curated vient des vars Dagster, pas
    du chemin brut.
  statut: corrige

- id: D12
  campagne: "modèles dbt staging→curated (étape 3.2)"
  nature: piege-revue
  portee: code
  symptome: >-
    Un glob « merged_ids/works/*.csv.gz » raterait le fichier réellement présent.
  cause: >-
    Le fichier merged_ids sur disque s'appelle « 2022-07-15.gz » (CSV gzippé sans infixe
    .csv), pas « 2022-07-15.csv.gz ». Hypothèse de nommage fausse, vérifiée sur le fixture.
  correctif: >-
    Glob « merged_ids/works/*.gz » (pas « *.csv.gz ») + lecture forcée read_csv_auto.
  statut: corrige

- id: D13
  campagne: "modèles dbt staging→curated (étape 3.2)"
  nature: drift-e2e
  portee: code
  symptome: >-
    Le Parquet curated est introuvable au glob « run=<id>/**/*.parquet » après un
    « dbt build » pourtant réussi.
  cause: >-
    dbt-duckdb interprète une « location » external terminée par « / » comme une CLÉ
    d'objet unique (l'objet écrit s'appelle littéralement « run=<id>/ »), pas comme un
    dossier de fichiers .parquet. Révélé au premier dbt build réel contre MinIO : build
    vert, relecture vide.
  correctif: >-
    Nommer explicitement le fichier dans la location (« …/run=<id>/part.parquet ») ; le
    préfixe dt=…/run=…/ reste l'unité immuable relisable via « run=<id>/*.parquet ».
  statut: corrige

- id: D14
  campagne: "modèles dbt staging→curated (étape 3.2) — CI DataOps"
  nature: drift-e2e
  portee: code
  symptome: >-
    La CI « DataOps (Python) » échoue (3 tests) alors que tout passe en local :
    « dbt parse » s'arrête sur « Env var required but not provided: AWS_ACCESS_KEY_ID ».
  cause: >-
    Le « dbt parse » paresseux (ensure_manifest, quand le manifest absent — target/ est
    git-ignoré) doit RENDRE profiles.yml, qui lit le secret S3 via env_var() SANS défaut.
    En CI (aucune clé AWS, pas de manifest pré-généré) le rendu échoue, bien que le parse
    ne fasse aucune I/O S3. Masqué en local par un manifest déjà généré. Révélé au 1er run CI.
  correctif: >-
    Injecter des identifiants S3 FACTICES (os.environ.setdefault — jamais d'écrasement d'un
    vrai accès) avant le parse paresseux, parité avec le Dockerfile. Le « dbt build » runtime
    garde le vrai environnement (chemin séparé). Le parse devient hermétique partout.
  statut: corrige

- id: D15
  campagne: "manifest atomique du mart collab (étape 3.4)"
  nature: piege-revue
  portee: code
  symptome: >-
    « rclone hashsum sha256 » sur un objet S3 échoue : « hash unsupported: hash type not
    supported » (code 1) — impossible de calculer le sha256 des parts pour le manifest.
  cause: >-
    S3/MinIO n'expose pas de sha256 côté serveur (seulement l'ETag/MD5) ; rclone réclame un
    hash serveur par défaut. Révélé en sondant rclone contre un MinIO épinglé avant de coder.
  correctif: >-
    Forcer le calcul côté client avec « --download » : rclone télécharge les octets et hache
    localement (« rclone hashsum sha256 --download »), résultat identique à hashlib/shasum.
    Un test unitaire vérifie que la commande hashsum porte « --download » (anti-régression).
  statut: corrige

- id: D16
  campagne: "manifest atomique du mart collab (étape 3.4) — CI DataOps"
  nature: drift-e2e
  portee: harnais
  symptome: >-
    La CI « DataOps (Python) » échoue : « FileNotFoundError: 'rclone' » sur le test
    d'intégration du manifest, alors qu'il passe en local.
  cause: >-
    rclone N'EST PAS une dépendance pip : il vit dans l'IMAGE (Dockerfile), pas sur l'hôte
    de CI ni la machine d'un contributeur. Le test d'intégration du manifest shelle rclone
    directement sur l'hôte (pas dans un conteneur, contrairement à `mc`). Masqué en local
    (rclone installé). Révélé au 1er run CI de l'étape 3.4.
  correctif: >-
    Auto-saut du test si rclone est absent (requires_rclone(), comme le skip Docker du
    fixture MinIO) ; la logique de l'asset reste couverte par les tests FakeRclone (rclone
    mocké). Garde-fou ADR 0057 : un test exigeant un outil hôte non garanti est self-skipping.
  statut: corrige

# ── E2E OpenAlex COMPLET sur banc Lima (ingestion + transform) — D17–D22 ──────
- id: D17
  campagne: "E2E OpenAlex banc Lima — déploiement de la code-location"
  nature: drift-e2e
  portee: code
  symptome: >-
    Le pod de RUN (K8sRunLauncher) crashe au démarrage : « Couldn't import module
    dagster_postgres.run_storage » — avant même d'exécuter l'asset.
  cause: >-
    Le run worker EST l'image code-location (lancée depuis DAGSTER_CURRENT_IMAGE) :
    il doit rehydrater l'instance Dagster du cluster (dagster.yaml → PostgresRunStorage
    + K8sRunLauncher). Or le pyproject excluait volontairement dagster-postgres et
    dagster-k8s (« deps de l'orchestrateur seulement ») — hypothèse fausse pour ce
    modèle d'exécution. Invisible en tests (pas de run K8s).
  correctif: >-
    Ajout de dagster-postgres==0.29.7 + dagster-k8s==0.29.7 (numérotation 0.YY.Z comme
    dagster-dbt, ↔ dagster 1.13.7) aux dépendances de la code-location. psycopg2-binary
    (LGPL) entre en transitif, assumé côté dataops (Python, hors gate licences Node, ADR 0055).
  statut: corrige

- id: D18
  campagne: "E2E OpenAlex banc Lima — check GE du brut"
  nature: drift-e2e
  portee: code
  symptome: >-
    Le check GE bloquant ge_raw_contract échoue : DuckDB lève « Invalid Input Error:
    Map keys must be unique » alors que l'ingestion a réussi.
  cause: >-
    check_raw lit le brut OpenAlex en SELECT * : read_json_auto infère le schéma nested
    COMPLET, dont abstract_inverted_index (objet JSON à clés de mots) converti en MAP ;
    certains enregistrements réels ont des clés dupliquées → DuckDB rejette. Invisible
    en tests hermétiques (fixtures propres) ; révélé sur le snapshot réel.
  correctif: >-
    Projeter dans check_raw les SEULES colonnes que les suites GE valident (works :
    id/referenced_works/authorships ; authors : id) au lieu de SELECT * — on ne parse
    plus les champs non validés. Plus robuste et plus léger.
  statut: corrige

- id: D19
  campagne: "E2E OpenAlex banc Lima — lineage + MLflow dans les runs"
  nature: drift-e2e
  portee: code
  symptome: >-
    Run SUCCESS mais AUCUN lineage dans Marquez (pas de namespace citation ni de job
    raw_snapshot) et aucun run MLflow : émission silencieusement en no-op.
  cause: >-
    Piège ADR 0086 (contrat cluster) : OPENLINEAGE_URL / MLFLOW_TRACKING_URI posés sur le
    Deployment de la code-location gRPC NE se propagent PAS aux pods de run du
    K8sRunLauncher. _emit_lineage est gardé par « if OPENLINEAGE_URL » → no-op ; le logging
    MLflow du drift idem. La garde validate.sh vérifie la variable dans le MANIFESTE (Deployment),
    pas dans la config de run → ne détecte pas le trou.
  correctif: >-
    Injecter OPENLINEAGE_* + MLFLOW_TRACKING_URI au niveau RUN via container_config.env
    (tag dagster-k8s/config), pour ingestion_job ET transform_job ; test anti-régression.
    GOTCHA : après rebuild de la code-location, redémarrer daemon ET webserver (cache gRPC)
    pour que les nouveaux tags atteignent les runs.
  statut: corrige

- id: D20
  campagne: "E2E OpenAlex banc Lima — chargement de l'index (index_load)"
  nature: drift-e2e
  portee: code
  symptome: >-
    index_load échoue : « relation "researchers" does not exist » — sur un déploiement neuf,
    le pipeline ne peut pas charger l'index.
  cause: >-
    L'asset index_load CONSOMME le schéma de l'index sans le créer (frontière explicitée dans
    son docstring + ADR 0058 §4.1 « migrations versionnées »). Or RIEN dans le dépôt ne
    fournissait ce schéma : la migration supposée appliquée au déploiement n'existait pas.
  correctif: >-
    Migration versionnée deploy/migrations/0001_researchers_index.sql : table researchers
    (embedding vector(384) + index HNSW cosinus, fts tsvector + index GIN, index de partition
    dt/run), conforme ADR 0058 §4.1/4.2, idempotente. Le branchement d'exécution reste au
    déployeur (frontière infra) ; le dépôt fournit le SQL.
  statut: corrige

- id: D21
  campagne: "E2E OpenAlex banc Lima — mart collab vide (check GE)"
  nature: drift-e2e
  portee: code
  symptome: >-
    Le check GE bloquant ge_marts_collab échoue (viole le contrat not_null) alors que le
    résultat correct est un mart VIDE : le mart contient une ligne à author_a/author_b NULL.
  cause: >-
    Sur un jeu sans arête auteur→auteur (les œuvres citées n'ont pas d'auteur co-ingéré →
    relation vide), la matérialisation « external » de dbt-duckdb écrit un placeholder de
    schéma à toutes colonnes NULL. Un garde côté MODÈLE (WHERE author_a IS NOT NULL) est
    inopérant : la ligne ne vient pas du SELECT (qui renvoie 0 ligne) mais de la matérialisation.
  correctif: >-
    Filtrer la ligne fantôme au POINT DE LECTURE : check_marts lit WHERE author_a IS NOT NULL
    → un mart sans paire est un état valide (0 paire réelle). Idem _count_rows du manifest :
    NOT (COLUMNS(*) IS NULL), agnostique du mart, pour que row_count ne compte pas le placeholder
    (sinon row_count=1 ≠ sha256 des octets → contrat manifest cassé).
  statut: corrige

- id: D22
  campagne: "E2E OpenAlex banc Lima — push de la branche de correctifs"
  nature: drift-e2e
  portee: harnais
  symptome: >-
    Le pre-push échoue pour tout le monde au hook check-audit (audit:security).
  cause: >-
    Override de sécurité undici périmé dans pnpm-workspace.yaml (>=7.25.0) : de nouvelles
    advisories (GHSA-vmh5-mc38-953g, vxpw-j846-p89q, hm92-r4w5-c3mj + une moderate) exigent
    >=7.28.0 (bypass TLS, DoS WebSocket, routage cross-origin). undici est transitif via jsdom
    et @effect/platform-node. Un seuil d'override périmé casse check-audit (dette racine).
  correctif: >-
    Relever l'override undici à « >=7.28.0 <8 » + pnpm install. audit:security repasse vert.
  statut: corrige

- id: D23
  campagne: "E2E OpenAlex banc Lima — échantillon works/authors disjoint"
  nature: drift-e2e
  portee: code
  symptome: >-
    transform_job échoue aux tests dbt relationships : 903 authorships.author_id et 7658
    marts_researchers.author_id pointent vers des auteurs absents de la table authors
    (clés étrangères pendantes).
  cause: >-
    raw_snapshot ingère works et authors par FICHIERS, partition par date (ADR 0054). Sur
    un petit banc, les tranches sont DISJOINTES : les works (p. ex. 2016) citent ~856
    auteurs précis, quasi absents de l'échantillon d'authors (p. ex. 2026). Structurel à
    l'échantillonnage borné par fichiers (OpenAlex partitionne par updated_date, pas par
    contenu) ; en prod (snapshot complet) la cohérence est native.
  correctif: >-
    Mode « échantillon cohérent » opt-in dans raw_snapshot (config coherent_sample, OFF par
    défaut, ADR 0063) : après le sync des works, dérive une tranche authors contenant
    EXACTEMENT les auteurs cités, depuis les objets author inline (id/display_name/orcid) de
    works.authorships, écrite sous la partition réservée updated_date=coherent-sample.
    Vérifié au banc : 0 FK manquante, dbt PASS=69, transform_job RUN_SUCCESS sans seed manuel.
  statut: corrige

- id: D24
  campagne: "Preuve prod pageviews — contrat de chemin producteur/consommateur"
  nature: drift-e2e
  portee: code
  symptome: >-
    À l'échelle prod, ingestion_job de pageviews échoue à l'étape raw_pageviews :
    « IO Error: No files found that match the pattern
    s3://…/ref/universities/source=seed/*.parquet ». ref_universities (amont) a pourtant
    réussi (référentiel écrit). Invisible au banc (assets testés isolément, jamais chaînés).
  cause: >-
    Le CONTRAT DE CHEMIN interne entre le PRODUCTEUR (ref_universities, qui écrit le
    référentiel) et le CONSOMMATEUR (raw_pageviews, qui le lit) était codé EN DUR DEUX FOIS,
    de part et d'autre, sans lien : le producteur écrivait sous « raw/ref_universities/ », le
    consommateur lisait sous « ref/universities/source=<src>/ » (la prod pose
    PAGEVIEWS_REF_SOURCE=ingested). Deux constantes dupliquées qui ont divergé → aucun
    test/lint ne pouvait l'attraper (chaque asset mocké séparément). Contrat implicite, pas
    explicite.
  correctif: >-
    Contrat de chemin PARTAGÉ en une source unique dans lakehouse.py
    (referential_prefix/dest/glob) : le producteur ÉCRIT via referential_dest(source=ingested)
    et le consommateur LIT via referential_glob(source) — divergence structurellement
    impossible. Test de non-régression test_referential_producer_writes_where_consumer_reads
    qui verrouille que le fichier écrit tombe dans le glob lu. 119 tests pageviews verts.
    LEÇON : un contrat inter-assets doit être défini UNE fois et testé, jamais dupliqué.
  statut: corrige

- id: D25
  campagne: "Preuve prod pageviews — relais de PAGEVIEWS_REF_SOURCE au pod de run"
  nature: drift-e2e
  portee: code
  symptome: >-
    Même APRÈS le contrat de chemin partagé (D24), ingestion_job échoue encore à raw_pageviews :
    « No files found … ref/universities/source=SEED/*.parquet ». Or ref_universities écrit sous
    source=INGESTED. raw_pageviews cherche donc la mauvaise partition.
  cause: >-
    raw_pageviews lit PAGEVIEWS_REF_SOURCE DANS le pod de run (défaut « seed »). L'overlay prod
    pose bien PAGEVIEWS_REF_SOURCE=ingested sur le Deployment gRPC, mais les vars du gRPC NE se
    propagent PAS aux pods de run du K8sRunLauncher (piège ADR 0086) — il faut les RELAYER via
    le tag dagster-k8s/config. Or seul transform_job avait ce relais (_transform_run_config) ;
