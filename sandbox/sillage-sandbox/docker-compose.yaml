# sillage-sandbox — composes a local CRF (REDCap) instance, a self-hosted
# BaaS (Appwrite) and exposes them on conflicting-free ports so the
# `sillage` SvelteKit app can run end-to-end against them via
# `pnpm -F sillage dev`.
#
# Layout
# ------
# - The CRF stack lives in sandbox/crf-sandbox/ and is included verbatim
#   via Docker Compose `include:` (v2.20+). We don't duplicate it.
# - The BaaS stack (Appwrite + its mariadb + its redis) is declared
#   inline here. Service + network names are prefixed `baas-` to avoid
#   any clash with the CRF stack.
# - Variables are read from `.env` (see `.env.example`).
#
# Usage
# -----
# - `pnpm start`        : zero-touch — wipes any previous state, starts
#                        both stacks, bootstraps and runs smoke (cf.
#                        scripts/start.sh)
# - `pnpm bootstrap`    : provision Appwrite project/key + CRF token, write
#                        them to apps/sillage/.env.local
# - `pnpm logs`         : tail logs of all services
# - `pnpm stop`         : stop services (volumes anonymes : effacés par
#                        `down`)
#
# Volumes
# -------
# Volumes anonymes, donc effacés à chaque `docker compose down` (ou
# `pnpm stop`). Chaque `pnpm start` recommence à partir d'un Appwrite et
# d'une MongoDB fraîchement bootstrappés — environ 30 à 60 s de
# bootstrap supplémentaires, acceptés en échange de la disparition des
# bugs de drift entre sessions et entre sandboxes (cf. sandbox amarre
# qui partage le projet REDCap id=1).
#
# Note Appwrite : la stack ici est minimale (appwrite + db + redis sans
# traefik ni workers). Suffisant pour les flux Account/Users/Database
# utilisés par sillage. Pour un environnement plus proche de la prod,
# importer le compose officiel d'Appwrite via `include:` à la place.

include:
  - path: ../crf-sandbox/docker/docker-compose.yml

services:
  # ── sillage app (SvelteKit / adapter-node) ──────────────────────────
  # Build-once de l'app et exposition sur :5173, l'alternative dockerisée
  # au `pnpm -F sillage dev` lancé sur l'hôte. Le sandbox ne dépend PAS de
  # l'app au niveau npm (ADR 0021) : il la lance via Docker à partir de
  # son Dockerfile, sans jamais l'importer.
  #
  # Contexte de build = racine du monorepo (../..), parce que le build
  # pnpm a besoin du lockfile, du pnpm-workspace.yaml et des package.json
  # des paquets workspace (@univ-lehavre/atlas-*) dont sillage dépend.
  #
  # Les PUBLIC_* sont inlinées au BUILD (SvelteKit `$env/static/public`),
  # donc passées en `args:`. Côté browser, l'app appelle le BaaS et le CRF
  # via l'hôte (localhost:8090 / 8888), pas via les noms de services
  # Docker — d'où les valeurs `localhost:*` ci-dessous (le navigateur de
  # l'utilisateur tourne sur l'hôte, pas dans le réseau Docker).
  #
  # Les variables PRIVÉES (APPWRITE_KEY, REDCAP_API_TOKEN,
  # ALLOWED_DOMAINS_REGEXP) sont lues à l'EXÉCUTION par l'adapter Node :
  # elles arrivent par `environment:` depuis `.env` (jamais en dur dans
  # l'image). `pnpm bootstrap` remplit APPWRITE_KEY / CRF_API_TOKEN dans
  # `.env` ; lance donc `pnpm bootstrap` avant de démarrer ce service.
  app:
    build:
      context: ../..
      dockerfile: apps/sillage/Dockerfile
      args:
        PUBLIC_APPWRITE_ENDPOINT: ${PUBLIC_APPWRITE_ENDPOINT:-http://localhost:8090/v1}
        PUBLIC_APPWRITE_PROJECT: ${APPWRITE_PROJECT_ID:-sillage}
        PUBLIC_LOGIN_URL: ${PUBLIC_LOGIN_URL:-http://localhost:5173/login}
        PUBLIC_REDCAP_URL: ${PUBLIC_CRF_URL:-http://localhost:8888/api/}
    container_name: sillage-sandbox-app
    ports:
      - "${SILLAGE_APP_PORT:-5173}:5173"
    environment:
      # adapter-node : origine attendue pour la protection CSRF des POST.
      # C'est l'origine SEULE (scheme+host+port), sans path — distincte de
      # PUBLIC_LOGIN_URL qui, lui, inclut `/login`.
      ORIGIN: ${SILLAGE_APP_ORIGIN:-http://localhost:5173}
      # Variables privées lues au runtime (cf. $env/static/private).
      APPWRITE_KEY: ${APPWRITE_KEY:-}
      REDCAP_API_TOKEN: ${CRF_API_TOKEN:-}
      ALLOWED_DOMAINS_REGEXP: ${ALLOWED_DOMAINS_REGEXP:-@(example\.org|univ-lehavre\.fr|sillage\.local)}
      # Rappel runtime des PUBLIC_* (inoffensif : déjà figées au build).
      PUBLIC_APPWRITE_ENDPOINT: ${PUBLIC_APPWRITE_ENDPOINT:-http://localhost:8090/v1}
      PUBLIC_APPWRITE_PROJECT: ${APPWRITE_PROJECT_ID:-sillage}
      PUBLIC_LOGIN_URL: ${PUBLIC_LOGIN_URL:-http://localhost:5173/login}
      PUBLIC_REDCAP_URL: ${PUBLIC_CRF_URL:-http://localhost:8888/api/}
    depends_on:
      baas:
        condition: service_started
    networks:
      - baas-net
      - redcap-net

  baas:
    image: appwrite/appwrite:1.9.0
    container_name: sillage-sandbox-baas
    ports:
      - "${APP_PORT:-8090}:80"
    depends_on:
      baas-mongodb:
        condition: service_started
      baas-redis:
        condition: service_started
    environment:
      _APP_ENV: development
      _APP_LOCALE: fr
      _APP_OPTIONS_ABUSE: "disabled"
      _APP_OPTIONS_FORCE_HTTPS: "disabled"
      # Allow the bootstrap script to create the first console user via
      # POST /v1/account. Without this, Appwrite 1.9 refuses signup with
      # `user_console_count_exceeded`.
      _APP_CONSOLE_WHITELIST_ROOT: "disabled"
      _APP_OPENSSL_KEY_V1: ${_APP_OPENSSL_KEY_V1:?Define _APP_OPENSSL_KEY_V1 in .env}
      _APP_DOMAIN: ${APP_DOMAIN:-localhost}
      _APP_DOMAIN_TARGET: ${APP_DOMAIN_TARGET:-localhost}
      # GET /v1/console/variables crashes (TypeError) on Appwrite 1.9
      # if these are absent — the controller passes them directly to
      # `new Domain($value)` without a default. Setting them avoids
      # the post-login 500 that breaks the SPA's org redirect.
      _APP_DOMAIN_TARGET_CNAME: ${_APP_DOMAIN_TARGET_CNAME:-localhost}
      _APP_DOMAIN_TARGET_A: ${_APP_DOMAIN_TARGET_A:-}
      _APP_DOMAIN_TARGET_AAAA: ${_APP_DOMAIN_TARGET_AAAA:-}
      _APP_REDIS_HOST: ${_APP_REDIS_HOST:-baas-redis}
      _APP_REDIS_PORT: ${_APP_REDIS_PORT:-6379}
      # DB — Appwrite 1.9 defaults to MongoDB. We mirror the official
      # docker-compose: adapter=mongodb, root user, port 27017.
      _APP_DB_ADAPTER: mongodb
      _APP_DB_HOST: ${_APP_DB_HOST:-baas-mongodb}
      _APP_DB_PORT: ${_APP_DB_PORT:-27017}
      _APP_DB_USER: ${_APP_DB_USER:-root}
      _APP_DB_PASS: ${_APP_DB_PASS:-baas_password}
      _APP_DB_ROOT_PASS: ${_APP_DB_PASS:-baas_password}
      _APP_DB_SCHEMA: ${_APP_DB_SCHEMA:-appwrite}
      # SMTP — pointe vers Mailpit (service défini dans crf-sandbox, partagé
      # via redcap-net). Mailpit accepte tout, sans auth ni TLS — c'est un
      # mail-trap local, pas un vrai relai.
      _APP_SMTP_HOST: ${_APP_SMTP_HOST:-mailpit}
      _APP_SMTP_PORT: ${_APP_SMTP_PORT:-1025}
      _APP_SMTP_SECURE: ""
      _APP_SMTP_USERNAME: ""
      _APP_SMTP_PASSWORD: ""
      _APP_SYSTEM_EMAIL_NAME: ${APPWRITE_SYSTEM_EMAIL_NAME:-Sillage Sandbox}
      _APP_SYSTEM_EMAIL_ADDRESS: ${APPWRITE_SYSTEM_EMAIL_ADDRESS:-no-reply@sillage.local}
    # Volumes anonymes : effacés par `docker compose down -v` (lancé
    # automatiquement par `start.sh`). Chaque `pnpm start` repart d'un
    # état fraîchement bootstrapé, évite les conflits d'état entre les
    # sandboxes amarre/sillage qui partagent le projet REDCap id=1.
    volumes:
      - /storage/uploads
      - /storage/cache
      - /storage/config
      - /storage/certificates
    networks:
      - baas-net
      - redcap-net

  # Console SPA. Sur Appwrite 1.9, la console n'est plus servie par le
  # conteneur principal — c'est une image séparée. En prod Appwrite la
  # source un Traefik route /console vers ce conteneur. Ici on l'expose
  # directement sur :8091 pour rester simple.
  #
  # La SPA est un SvelteKit en mode SSG : les variables PUBLIC_* sont
  # figées au build de l'image, pas lues à l'exécution. Passer
  # PUBLIC_APPWRITE_ENDPOINT dans `environment` n'a donc aucun effet.
  # On override le fichier _app/env.js au démarrage avec un `sed` puis
  # on chaîne sur l'entrypoint nginx par défaut.
  baas-console:
    image: appwrite/console:8
    container_name: sillage-sandbox-baas-console
    ports:
      - "${APP_CONSOLE_PORT:-8091}:80"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        sed -i 's|"PUBLIC_APPWRITE_ENDPOINT":"[^"]*"|"PUBLIC_APPWRITE_ENDPOINT":"'"${PUBLIC_APPWRITE_ENDPOINT:-http://localhost:8090/v1}"'"|' /usr/share/nginx/html/console/_app/env.js
        exec nginx -g 'daemon off;'
    volumes:
      # Override the default nginx config — see docker/console-nginx.conf
      # for the why. Adds a proxy_pass /v1/ → http://baas:80/v1/ so the
      # SPA's same-origin API calls reach Appwrite.
      - ./docker/console-nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - baas
    networks:
      - baas-net

  # Worker dédié à la consommation de la queue v1-mails. Sans ce service,
  # `account.createMagicURLToken` enfile bien le job dans Redis mais
  # personne ne l'envoie → les emails ne quittent jamais Appwrite.
  baas-worker-mails:
    image: appwrite/appwrite:1.9.0
    container_name: sillage-sandbox-baas-worker-mails
    entrypoint: worker-mails
    depends_on:
      - baas
      - baas-redis
      - baas-mongodb
    environment:
      _APP_ENV: development
      _APP_LOCALE: fr
      _APP_OPENSSL_KEY_V1: ${_APP_OPENSSL_KEY_V1:?Define _APP_OPENSSL_KEY_V1 in .env}
      _APP_DOMAIN: ${APP_DOMAIN:-localhost}
      _APP_DOMAIN_TARGET: ${APP_DOMAIN_TARGET:-localhost}
      # GET /v1/console/variables crashes (TypeError) on Appwrite 1.9
      # if these are absent — the controller passes them directly to
      # `new Domain($value)` without a default. Setting them avoids
      # the post-login 500 that breaks the SPA's org redirect.
      _APP_DOMAIN_TARGET_CNAME: ${_APP_DOMAIN_TARGET_CNAME:-localhost}
      _APP_DOMAIN_TARGET_A: ${_APP_DOMAIN_TARGET_A:-}
      _APP_DOMAIN_TARGET_AAAA: ${_APP_DOMAIN_TARGET_AAAA:-}
      _APP_REDIS_HOST: ${_APP_REDIS_HOST:-baas-redis}
      _APP_REDIS_PORT: ${_APP_REDIS_PORT:-6379}
      _APP_DB_ADAPTER: mongodb
      _APP_DB_HOST: ${_APP_DB_HOST:-baas-mongodb}
      _APP_DB_PORT: ${_APP_DB_PORT:-27017}
      _APP_DB_USER: ${_APP_DB_USER:-root}
      _APP_DB_PASS: ${_APP_DB_PASS:-baas_password}
      _APP_DB_ROOT_PASS: ${_APP_DB_PASS:-baas_password}
      _APP_DB_SCHEMA: ${_APP_DB_SCHEMA:-appwrite}
      _APP_SMTP_HOST: ${_APP_SMTP_HOST:-mailpit}
      _APP_SMTP_PORT: ${_APP_SMTP_PORT:-1025}
      _APP_SMTP_SECURE: ""
      _APP_SMTP_USERNAME: ""
      _APP_SMTP_PASSWORD: ""
      _APP_SYSTEM_EMAIL_NAME: ${APPWRITE_SYSTEM_EMAIL_NAME:-Sillage Sandbox}
      _APP_SYSTEM_EMAIL_ADDRESS: ${APPWRITE_SYSTEM_EMAIL_ADDRESS:-no-reply@sillage.local}
    networks:
      - baas-net
      - redcap-net

  baas-mongodb:
    image: mongo:8.2.5
    container_name: sillage-sandbox-baas-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${_APP_DB_USER:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${_APP_DB_PASS:-baas_password}
    # Volume anonyme : voir le commentaire sur le service `baas`.
    volumes:
      - /data/db
    networks:
      - baas-net

  baas-redis:
    image: redis:7.4-alpine
    container_name: sillage-sandbox-baas-redis
    networks:
      - baas-net

networks:
  baas-net:
    driver: bridge
  # Déclaré ici pour pouvoir l'attacher au service `baas`. Le réseau réel
  # est défini par crf-sandbox/docker/docker-compose.yml (inclus ci-dessus)
  # — Compose le déduplique au merge.
  redcap-net:
    external: false
