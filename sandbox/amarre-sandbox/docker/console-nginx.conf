# Nginx config for the Appwrite console container, mounted into the
# `baas-console` service. The default config in appwrite/console:8
# only serves the SPA on /console and 301s everything else back to it.
#
# That's not enough for our setup: the SPA assumes a reverse proxy
# (Traefik in upstream Appwrite) maps `/console` to the console
# container AND `/v1` to the API on the same origin. When we expose
# the console directly on :8091, its `fetch('/v1/account')` calls
# hit nginx here instead of the API and get 301'd back to /console —
# which the SPA can't parse as JSON, so it falls through to its 404
# fallback.
#
# We add a `proxy_pass /v1/ → http://baas:80/v1/` so same-origin API
# calls reach Appwrite. The console container is on the `baas-net`
# network, so it resolves `baas` to the API container.

server {
    listen 80;
    server_name localhost;

    gzip_static on;

    root /usr/share/nginx/html;

    # API passthrough — see header comment.
    location /v1/ {
        proxy_pass http://baas:80/v1/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        # The SPA streams some endpoints (realtime, logs) — disable
        # buffering so we don't sit on responses.
        proxy_buffering off;
        proxy_read_timeout 300s;
    }

    location /console/_app/immutable/ {
        try_files $uri =404;

        expires 1y;
        add_header Pragma public;
        add_header Cache-Control "public";
    }

    location ~* ^/console/(images|css|fonts|icons)/ {
        expires 1d;
        add_header Cache-Control "public, must-revalidate";
    }

    location /console {
        index index.html index.html;
        try_files $uri /console/index.html;

        expires 0;
        add_header Cache-Control "no-cache, no-store";
        add_header Pragma "no-cache";

        add_header X-UA-Compatible "IE=Edge";
        add_header X-Frame-Options SAMEORIGIN;
        add_header X-XSS-Protection "1; mode=block;";
        add_header X-Content-Type-Options nosniff;
    }

    location / {
        absolute_redirect off;
        return 301 /console;
    }
}
