services:
  redcap:
    build:
      context: ./php
      dockerfile: Dockerfile
    ports:
      - '8888:80'
    volumes:
      # Mount REDCap versioned directory as web root (configurable via REDCAP_VERSION)
      - ../upstream/versions/${REDCAP_VERSION:-16.1.9}/redcap:/var/www/html:ro
      - ./config/php.ini:/usr/local/etc/php/conf.d/redcap.ini:ro
      # Database configuration (override the empty one)
      - ./config/database.php:/var/www/html/database.php:ro
      # Writable directories shared across versions
      - ../upstream/shared/edocs:/var/www/html/edocs
      - redcap-temp:/var/www/html/temp
    environment:
      - REDCAP_DB_HOST=mariadb
      - REDCAP_DB_NAME=redcap
      - REDCAP_DB_USER=redcap
      - REDCAP_DB_PASSWORD=redcap_password
      - REDCAP_VERSION=${REDCAP_VERSION:-16.1.9}
    depends_on:
      mariadb:
        condition: service_healthy
    networks:
      - redcap-net
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost/api/']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  mariadb:
    image: mariadb:11.4
    environment:
      - MYSQL_ROOT_PASSWORD=root_password
      - MYSQL_DATABASE=redcap
      - MYSQL_USER=redcap
      - MYSQL_PASSWORD=redcap_password
    volumes:
      - mariadb-data:/var/lib/mysql
      - ./config/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - redcap-net
    healthcheck:
      test: ['CMD', 'healthcheck.sh', '--connect', '--innodb_initialized']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  phpmyadmin:
    image: phpmyadmin:5.2
    ports:
      - '8889:80'
    environment:
      - PMA_HOST=mariadb
      - PMA_USER=redcap
      - PMA_PASSWORD=redcap_password
    depends_on:
      - mariadb
    networks:
      - redcap-net

  mailpit:
    # Pinned : the `latest` tag at some point started timing out SMTP
    # sessions before Appwrite's `baas-worker-mails` could finish its
    # MAIL FROM exchange (HTTP 421 "closing transmission channel after
    # timeout exceeded"). v1.20 holds the session long enough.
    image: axllent/mailpit:v1.20
    ports:
      - '8025:8025'
      - '1025:1025'
    environment:
      # Disable STARTTLS requirement and bump the auth/relay timeout
      # ceilings — the worker uses plain SMTP on the redcap-net bridge,
      # no need for TLS, and the longer ceiling avoids flakes when the
      # worker queue is slow to wake up.
      MP_SMTP_AUTH_ALLOW_INSECURE: 'true'
      MP_SMTP_DISABLE_RDNS: 'true'
    networks:
      - redcap-net

networks:
  redcap-net:
    driver: bridge

volumes:
  mariadb-data:
  redcap-temp:
