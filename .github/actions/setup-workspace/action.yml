# Action composite locale : factorise le préambule répété par presque tous
# les jobs de `ci.yml` — checkout (implicite côté appelant), pnpm, Node avec
# cache pnpm, fichiers .env SvelteKit, install, et cache Turbo.
#
# Pourquoi une action locale plutôt qu'un workflow réutilisable (`workflow_call`)
# : on veut partager des *steps* à l'intérieur d'un job (pour ne pas multiplier
# les jobs ni changer les noms des checks requis par la branch protection —
# ADR 0016/0034), pas réorchestrer des jobs. Une composite action est l'outil
# exact pour ça.
#
# Cache Turbo : REMOTE cache adossé au cache GitHub Actions (ADR 0090), via
# `caching-for-turbo`. Il lance un serveur de remote cache Turbo local
# (localhost) dont le store est le cache GitHub Actions, et câble
# TURBO_API/TOKEN/TEAM. Remplace l'ancien `actions/cache` sur `.turbo` (ADR 0061),
# qui ne partageait PAS le cache entre jobs d'un même run (actions/cache
# n'écrase pas une entrée existante). Le remote cache donne des hits intra-run
# ET inter-run. Dégradation gracieuse : si le proxy échoue, turbo rebuild (cache
# froid), pas d'échec. Placé en tête pour être actif avant toute tâche turbo.
name: Setup workspace
description: >-
  Installe pnpm + Node (cache pnpm), prépare les .env SvelteKit, installe les
  dépendances en frozen-lockfile et active le remote cache Turbo (cache GitHub).
  À appeler après un `actions/checkout` dans le job.

runs:
  using: composite
  steps:
    # Remote cache Turbo adossé au cache GitHub Actions (ADR 0090). Doit précéder
    # toute invocation de turbo. Épinglé par SHA (v2.5.0).
    - uses: rharkor/caching-for-turbo@75f8ebf4a43d2c60b23bc2a27082cfea94ffdad9 # v2.5.0

    - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

    - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
      with:
        node-version-file: .nvmrc
        cache: pnpm

    - name: Create SvelteKit env files
      shell: bash
      run: |
        for app in apps/amarre apps/ecrin apps/find-an-expert apps/sillage; do
          cp "$app/.env.example" "$app/.env" 2>/dev/null || true
        done

    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile --prefer-offline
