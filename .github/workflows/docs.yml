name: Deploy Documentation

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "packages/*/src/**"
      - "packages/*/README.md"
      - "apps/*/src/**"
      - "apps/*/README.md"
      - "services/*/src/**"
      - "services/*/README.md"
      - "cli/*/src/**"
      - "cli/*/README.md"
      - "config/*/src/**"
      - "scripts/docs/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build Documentation
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Historique complet requis : `docs:build` dérive les statistiques du
          # dépôt de `git log` (un checkout superficiel fausserait les stats).
          fetch-depth: 0

      # Réutilise l'action composite (pnpm + Node + .env SvelteKit + install +
      # cache Turbo) au lieu de réimplémenter le préambule. Évite la dérive
      # observée ici : pin pnpm divergent (v6.0.8/v6.0.9) et surtout une clé de
      # cache Turbo `turbo-v2-…-${{ github.sha }}` JAMAIS réutilisée (un SHA est
      # unique par commit — anti-pattern documenté dans l'action composite). La
      # composite porte la clé de contenu `turbo-v3-…-hashFiles(…)`, partagée et
      # cohérente avec ci.yml.
      - uses: ./.github/actions/setup-workspace

      # Pipeline Astro Starlight (ADR 0036) : génère les statistiques et la carte
      # des paquets, puis construit le site. Ne lit que les sources (README,
      # package.json, git) — pas d'artefact buildé, donc pas de build workspace.
      - name: Build Astro Starlight site
        run: pnpm docs:build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: docs/dist

  deploy:
    name: Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
