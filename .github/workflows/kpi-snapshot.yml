name: KPI snapshot

# Historise la couverture de tests (donnée classe B de l'ADR 0032 : mesurée par
# exécution, donc non reproductible depuis l'arbre Git, donc historisée en série
# append-only plutôt que diff-checkée).
#
# Déclenché UNIQUEMENT par planification (une fois par jour) et manuellement —
# jamais par `push`. C'est volontaire : un job qui pousse sur `main` et qui
# écouterait `push` se redéclencherait lui-même (boucle). Le cron casse cette
# boucle par construction ; le commit porte tout de même `[skip ci]` par sûreté.
#
# Le job mesure la couverture du jour, fait l'« upsert » de l'entrée du jour
# dans `docs/.vitepress/data/kpi-history.json` (idempotent : ré-exécuter le même
# jour remplace l'entrée), puis commite sur `main` seulement si la série a changé.

on:
  schedule:
    # 03:43 UTC — décalé des autres planifications (CodeQL lundi 03:17) pour
    # éviter les pics de runners.
    - cron: "43 3 * * *"
  workflow_dispatch:

# Empêche deux exécutions simultanées de se marcher dessus (push concurrent).
concurrency:
  group: kpi-snapshot
  cancel-in-progress: false

permissions:
  contents: write

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  snapshot:
    name: Snapshot coverage
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: main

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Create SvelteKit env files
        run: |
          for app in apps/amarre apps/ecrin apps/find-an-expert apps/sillage; do
            cp "$app/.env.example" "$app/.env" 2>/dev/null || true
          done

      - run: pnpm install --frozen-lockfile

      - name: Turbo cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: .turbo
          key: turbo-v2-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-v2-${{ runner.os }}-

      # Produit les coverage/coverage-final.json de chaque workspace.
      - run: pnpm test:coverage

      # Upsert l'entrée du jour dans la série append-only.
      - run: pnpm kpi:snapshot

      # Commit + push sur main UNIQUEMENT si la série a changé. `[skip ci]`
      # évite tout déclenchement de workflow par ce commit de données.
      - name: Commit snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- docs/.vitepress/data/kpi-history.json; then
            echo "Aucun changement de couverture aujourd'hui — rien à committer."
            exit 0
          fi
          git add docs/.vitepress/data/kpi-history.json
          git commit -m "chore(docs): snapshot de couverture [skip ci]"
          # Rebase au cas où main aurait avancé pendant le job, puis push.
          git pull --rebase --autostash origin main
          git push origin HEAD:main
