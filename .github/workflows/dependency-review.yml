name: Dependency review

# Vérifie chaque PR contre la GitHub Dependency Graph :
#  - bloque toute nouvelle vulnérabilité de sévérité `high` ou `critical`.
#    Les `moderate` et `low` ne bloquent pas — le script `audit:security`
#    (lancé en pre-push et en CI sur le job Audit) garde la couverture
#    pour ces niveaux et peut être durci à `--audit-level=moderate` si
#    on le souhaite (cf. Phase 3.3).
#  - bloque toute nouvelle dépendance avec une licence hors allowlist.
#    L'allowlist est alignée sur `scripts/audit/licenses.mjs` — SPDX
#    canoniques uniquement (les exceptions par package du script local,
#    ex. `fsevents`, sont laissées hors workflow ; à ajouter en
#    `deny-packages: ''` exception si besoin).
#
# Prérequis : Dependency graph doit être activé côté repo (Settings →
# Security → Code security → Dependency graph). Sans ce paramètre,
# l'action échoue avec "Dependency review is not supported on this
# repository". À noter : Dependabot version updates fonctionne sans le
# graphe (lecture directe des lockfiles), seules Dependabot alerts et
# cette action en dépendent.

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  review:
    name: Review dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: high
          allow-licenses: >-
            MIT, MIT-0, Apache-2.0, BSD-2-Clause, BSD-3-Clause, ISC, 0BSD,
            Unlicense, CC0-1.0, CC-BY-3.0, CC-BY-4.0, Python-2.0,
            MPL-2.0, BlueOak-1.0.0, Zlib, WTFPL, PSF-2.0, ZPL-2.1
          # Exceptions par paquet (alignées sur la liste
          # `PACKAGE_LICENSE_EXCEPTION_PREFIXES` de scripts/audit/licenses.mjs).
          # @sentry/cli* : outil build-only de @sentry/sveltekit (upload de
          # sourcemaps) en FSL-1.1-MIT (bascule en MIT après 2 ans). Atlas ne
          # l'invoque pas (pas de plugin Vite Sentry, pas de token) et ne le
          # distribue dans aucun paquet publié — Phase 13.3.
          # khroma : utilitaire de couleurs de mermaid (diagrammes de la doc,
          # ADR 0036) sans champ `license` dans son package.json, mais MIT
          # d'après son fichier LICENSE distribué ; build-only.
          # Dépendances Python de dataops/ (catégorie Python, ADR 0055) :
          # typing-extensions est en Python-2.0 mais scancode y détecte un
          # « GPL-1.0-or-later » fantôme (faux positif d'expression composée) ;
          # protobuf est en BSD-3-Clause + un LicenseRef-scancode non reconnu.
          # Les deux sont permissives ; exception ciblée par paquet.
          #
          # Pipeline dbt-duckdb (étape 3) : licences toutes permissives mais mal
          # ou non détectées par l'action (Apache-2.0 pour dbt/dagster-dbt, MIT pour
          # duckdb/orjson/msgpack/typer/zipp, BSD pour gitdb/deepdiff/importlib-metadata) ;
          # gitdb porte un « GPL-1.0-or-later » fantôme scancode (réellement BSD),
          # text-unidecode est dual-licence Artistic-1.0-Perl OR GPL (permissif via Artistic).
          allow-dependencies-licenses: >-
            pkg:npm/%40sentry/cli,
            pkg:npm/%40sentry/cli-darwin,
            pkg:npm/%40sentry/cli-linux-arm,
            pkg:npm/%40sentry/cli-linux-arm64,
            pkg:npm/%40sentry/cli-linux-i686,
            pkg:npm/%40sentry/cli-linux-x64,
            pkg:npm/%40sentry/cli-win32-arm64,
            pkg:npm/%40sentry/cli-win32-i686,
            pkg:npm/%40sentry/cli-win32-x64,
            pkg:npm/khroma,
            pkg:pypi/typing-extensions,
            pkg:pypi/protobuf,
            pkg:pypi/gitdb,
            pkg:pypi/text-unidecode,
            pkg:pypi/dagster-dbt,
            pkg:pypi/dbt-adapters,
            pkg:pypi/dbt-common,
            pkg:pypi/dbt-core,
            pkg:pypi/deepdiff,
            pkg:pypi/duckdb,
            pkg:pypi/importlib-metadata,
            pkg:pypi/msgpack,
            pkg:pypi/orjson,
            pkg:pypi/typer,
            pkg:pypi/zipp
          comment-summary-in-pr: on-failure
