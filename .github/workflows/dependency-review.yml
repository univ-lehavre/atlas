name: Dependency review

# Vérifie chaque PR contre la GitHub Dependency Graph :
#  - bloque toute nouvelle vulnérabilité de sévérité `high` ou `critical`.
#    Les `moderate` et `low` ne bloquent pas — le script `audit:security`
#    (lancé en pre-push et en CI sur le job Audit) garde la couverture
#    pour ces niveaux et peut être durci à `--audit-level=moderate` si
#    on le souhaite (cf. Phase 3.3).
#  - bloque toute nouvelle dépendance avec une licence hors allowlist.
#    L'allowlist est alignée sur `scripts/audit/licenses.mjs` — SPDX
#    canoniques uniquement (les exceptions par package du script local,
#    ex. `fsevents`, sont laissées hors workflow ; à ajouter en
#    `deny-packages: ''` exception si besoin).
#
# Prérequis : Dependency graph doit être activé côté repo (Settings →
# Security → Code security → Dependency graph). Sans ce paramètre,
# l'action échoue avec "Dependency review is not supported on this
# repository". À noter : Dependabot version updates fonctionne sans le
# graphe (lecture directe des lockfiles), seules Dependabot alerts et
# cette action en dépendent.

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  review:
    name: Review dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: high
          # Advisories exemptées (risque résiduel documenté). deepdiff est
          # tiré transitivement par dbt-common (chaîne dagster-dbt==0.29.7 ↔
          # dagster 1.13.7), qui l'épingle deepdiff<8 ; monter à 8.0.0 (la
          # version corrigée) rétrograde dbt-core 1.10→1.7 et rompt
          # l'alignement de version requis par dagster-dbt. Les deux CVE
          # n'exploitent que la désérialisation d'un Delta deepdiff non fiable
          # (GHSA-mw26 : Class Pollution dans Delta → RCE/DoS ; GHSA-54jj :
          # DoS mémoire via SAFE_TO_IMPORT) — dbt n'utilise deepdiff que pour
          # differ des manifests/configs locaux et fiables, jamais pour
          # désérialiser une entrée externe. À lever dès que dagster-dbt
          # acceptera deepdiff>=8.
          #
          # nltk est tiré transitivement par evidently==0.4.40 (détection de
          # drift). GHSA-p4gq-832x-fm9v (path traversal dans nltk.data.load()
          # → lecture de fichier local arbitraire) n'a AUCUNE version corrigée
          # (vulnerableVersionRange <=3.9.4, firstPatchedVersion null) : rien à
          # monter. La surface n'est atteinte que si on passe une entrée non
          # fiable à nltk.data.load() ; le pipeline drift ne compare que des
          # vecteurs numériques (384-dim) et n'appelle jamais cette API. À
          # lever dès qu'upstream publie un correctif.
          allow-ghsas: >-
            GHSA-mw26-5g2v-hqw3, GHSA-54jj-px8x-5w5q,
            GHSA-p4gq-832x-fm9v
          allow-licenses: >-
            MIT, MIT-0, Apache-2.0, BSD-2-Clause, BSD-3-Clause, ISC, 0BSD,
            Unlicense, CC0-1.0, CC-BY-3.0, CC-BY-4.0, Python-2.0,
            MPL-2.0, BlueOak-1.0.0, Zlib, WTFPL, PSF-2.0, ZPL-2.1
          # Exceptions par paquet (alignées sur la liste
          # `PACKAGE_LICENSE_EXCEPTION_PREFIXES` de scripts/audit/licenses.mjs).
          # @sentry/cli* : outil build-only de @sentry/sveltekit (upload de
          # sourcemaps) en FSL-1.1-MIT (bascule en MIT après 2 ans). Atlas ne
          # l'invoque pas (pas de plugin Vite Sentry, pas de token) et ne le
          # distribue dans aucun paquet publié — Phase 13.3.
          # khroma : utilitaire de couleurs de mermaid (diagrammes de la doc,
          # ADR 0036) sans champ `license` dans son package.json, mais MIT
          # d'après son fichier LICENSE distribué ; build-only.
          # Dépendances Python de dataops/ (catégorie Python, ADR 0055) :
          # typing-extensions est en Python-2.0 mais scancode y détecte un
          # « GPL-1.0-or-later » fantôme (faux positif d'expression composée) ;
          # protobuf est en BSD-3-Clause + un LicenseRef-scancode non reconnu.
          # Les deux sont permissives ; exception ciblée par paquet.
          #
          # Pipeline dbt-duckdb (étape 3) : licences toutes permissives mais mal
          # ou non détectées par l'action (Apache-2.0 pour dbt/dagster-dbt, MIT pour
          # duckdb/orjson/msgpack/typer/zipp, BSD pour gitdb/deepdiff/importlib-metadata) ;
          # gitdb porte un « GPL-1.0-or-later » fantôme scancode (réellement BSD),
          # text-unidecode est dual-licence Artistic-1.0-Perl OR GPL (permissif via Artistic).
          #
          # Great Expectations (étape 3.5a, qualité des données) : great-expectations
          # (Apache-2.0) et sa fermeture transitive neuve — toutes permissives (MIT pour
          # cffi/narwhals/pyparsing/ruamel-yaml/tzlocal/mistune, BSD pour
          # altair/numpy/pandas/scipy/pycparser, Apache-2.0 OR BSD pour cryptography, MIT
          # pour marshmallow) mais plusieurs ne déclarent leur licence qu'en classifier ou
          # blob de copyright → l'action les remonte « unknown » (avertissement, pas blocage).
          #
          # Détection de drift (étape MLOps 1→2) : evidently (Apache-2.0) et sa
          # fermeture transitive neuve, toutes permissives mais mal détectées par
          # scancode : evidently se remonte « unknown-license-reference »,
          # regex est Apache-2.0 AND CNRI-Python (CNRI permissive, hors allowlist),
          # statsmodels est BSD AND un « public-domain-disclaimer » LicenseRef qui
          # casse l'expression composée. Exceptions ciblées par paquet.
          #
          # Run worker Dagster (ADR 0063/0086 ; ADR 0055 : Python hors gate Node) :
          # dagster-postgres et dagster-k8s (Apache-2.0, métadonnées PyPI nulles →
          # « unknown ») sont REQUIS dans l'image code-location pour que le pod de run
          # du K8sRunLauncher rehydrate l'instance Postgres. Leurs transitifs neufs :
          # - aiohttp (Apache-2.0 AND MIT, remonté « unknown ») et la chaîne aio-libs
          #   (aiosignal/frozenlist/propcache/yarl/multidict/async-timeout : Apache-2.0,
          #   déjà dans l'allowlist) ;
          # - aiohappyeyeballs : RÉELLEMENT PSF-2.0 (permissive) ; scancode y détecte un
          #   « GPL-1.0-or-later » fantôme via une expression composée → faux positif ;
          # - psycopg2-binary : SEUL vrai copyleft (LGPL-2.0/3.0). Risque résiduel ASSUMÉ
          #   et borné : extension C liée DYNAMIQUEMENT (usage LGPL standard), tirée par
          #   dagster-postgres, jamais modifiée ni redistribuée comme œuvre dérivée, et
          #   confinée au pod de run. Le code applicatif n'utilise JAMAIS psycopg2
          #   directement (index_load passe par DuckDB ATTACH TYPE postgres). À retirer si
          #   dagster-postgres offre un backend non-LGPL.
          allow-dependencies-licenses: >-
            pkg:pypi/dagster-postgres,
            pkg:pypi/dagster-k8s,
            pkg:pypi/aiohttp,
            pkg:pypi/aiohappyeyeballs,
            pkg:pypi/psycopg2-binary,
            pkg:npm/%40sentry/cli,
            pkg:npm/%40sentry/cli-darwin,
            pkg:npm/%40sentry/cli-linux-arm,
            pkg:npm/%40sentry/cli-linux-arm64,
            pkg:npm/%40sentry/cli-linux-i686,
            pkg:npm/%40sentry/cli-linux-x64,
            pkg:npm/%40sentry/cli-win32-arm64,
            pkg:npm/%40sentry/cli-win32-i686,
            pkg:npm/%40sentry/cli-win32-x64,
            pkg:npm/khroma,
            pkg:pypi/typing-extensions,
            pkg:pypi/protobuf,
            pkg:pypi/gitdb,
            pkg:pypi/text-unidecode,
            pkg:pypi/dagster-dbt,
            pkg:pypi/dbt-adapters,
            pkg:pypi/dbt-common,
            pkg:pypi/dbt-core,
            pkg:pypi/deepdiff,
            pkg:pypi/duckdb,
            pkg:pypi/importlib-metadata,
            pkg:pypi/msgpack,
            pkg:pypi/orjson,
            pkg:pypi/typer,
            pkg:pypi/zipp,
            pkg:pypi/great-expectations,
            pkg:pypi/altair,
            pkg:pypi/cffi,
            pkg:pypi/cryptography,
            pkg:pypi/marshmallow,
            pkg:pypi/mistune,
            pkg:pypi/narwhals,
            pkg:pypi/numpy,
            pkg:pypi/pandas,
            pkg:pypi/pycparser,
            pkg:pypi/pyparsing,
            pkg:pypi/ruamel-yaml,
            pkg:pypi/scipy,
            pkg:pypi/tzlocal,
            pkg:pypi/evidently,
            pkg:pypi/regex,
            pkg:pypi/statsmodels
          comment-summary-in-pr: on-failure
