name: Gitleaks

# Détecte les secrets potentiellement committés (tokens REDCap, clés
# Appwrite, clés GitHub App, etc.). Couvre l'historique complet de la PR ;
# le pre-commit hook lefthook scanne uniquement les fichiers stagés.
#
# Note technique : on utilise le binaire OSS `gitleaks` directement (et pas
# `gitleaks-action`) car ce dernier est devenu payant pour les organisations
# GitHub depuis sa v2. Le binaire reste sous licence MIT.
#
# Configuration : .gitleaks.toml (à la racine).

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: gitleaks-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    name: Scan for secrets
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Full history so gitleaks can scan all commits in the PR.
          fetch-depth: 0

      - name: Install gitleaks binary (OSS)
        env:
          GITLEAKS_VERSION: "8.30.1"
          # Checksum sha256 de l'archive linux_x64, épinglé EN DUR dans le
          # workflow (pas seulement téléchargé depuis la même source que le
          # binaire : un attaquant qui pousse une archive vérolée pousserait
          # aussi son checksums.txt). On vérifie l'intégrité avant d'extraire
          # — l'outil anti-fuite ne doit pas être lui-même installé sans
          # garantie d'intégrité. Mettre à jour ce SHA en même temps que
          # GITLEAKS_VERSION (cf. gitleaks_<ver>_checksums.txt amont).
          GITLEAKS_SHA256: "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb"
        run: |
          set -euo pipefail
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            -o /tmp/gitleaks.tar.gz
          echo "${GITLEAKS_SHA256}  /tmp/gitleaks.tar.gz" | sha256sum -c -
          tar -xz -C /tmp -f /tmp/gitleaks.tar.gz gitleaks
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks
          rm -f /tmp/gitleaks.tar.gz
          gitleaks version

      - name: Scan repository (PR diff)
        if: github.event_name == 'pull_request'
        run: |
          set -euo pipefail
          # On a PR, scan the commits added by the branch only (faster) but
          # still load the full repo so .gitleaks.toml allowlist works.
          gitleaks detect \
            --source . \
            --config .gitleaks.toml \
            --log-opts "${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}" \
            --redact \
            --verbose \
            --no-banner

      - name: Scan repository (push to main)
        if: github.event_name == 'push'
        run: |
          set -euo pipefail
          # Scan only the commits introduced by this push, not the full
          # history. The pre-PR-#125 trademark rename left a long tail of
          # historical paths containing test fixtures with token-like
          # strings; a `--log-opts "--all"` scan therefore re-surfaces the
          # same fixtures on every push (cf. PR #141, #143, …).
          # Protection against newly-leaked secrets remains: the PR scan
          # catches them in the diff, and this step re-checks them on
          # merge. For a full audit, use the `workflow_dispatch` trigger
          # below.
          gitleaks detect \
            --source . \
            --config .gitleaks.toml \
            --log-opts "${{ github.event.before }}..${{ github.event.after }}" \
            --redact \
            --verbose \
            --no-banner

      - name: Scan repository (manual full-history audit)
        if: github.event_name == 'workflow_dispatch'
        run: |
          set -euo pipefail
          gitleaks detect \
            --source . \
            --config .gitleaks.toml \
            --redact \
            --verbose \
            --no-banner
