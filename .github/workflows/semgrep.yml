name: Semgrep

# Phase 1.2 DevSecOps : SAST complémentaire à CodeQL.
#
# Semgrep apporte deux choses que CodeQL ne couvre pas dans atlas :
#  - une matrice de règles spécifiques à Svelte (`p/svelte`), donc une
#    analyse réelle des `<script>` SvelteKit que CodeQL ignore (cf. note
#    en tête de codeql.yml) ;
#  - les patterns OWASP Top 10 packagés (`p/owasp-top-ten`) que CodeQL
#    couvre partiellement via `security-extended` mais avec un angle
#    différent.
#
# Trigger : PR uniquement, pour limiter le bruit et garder le scan
# proche du diff. Les findings ERROR (severity 'error') font échouer la
# PR ; WARNING/INFO restent visibles mais n'empêchent pas le merge.

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  semgrep:
    name: Semgrep
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Dependabot ne doit pas pousser de commit qui passe par Semgrep —
    # ses PRs sont audit-only sur la déclaration de version.
    if: github.actor != 'dependabot[bot]'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v6.0.0
        with:
          python-version: "3.13"

      - name: Install Semgrep
        # Pinned to a known-good release. Bump manually until the
        # `docker` or `pip` ecosystem is added to dependabot.yml.
        run: python3 -m pip install --user "semgrep==1.137.0"

      - name: Run Semgrep
        run: |
          semgrep ci \
            --config=p/typescript \
            --config=p/svelte \
            --config=p/owasp-top-ten \
            --severity=ERROR \
            --metrics=off
        env:
          # PRs sont scannées en mode diff (base..head) automatiquement
          # quand SEMGREP_BASELINE_REF est posé.
          SEMGREP_BASELINE_REF: ${{ github.event.pull_request.base.sha }}
