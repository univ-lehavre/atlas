name: Semgrep

# Phase 1.2 DevSecOps : SAST complémentaire à CodeQL.
#
# Semgrep apporte deux choses que CodeQL ne couvre pas dans atlas :
#  - les règles `p/typescript` (langage que CodeQL traite via JS, donc
#    moins de patterns TS-spécifiques) ;
#  - les patterns OWASP Top 10 packagés (`p/owasp-top-ten`) que CodeQL
#    couvre partiellement via `security-extended` mais avec un angle
#    différent.
#
# Note Svelte : il n'y a pas de pack `p/svelte` officiel dans le
# registry Semgrep (HTTP 404 à l'install). Les patterns Svelte sont
# couverts en amont par les règles ESLint strictes activées en Phase
# 1.1 (`svelte/no-at-html-tags`, `svelte/no-target-blank`,
# `svelte/no-dom-manipulating`, etc., cf.
# `config/shared-config/eslint/svelte.js`). À ré-évaluer si un pack
# Semgrep Svelte voit le jour.
#
# Trigger : PR uniquement, pour limiter le bruit et garder le scan
# proche du diff. Les findings ERROR (severity 'error') font échouer la
# PR ; WARNING/INFO restent visibles mais n'empêchent pas le merge.
#
# Commande : on utilise `semgrep scan` (OSS, sans backend Semgrep
# Cloud) plutôt que `semgrep ci` qui exige SEMGREP_APP_TOKEN ou bascule
# en mode dégradé. Le diff PR est calculé localement via
# `git merge-base origin/<base_ref> HEAD` puis passé à
# `--baseline-commit`. C'est pour cela que `actions/checkout` doit
# utiliser `fetch-depth: 0` : sans l'historique complet, `git merge-base`
# échoue avec exit 128 et le scan part en échec avant d'avoir tourné.
# En `workflow_dispatch` (pas de PR), on retombe sur un scan full repo.

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  semgrep:
    name: Semgrep
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Dependabot ne doit pas pousser de commit qui passe par Semgrep —
    # ses PRs sont audit-only sur la déclaration de version.
    if: github.actor != 'dependabot[bot]'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          # Historique complet requis pour `git merge-base` (cf. en-tête).
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.0.0
        with:
          python-version: "3.13"

      - name: Install Semgrep
        # Pinned to a known-good release. Bump manually until the
        # `docker` or `pip` ecosystem is added to dependabot.yml.
        run: python3 -m pip install --user "semgrep==1.137.0"

      - name: Run Semgrep
        # `BASE_REF` est posé via `env:` plutôt qu'interpolé directement
        # dans le `run:` pour éviter l'injection shell — c'est le pattern
        # recommandé par Semgrep lui-même (rule sg.run/pkzk, sur lequel
        # ce workflow se serait fait jeter à sa propre première exécution).
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          if [ -n "$BASE_REF" ]; then
            BASELINE=$(git merge-base "origin/$BASE_REF" HEAD)
            semgrep scan \
              --config p/typescript \
              --config p/owasp-top-ten \
              --baseline-commit "$BASELINE" \
              --severity ERROR \
              --error \
              --metrics=off
          else
            # workflow_dispatch : pas de base PR, on scanne tout le repo.
            semgrep scan \
              --config p/typescript \
              --config p/owasp-top-ten \
              --severity ERROR \
              --error \
              --metrics=off
          fi
