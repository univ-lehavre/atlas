name: Images

# Construit les images de déploiement de toutes les unités (apps SvelteKit +
# service Hono) et, depuis `main`, les publie sur GHCR (ADR 0043). Sur PR : build
# + smoke healthcheck, sans push — ferme la dérive silencieuse des Dockerfile
# (#314). Les apps à secrets (amarre, ecrin, find-an-expert, sillage) ont rejoint
# la matrice après migration de `static/private` vers `dynamic/private` (#324) :
# leurs secrets sont lus au runtime, donc leurs images sont déployables.

# PAS de filtre `paths:` au niveau workflow : les jobs de cette matrice
# (atlas-dashboard, crf-dashboard, crf) sont des CHECKS REQUIS (ruleset `main`).
# Un workflow filtré par `paths` ne démarre pas quand le diff ne matche pas (p. ex.
# une PR dataops-only) → les checks requis restent « Expected » sans jamais être
# rapportés → la PR est bloquée à vie. On reproduit donc le pattern de `ci.yml`
# (ADR 0034/0016) : le job tourne TOUJOURS, on court-circuite au niveau des STEPS
# via le drapeau `RUN` (calculé par le job `changes`). Un job court-circuité sort
# `success`, jamais `skipped` → le check requis est satisfait sans rien builder.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Détecte si le diff touche au périmètre « images » (Dockerfile, apps, packages,
  # ui, config, lockfile, ce workflow). Sur push (main), on force `run=true`.
  changes:
    name: Detect image changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      run: ${{ steps.filter.outputs.run }}
      # Drapeaux PAR IMAGE. Chaque job de matrice lit le sien (env BUILD) pour ne
      # builder/scanner/smoke QUE si son périmètre a changé. La matrice reste
      # STATIQUE à 7 entrées (on ne la réduit JAMAIS via fromJSON : les noms
      # atlas-dashboard/crf-dashboard/crf sont des checks requis → une entrée
      # absente laisse le check « Expected »/Pending et bloque le merge, ADR
      # 0034). On court-circuite donc au niveau STEP, pas matrice.
      build_atlas_dashboard: ${{ steps.filter.outputs.build_atlas_dashboard }}
      build_crf_dashboard: ${{ steps.filter.outputs.build_crf_dashboard }}
      build_crf: ${{ steps.filter.outputs.build_crf }}
      build_amarre: ${{ steps.filter.outputs.build_amarre }}
      build_ecrin: ${{ steps.filter.outputs.build_ecrin }}
      build_find_an_expert: ${{ steps.filter.outputs.build_find_an_expert }}
      build_sillage: ${{ steps.filter.outputs.build_sillage }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Classify changed files
        id: filter
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          # Liste des images (clé de sortie = nom de matrice, `-` → `_`).
          all_images="atlas_dashboard crf_dashboard crf amarre ecrin find_an_expert sillage"

          emit_all() {
            # Active toutes les images (push main, ou changement transverse).
            echo "run=true" >> "$GITHUB_OUTPUT"
            for img in $all_images; do echo "build_${img}=true" >> "$GITHUB_OUTPUT"; done
          }

          if [ -z "${BASE_SHA}" ]; then
            echo "Push (pas une PR) → build complet."
            emit_all
            exit 0
          fi

          files="$(git diff --name-only "${BASE_SHA}" "${HEAD_SHA}")"
          echo "Fichiers modifiés :"; echo "${files}"

          run=false
          # Un changement TRANSVERSE (dépendance partagée, lockfile, config de
          # build, ce workflow) peut affecter n'importe quelle image → on les
          # rebuild toutes. Un changement spécifique à une app/au service crf
          # n'active QUE l'image correspondante.
          transverse=false
          b_atlas_dashboard=false; b_crf_dashboard=false; b_crf=false
          b_amarre=false; b_ecrin=false; b_find_an_expert=false; b_sillage=false
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            case "$f" in
              packages/*|ui/*|config/*) transverse=true; run=true ;;
              pnpm-lock.yaml|.nvmrc|.dockerignore|.github/workflows/images.yml) transverse=true; run=true ;;
              apps/atlas-dashboard/*) b_atlas_dashboard=true; run=true ;;
              apps/crf-dashboard/*) b_crf_dashboard=true; run=true ;;
              services/crf/*) b_crf=true; run=true ;;
              apps/amarre/*) b_amarre=true; run=true ;;
              apps/ecrin/*) b_ecrin=true; run=true ;;
              apps/find-an-expert/*) b_find_an_expert=true; run=true ;;
              apps/sillage/*) b_sillage=true; run=true ;;
            esac
          done <<< "${files}"

          if [ "$transverse" = "true" ]; then
            echo "Changement transverse détecté → toutes les images."
            emit_all
            echo "Résultat : run=true (toutes)"
            exit 0
          fi

          {
            echo "run=${run}"
            echo "build_atlas_dashboard=${b_atlas_dashboard}"
            echo "build_crf_dashboard=${b_crf_dashboard}"
            echo "build_crf=${b_crf}"
            echo "build_amarre=${b_amarre}"
            echo "build_ecrin=${b_ecrin}"
            echo "build_find_an_expert=${b_find_an_expert}"
            echo "build_sillage=${b_sillage}"
          } >> "$GITHUB_OUTPUT"
          echo "Résultat : run=${run} (false → checks requis émis en succès sans build)"

  images:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [changes]
    env:
      # RUN : le périmètre images est-il concerné du tout (sinon job = no-op
      # success, ADR 0034). BUILD : CETTE image doit-elle réellement être
      # construite ? Trois conditions ET :
      #   1. l'image est concernée par le diff (`matrix.flag`), ET
      #   2. soit c'est un push sur `main` (on builde/pousse toujours tout ce qui
      #      a changé), soit c'est une image REQUISE (check bloquant → on la
      #      builde aussi sur PR pour attraper un Dockerfile cassé avant merge).
      # Conséquence : les 4 apps NON requises (amarre/ecrin/find-an-expert/
      # sillage) ne sont PAS buildées sur PR (elles sortent `success` sans rien
      # faire) ; elles le sont sur `main`. Les 3 requises restent buildées sur PR.
      RUN: ${{ needs.changes.outputs.run == 'true' }}
      BUILD: ${{ needs.changes.outputs[matrix.flag] == 'true' && (github.event_name == 'push' || matrix.required) }}
      # Version de Trivy + checksum sha256 de l'archive Linux-64bit, au niveau
      # job pour être lisibles à la fois par le step d'installation (vérification
      # d'intégrité) et par la clé de cache de la DB de vulnérabilités. Mettre à
      # jour les deux ensemble (cf. trivy_<ver>_checksums.txt amont).
      TRIVY_VERSION: "0.71.2"
      TRIVY_SHA256: "0510e71e2fd39bf863856d499c8dc19feb4e7336546394c502a8f5cc7ab27460"
    permissions:
      contents: read
      # Nécessaire pour pousser sur GHCR depuis `main` (no-op sur PR).
      packages: write
      # OIDC keyless : cosign lie la signature à l'identité du workflow,
      # sans clé privée à stocker (ADR 0069). No-op sur PR (on ne signe pas).
      id-token: write
      # Remonte le rapport de scan (SARIF) dans l'onglet Security du dépôt,
      # sur le modèle de codeql.yml (ADR 0069, scan « partout »).
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        # Toutes les apps SvelteKit déployables (config runtime/publique) plus le
        # service Hono. amarre, ecrin, find-an-expert et sillage ont rejoint la
        # matrice après la migration de leurs secrets de `$env/static/private`
        # (figé au build) vers `$env/dynamic/private` (lu au runtime) — issue #324,
        # ADR 0033. Leurs secrets sont lus en late-binding via `$lib/server/env`
        # (getters), donc le smoke (GET sur l'endpoint de santé) ne les touche pas ;
        # les `run_env` factices ci-dessous sont une ceinture-bretelles (et
        # documentent les secrets requis au déploiement réel).
        # `required` = ce job est un CHECK REQUIS (ruleset `main`). Seuls
        # atlas-dashboard, crf-dashboard et crf le sont. Les 4 autres apps ne
        # bloquent pas le merge : on ne les builde/scanne/smoke QUE sur `main`
        # (push), pas sur PR — sur PR elles sortent `success` sans rien faire.
        # Les 3 requises, elles, restent buildées sur PR (détection Dockerfile
        # cassé avant merge). Voir le gate `env.BUILD` du job.
        include:
          - name: atlas-dashboard
            flag: build_atlas_dashboard
            required: true
            dockerfile: apps/atlas-dashboard/Dockerfile
            image: atlas-dashboard
            health_path: /
          - name: crf-dashboard
            flag: build_crf_dashboard
            required: true
            dockerfile: apps/crf-dashboard/Dockerfile
            image: atlas-crf-dashboard
            health_path: /
          - name: crf
            flag: build_crf
            required: true
            dockerfile: services/crf/Dockerfile
            image: atlas-crf
            health_path: /health
            # Le service refuse de démarrer sans ces variables (fail-closed,
            # ADR 0041). Valeurs factices au format attendu, pour le smoke seul.
            run_env: >-
              -e REDCAP_API_URL=https://redcap.example.com/api
              -e REDCAP_API_TOKEN=ABCDEF0123456789ABCDEF0123456789
              -e CRF_AUTH_TOKEN=smoke-bearer
          # Apps migrées vers `$env/dynamic/private` (#324). `run_env` factices :
          # secrets lus au runtime via `$lib/server/env`, valeurs au format attendu
          # pour le smoke seul (aucune connexion réelle).
          - name: amarre
            flag: build_amarre
            required: false
            dockerfile: apps/amarre/Dockerfile
            image: atlas-amarre
            health_path: /
            run_env: >-
              -e APPWRITE_KEY=smoke-appwrite-key
              -e REDCAP_API_TOKEN=ABCDEF0123456789ABCDEF0123456789
              -e ALLOWED_DOMAINS_REGEXP=@example\.org
          - name: ecrin
            flag: build_ecrin
            required: false
            dockerfile: apps/ecrin/Dockerfile
            image: atlas-ecrin
            health_path: /
            run_env: >-
              -e APPWRITE_KEY=smoke-appwrite-key
              -e APPWRITE_DB_ID=smoke-db
              -e APPWRITE_TABLE_ID_ALLOWED_EMAIL_DOMAINS_TO_SUBSCRIBE=smoke-table
              -e REDCAP_API_TOKEN=ABCDEF0123456789ABCDEF0123456789
              -e REDCAP_URL=https://redcap.example.com/api/
          - name: find-an-expert
            flag: build_find_an_expert
            required: false
            dockerfile: apps/find-an-expert/Dockerfile
            image: atlas-find-an-expert
            health_path: /
            run_env: >-
              -e APPWRITE_ENDPOINT=https://appwrite.example.com/v1
              -e APPWRITE_PROJECT=smoke-project
              -e APPWRITE_KEY=smoke-appwrite-key
              -e APPWRITE_DATABASE_ID=smoke-db
              -e APPWRITE_CONSENT_EVENTS_COLLECTION_ID=smoke-consent-events
              -e APPWRITE_CURRENT_CONSENTS_COLLECTION_ID=smoke-current-consents
              -e ALLOWED_DOMAINS_REGEXP=@example\.org
          - name: sillage
            flag: build_sillage
            required: false
            dockerfile: apps/sillage/Dockerfile
            image: atlas-sillage
            health_path: /
            run_env: >-
              -e APPWRITE_KEY=smoke-appwrite-key
              -e REDCAP_API_TOKEN=ABCDEF0123456789ABCDEF0123456789
              -e ALLOWED_DOMAINS_REGEXP=@example\.org
    steps:
      # Court-circuit (ADR 0034/0016) : si le diff ne touche pas le périmètre
      # images (PR dataops-only…), tous les steps sont sautés et le job sort
      # `success` → le check requis est satisfait sans build.
      - if: env.RUN == 'true' && env.BUILD == 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - if: env.RUN == 'true' && env.BUILD == 'true'
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      # Métadonnées (tags/labels). Sur PR, le push est désactivé plus bas ;
      # les tags ne servent alors qu'au build local pour le smoke.
      - name: Compute image metadata
        id: meta
        if: env.RUN == 'true' && env.BUILD == 'true'
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          # Pas de `latest` comme référence de déploiement (ADR 0033/0043).
          # format=long : le tag SHA est `sha-<40 chars>` (= `sha-${{ github.sha }}`),
          # pour que le retag local `:smoke` (étape smoke sur main) le retrouve.
          tags: |
            type=sha,format=long,prefix=sha-
            type=raw,value=pr-${{ github.event.pull_request.number }},enable=${{ github.event_name == 'pull_request' }}

      # Login GHCR uniquement sur `main` (les PR ne publient pas).
      - name: Log in to GHCR
        if: env.RUN == 'true' && env.BUILD == 'true' && github.event_name == 'push'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Tag sémver lisible (la version du package.json de l'unité). Ajouté en
      # plus du tag SHA immuable, sur `main` seulement.
      - name: Read package version
        if: env.RUN == 'true' && env.BUILD == 'true' && github.event_name == 'push'
        id: ver
        run: |
          set -euo pipefail
          dir="$(dirname "${{ matrix.dockerfile }}")"
          version="$(node -p "require('./${dir}/package.json').version")"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      # Build local pour le scan + le smoke, sur PR ET main. `load: true` charge
      # l'image dans le démon, ce qui EXIGE un build mono-plateforme SANS
      # attestation : `provenance`/`sbom` produiraient une manifest-list, que
      # l'exporteur `docker` (load) ne sait pas exporter — `docker exporter does
      # not currently support exporting manifest lists`. Les attestations sont
      # donc portées par le build de push (ci-dessous), pas par celui-ci.
      # L'ordre est imposé par l'ADR 0069 : on construit en local, on SCANNE,
      # et seulement ensuite (sur main) on pousse — jamais l'inverse.
      - name: Build image (load for scan + smoke)
        id: build-local
        if: env.RUN == 'true' && env.BUILD == 'true'
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          load: true
          push: false
          tags: ${{ matrix.image }}:smoke
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

      # Scan de vulnérabilité de l'image (ADR 0069 — geste à plus fort retour
      # sur effort, livré EN PREMIER, avant toute signature). Tourne sur PR
      # comme sur main : une CVE CRITICAL/HIGH dans la couche de base (Alpine,
      # Node, OpenSSL…) casse le run avant qu'elle n'atteigne (ou ne reste
      # dans) le registre. On scanne l'image construite localement
      # (`:smoke`, chargée via `load: true` sur les deux contextes), pas un tag
      # distant. Les exceptions amont sans correctif se consignent dans un
      # `.trivyignore` versionné et commenté (garde-fou ADR 0069), pas en
      # abaissant le seuil global.
      # On installe Trivy par son script d'installation officiel plutôt que via
      # une action tierce. Les actions `aquasecurity/trivy-action` et
      # `aquasecurity/setup-trivy` se sont toutes deux révélées trop fragiles ici :
      # la première déclare un `uses: setup-trivy@v0.2.2` (tag 404) résolu au
      # `Set up job` même derrière un `if`, la seconde échoue à l'installation.
      # Le script officiel, épinglé à une version, va dans `/usr/local/bin`
      # (déjà dans le PATH) et ne dépend d'aucun tag d'action.
      # Installe Trivy depuis l'archive de release versionnée + vérification du
      # checksum sha256 (TRIVY_VERSION / TRIVY_SHA256 au niveau job), même
      # garde-fou que kubeconform (ci.yml). On évite ainsi `install.sh | sudo sh`
      # (script amont mutable, exécuté en root dans un job à `packages:write` +
      # `id-token:write`).
      - name: Install Trivy
        if: env.RUN == 'true' && env.BUILD == 'true'
        run: |
          set -euo pipefail
          url="https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz"
          curl -fsSL "$url" -o trivy.tar.gz
          echo "${TRIVY_SHA256}  trivy.tar.gz" | sha256sum -c -
          tar -xzf trivy.tar.gz trivy
          sudo install trivy /usr/local/bin/
          rm -f trivy.tar.gz trivy
          trivy --version

      # Comportement défini par l'ADR 0069 : rapport SARIF, blocage sur
      # CRITICAL/HIGH, vulnérabilités sans correctif ignorées, exceptions amont
      # consignées dans `.trivyignore` versionné.
      # Cache la base de vulnérabilités Trivy (~/.cache/trivy) entre les jobs de
      # la matrice et entre les runs. Sans cache, CHACUN des 7 jobs re-télécharge
      # la DB complète depuis ghcr.io/aquasecurity/trivy-db à chaque run — coût
      # réseau répété et exposition au rate-limit GHCR (cause classique de
      # `failed to download vulnerability DB`). Clé datée : la DB se rafraîchit au
      # plus une fois par jour, mais est partagée intra-journée. `restore-keys`
      # dégrade vers la dernière DB du même OS si la clé exacte manque (mieux
      # qu'un cold start). `today` est calculé par un step (l'horloge du runner
      # est réelle).
      - name: Compute cache date
        id: date
        if: env.RUN == 'true' && env.BUILD == 'true'
        run: echo "today=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Cache Trivy vulnerability DB
        if: env.RUN == 'true' && env.BUILD == 'true'
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.cache/trivy
          key: trivy-db-${{ env.TRIVY_VERSION }}-${{ steps.date.outputs.today }}
          restore-keys: |
            trivy-db-${{ env.TRIVY_VERSION }}-

      - name: Scan image for vulnerabilities
        id: scan
        if: env.RUN == 'true' && env.BUILD == 'true'
        env:
          # Pointe Trivy vers le répertoire mis en cache ci-dessus.
          TRIVY_CACHE_DIR: ~/.cache/trivy
        run: |
          trivy image \
            --format sarif \
            --output "trivy-${{ matrix.name }}.sarif" \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            --ignorefile .trivyignore \
            --exit-code 1 \
            "${{ matrix.image }}:smoke"

      # Remonte le rapport SARIF dans l'onglet Security (même mécanisme que
      # codeql.yml). `if: always()` : on veut le rapport même quand le scan a
      # échoué sur une CVE bloquante (sinon l'alerte ne serait jamais visible).
      - name: Upload Trivy scan results to Security tab
        if: env.RUN == 'true' && env.BUILD == 'true' && always()
        # Même action (épinglée par SHA) et même mécanisme que codeql.yml.
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: trivy-${{ matrix.name }}.sarif
          category: trivy-${{ matrix.name }}

      # Smoke : démarrer le conteneur et vérifier que le HEALTHCHECK passe
      # (l'app/le service répond sur son endpoint de santé). Build cassé,
      # dépendance runtime manquante, mauvais port → échec ici.
      - name: Smoke test (start + healthcheck)
        if: env.RUN == 'true' && env.BUILD == 'true'
        shell: bash
        env:
          # Les trois unités exposent 3000 (adapter-node SvelteKit + service
          # Hono, cf. leurs Dockerfile : ENV PORT=3000 / EXPOSE 3000). On code la
          # valeur en clair : aucune entrée de matrice ne surcharge le port
          # aujourd'hui. Si une unité change de port, ajouter `port:` à sa ligne
          # de matrice et restaurer `${{ matrix.port || '3000' }}`.
          PORT: "3000"
          HEALTH_PATH: ${{ matrix.health_path }}
          RUN_ENV: ${{ matrix.run_env || '' }}
        run: |
          set -euo pipefail
          # RUN_ENV est une liste de drapeaux `-e` à découper en mots : le
          # non-quoting est volontaire (la directive shellcheck ci-dessous
          # n'admet pas de commentaire `--`, il doit être sur sa propre ligne).
          # shellcheck disable=SC2086
          cid="$(docker run -d -p ${PORT}:${PORT} ${RUN_ENV} ${{ matrix.image }}:smoke)"
          echo "Conteneur démarré: ${cid}"
          ok=false
          for i in $(seq 1 30); do
            code="$(curl -s -o /dev/null -w '%{http_code}' "http://127.0.0.1:${PORT}${HEALTH_PATH}" || true)"
            if [ "${code}" = "200" ]; then
              echo "Healthcheck OK (HTTP 200) après ${i}s."
              ok=true
              break
            fi
            sleep 1
          done
          if [ "${ok}" != "true" ]; then
            echo "::error::Healthcheck KO pour ${{ matrix.name }} (dernier code: ${code:-aucun})"
            docker logs "${cid}" || true
            docker rm -f "${cid}" >/dev/null 2>&1 || true
            exit 1
          fi
          docker rm -f "${cid}" >/dev/null 2>&1 || true

      # Push ENSUITE (ADR 0069 — ordre imposé : scan + smoke d'abord, registre
      # ensuite). UNIQUEMENT sur `main`. Ce build-ci porte les attestations
      # (`provenance`/`sbom` → manifest-list), incompatibles avec le `load` du
      # build local plus haut : c'est pour cela qu'ils sont sur DEUX builds
      # distincts. Le cache GHA (couches partagées avec le build local) rend ce
      # second build quasi gratuit. Il expose le `digest` que cosign signe.
      # Tags : SEULEMENT des tags GHCR (registre où l'on est loggé) — pas le tag
      # local `:smoke`, que Docker résoudrait en `docker.io/library/<image>`
      # (push Docker Hub → 401).
      - name: Push image (attested)
        id: build
        if: env.RUN == 'true' && env.BUILD == 'true' && github.event_name == 'push'
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ steps.meta.outputs.tags }}
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:${{ steps.ver.outputs.version }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

      # Signature ENSUITE (ADR 0069 — ordre imposé : le scan d'abord, la
      # signature ensuite). UNIQUEMENT sur `main` : aucun jeton OIDC de
      # signature n'est délivré à une PR (les PR scannent mais ne signent ni ne
      # publient). On n'arrive ici que si le scan ci-dessus a réussi : on ne
      # signe jamais une image qu'on n'a pas scannée (garde-fou « digest et
      # scan couplés »).
      - name: Install cosign
        if: env.RUN == 'true' && env.BUILD == 'true' && github.event_name == 'push'
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      # Signe le DIGEST sha256 de l'image (immuable), pas un tag mutable, en
      # mode keyless : `cosign` obtient un jeton OIDC GitHub Actions
      # (`id-token: write`) et lie la signature à l'identité du workflow,
      # attestée publiquement par Sigstore (journal de transparence). La
      # provenance SLSA et le SBOM CycloneDX par image sont déjà rattachés au
      # même digest par build-push-action (provenance:true / sbom:true).
      - name: Sign image digest (cosign keyless)
        if: env.RUN == 'true' && env.BUILD == 'true' && github.event_name == 'push'
        env:
          COSIGN_EXPERIMENTAL: "1"
          IMAGE: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          cosign sign --yes "${IMAGE}@${DIGEST}"

      # Court-circuit par image (ADR 0034) : cette image n'est pas concernée par
      # le diff (PR qui ne touche qu'une autre app, sans changement transverse).
      # Tous les steps coûteux sont sautés et le job sort `success` → le check
      # requis `${{ matrix.name }}` est satisfait sans rien builder.
      - name: Skipped (image hors périmètre du diff)
        if: env.RUN != 'true' || env.BUILD != 'true'
        run: echo "Image ${{ matrix.name }} non impactée par ce diff — build/scan/smoke sautés (ADR 0034)."
