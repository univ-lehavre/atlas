name: Images

# Construit les images de déploiement de toutes les unités (apps SvelteKit +
# service Hono) et, depuis `main`, les publie sur GHCR (ADR 0043). Sur PR : build
# + smoke healthcheck, sans push — ferme la dérive silencieuse des Dockerfile
# (#314). Les apps à secrets (amarre, ecrin, find-an-expert, sillage) ont rejoint
# la matrice après migration de `static/private` vers `dynamic/private` (#324) :
# leurs secrets sont lus au runtime, donc leurs images sont déployables.

# PAS de filtre `paths:` au niveau workflow : les jobs de cette matrice
# (atlas-dashboard, crf-dashboard, crf) sont des CHECKS REQUIS (ruleset `main`).
# Un workflow filtré par `paths` ne démarre pas quand le diff ne matche pas (p. ex.
# une PR dataops-only) → les checks requis restent « Expected » sans jamais être
# rapportés → la PR est bloquée à vie. On reproduit donc le pattern de `ci.yml`
# (ADR 0034/0016) : le job tourne TOUJOURS, on court-circuite au niveau des STEPS
# via le drapeau `RUN` (calculé par le job `changes`). Un job court-circuité sort
# `success`, jamais `skipped` → le check requis est satisfait sans rien builder.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Détecte si le diff touche au périmètre « images » (Dockerfile, apps, packages,
  # ui, config, lockfile, ce workflow). Sur push (main), on force `run=true`.
  changes:
    name: Detect image changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      run: ${{ steps.filter.outputs.run }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Classify changed files
        id: filter
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          if [ -z "${BASE_SHA}" ]; then
            echo "Push (pas une PR) → build complet."
            echo "run=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          files="$(git diff --name-only "${BASE_SHA}" "${HEAD_SHA}")"
          echo "Fichiers modifiés :"; echo "${files}"
          run=false
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            case "$f" in
              apps/*|services/crf/*|packages/*|ui/*|config/*) run=true ;;
              pnpm-lock.yaml|.nvmrc|.dockerignore|.github/workflows/images.yml) run=true ;;
            esac
          done <<< "${files}"
          echo "run=${run}" >> "$GITHUB_OUTPUT"
          echo "Résultat : run=${run} (false → checks requis émis en succès sans build)"

  images:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [changes]
    env:
      RUN: ${{ needs.changes.outputs.run == 'true' }}
    permissions:
      contents: read
      # Nécessaire pour pousser sur GHCR depuis `main` (no-op sur PR).
      packages: write
      # OIDC keyless : cosign lie la signature à l'identité du workflow,
      # sans clé privée à stocker (ADR 0069). No-op sur PR (on ne signe pas).
      id-token: write
      # Remonte le rapport de scan (SARIF) dans l'onglet Security du dépôt,
      # sur le modèle de codeql.yml (ADR 0069, scan « partout »).
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        # Toutes les apps SvelteKit déployables (config runtime/publique) plus le
        # service Hono. amarre, ecrin, find-an-expert et sillage ont rejoint la
        # matrice après la migration de leurs secrets de `$env/static/private`
        # (figé au build) vers `$env/dynamic/private` (lu au runtime) — issue #324,
        # ADR 0033. Leurs secrets sont lus en late-binding via `$lib/server/env`
        # (getters), donc le smoke (GET sur l'endpoint de santé) ne les touche pas ;
        # les `run_env` factices ci-dessous sont une ceinture-bretelles (et
        # documentent les secrets requis au déploiement réel).
        include:
          - name: atlas-dashboard
            dockerfile: apps/atlas-dashboard/Dockerfile
            image: atlas-dashboard
            health_path: /
          - name: crf-dashboard
            dockerfile: apps/crf-dashboard/Dockerfile
            image: atlas-crf-dashboard
            health_path: /
          - name: crf
            dockerfile: services/crf/Dockerfile
            image: atlas-crf
            health_path: /health
            # Le service refuse de démarrer sans ces variables (fail-closed,
            # ADR 0041). Valeurs factices au format attendu, pour le smoke seul.
            run_env: >-
              -e REDCAP_API_URL=https://redcap.example.com/api
              -e REDCAP_API_TOKEN=ABCDEF0123456789ABCDEF0123456789
              -e CRF_AUTH_TOKEN=smoke-bearer
          # Apps migrées vers `$env/dynamic/private` (#324). `run_env` factices :
          # secrets lus au runtime via `$lib/server/env`, valeurs au format attendu
          # pour le smoke seul (aucune connexion réelle).
          - name: amarre
            dockerfile: apps/amarre/Dockerfile
            image: atlas-amarre
            health_path: /
            run_env: >-
              -e APPWRITE_KEY=smoke-appwrite-key
              -e REDCAP_API_TOKEN=ABCDEF0123456789ABCDEF0123456789
              -e ALLOWED_DOMAINS_REGEXP=@example\.org
          - name: ecrin
            dockerfile: apps/ecrin/Dockerfile
            image: atlas-ecrin
            health_path: /
            run_env: >-
              -e APPWRITE_KEY=smoke-appwrite-key
              -e APPWRITE_DB_ID=smoke-db
              -e APPWRITE_TABLE_ID_ALLOWED_EMAIL_DOMAINS_TO_SUBSCRIBE=smoke-table
              -e REDCAP_API_TOKEN=ABCDEF0123456789ABCDEF0123456789
              -e REDCAP_URL=https://redcap.example.com/api/
          - name: find-an-expert
            dockerfile: apps/find-an-expert/Dockerfile
            image: atlas-find-an-expert
            health_path: /
            run_env: >-
              -e APPWRITE_ENDPOINT=https://appwrite.example.com/v1
              -e APPWRITE_PROJECT=smoke-project
              -e APPWRITE_KEY=smoke-appwrite-key
              -e APPWRITE_DATABASE_ID=smoke-db
              -e APPWRITE_CONSENT_EVENTS_COLLECTION_ID=smoke-consent-events
              -e APPWRITE_CURRENT_CONSENTS_COLLECTION_ID=smoke-current-consents
              -e ALLOWED_DOMAINS_REGEXP=@example\.org
          - name: sillage
            dockerfile: apps/sillage/Dockerfile
            image: atlas-sillage
            health_path: /
            run_env: >-
              -e APPWRITE_KEY=smoke-appwrite-key
              -e REDCAP_API_TOKEN=ABCDEF0123456789ABCDEF0123456789
              -e ALLOWED_DOMAINS_REGEXP=@example\.org
    steps:
      # Court-circuit (ADR 0034/0016) : si le diff ne touche pas le périmètre
      # images (PR dataops-only…), tous les steps sont sautés et le job sort
      # `success` → le check requis est satisfait sans build.
      - if: env.RUN == 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - if: env.RUN == 'true'
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      # Métadonnées (tags/labels). Sur PR, le push est désactivé plus bas ;
      # les tags ne servent alors qu'au build local pour le smoke.
      - name: Compute image metadata
        id: meta
        if: env.RUN == 'true'
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          # Pas de `latest` comme référence de déploiement (ADR 0033/0043).
          # format=long : le tag SHA est `sha-<40 chars>` (= `sha-${{ github.sha }}`),
          # pour que le retag local `:smoke` (étape smoke sur main) le retrouve.
          tags: |
            type=sha,format=long,prefix=sha-
            type=raw,value=pr-${{ github.event.pull_request.number }},enable=${{ github.event_name == 'pull_request' }}

      # Login GHCR uniquement sur `main` (les PR ne publient pas).
      - name: Log in to GHCR
        if: env.RUN == 'true' && github.event_name == 'push'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Tag sémver lisible (la version du package.json de l'unité). Ajouté en
      # plus du tag SHA immuable, sur `main` seulement.
      - name: Read package version
        if: env.RUN == 'true' && github.event_name == 'push'
        id: ver
        run: |
          set -euo pipefail
          dir="$(dirname "${{ matrix.dockerfile }}")"
          version="$(node -p "require('./${dir}/package.json').version")"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      # Build. Sur PR : `load` l'image localement (pour le smoke), pas de push.
      # Sur `main` : push avec tags SHA + version.
      - name: Build image (load for smoke)
        id: build-pr
        if: env.RUN == 'true' && github.event_name == 'pull_request'
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          load: true
          push: false
          tags: ${{ matrix.image }}:smoke
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

      - name: Build and push image
        id: build
        if: env.RUN == 'true' && github.event_name == 'push'
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          load: true
          push: true
          # SEULEMENT des tags GHCR (registre où l'on est loggé). Le tag local
          # `${{ matrix.image }}:smoke` ne doit PAS figurer ici : sans préfixe de
          # registre, Docker le résout en `docker.io/library/<image>` et tente de le
          # pousser sur Docker Hub → 401 (insufficient scopes). Il est recréé en
          # local par un `docker tag` juste avant le smoke (étape suivante).
          tags: |
            ${{ steps.meta.outputs.tags }}
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:${{ steps.ver.outputs.version }}
          labels: ${{ steps.meta.outputs.labels }}
          # Provenance SLSA (attestation in-toto) + SBOM CycloneDX attachés à
          # l'image, adressés par son digest (ADR 0069). C'est le volet
          # « provenance/SBOM par image » : build-push-action les rattache au
          # manifeste poussé sur GHCR au moment du push.
          provenance: true
          sbom: true
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

      # Tag local `:smoke` pour l'étape de healthcheck (commune PR/main). Sur main,
      # l'image vient d'être `load`ée sous ses tags GHCR ; on retague le tag SHA
      # (toujours présent, déterministe) en `:smoke` localement, sans le repousser. Sur
      # PR, `:smoke` est déjà produit par le build PR (load, push:false) → step sauté.
      - name: Tag image for smoke (push only)
        if: env.RUN == 'true' && github.event_name == 'push'
        run: |
          docker tag \
            "ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:sha-${{ github.sha }}" \
            "${{ matrix.image }}:smoke"

      # Scan de vulnérabilité de l'image (ADR 0069 — geste à plus fort retour
      # sur effort, livré EN PREMIER, avant toute signature). Tourne sur PR
      # comme sur main : une CVE CRITICAL/HIGH dans la couche de base (Alpine,
      # Node, OpenSSL…) casse le run avant qu'elle n'atteigne (ou ne reste
      # dans) le registre. On scanne l'image construite localement
      # (`:smoke`, chargée via `load: true` sur les deux contextes), pas un tag
      # distant. Les exceptions amont sans correctif se consignent dans un
      # `.trivyignore` versionné et commenté (garde-fou ADR 0069), pas en
      # abaissant le seuil global.
      # On installe Trivy par son script d'installation officiel plutôt que via
      # une action tierce. Les actions `aquasecurity/trivy-action` et
      # `aquasecurity/setup-trivy` se sont toutes deux révélées trop fragiles ici :
      # la première déclare un `uses: setup-trivy@v0.2.2` (tag 404) résolu au
      # `Set up job` même derrière un `if`, la seconde échoue à l'installation.
      # Le script officiel, épinglé à une version, va dans `/usr/local/bin`
      # (déjà dans le PATH) et ne dépend d'aucun tag d'action.
      - name: Install Trivy
        if: env.RUN == 'true'
        env:
          TRIVY_VERSION: "0.71.2"
        run: |
          install_url="https://raw.githubusercontent.com/aquasecurity/trivy/v${TRIVY_VERSION}/contrib/install.sh"
          curl -fsSL "$install_url" | sudo sh -s -- -b /usr/local/bin "v${TRIVY_VERSION}"
          trivy --version

      # Comportement défini par l'ADR 0069 : rapport SARIF, blocage sur
      # CRITICAL/HIGH, vulnérabilités sans correctif ignorées, exceptions amont
      # consignées dans `.trivyignore` versionné.
      - name: Scan image for vulnerabilities
        id: scan
        if: env.RUN == 'true'
        run: |
          trivy image \
            --format sarif \
            --output "trivy-${{ matrix.name }}.sarif" \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            --ignorefile .trivyignore \
            --exit-code 1 \
            "${{ matrix.image }}:smoke"

      # Remonte le rapport SARIF dans l'onglet Security (même mécanisme que
      # codeql.yml). `if: always()` : on veut le rapport même quand le scan a
      # échoué sur une CVE bloquante (sinon l'alerte ne serait jamais visible).
      - name: Upload Trivy scan results to Security tab
        if: env.RUN == 'true' && always()
        # Même action (épinglée par SHA) et même mécanisme que codeql.yml.
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: trivy-${{ matrix.name }}.sarif
          category: trivy-${{ matrix.name }}

      # Smoke : démarrer le conteneur et vérifier que le HEALTHCHECK passe
      # (l'app/le service répond sur son endpoint de santé). Build cassé,
      # dépendance runtime manquante, mauvais port → échec ici.
      - name: Smoke test (start + healthcheck)
        if: env.RUN == 'true'
        shell: bash
        env:
          # Les trois unités exposent 3000 (adapter-node SvelteKit + service
          # Hono, cf. leurs Dockerfile : ENV PORT=3000 / EXPOSE 3000). On code la
          # valeur en clair : aucune entrée de matrice ne surcharge le port
          # aujourd'hui. Si une unité change de port, ajouter `port:` à sa ligne
          # de matrice et restaurer `${{ matrix.port || '3000' }}`.
          PORT: "3000"
          HEALTH_PATH: ${{ matrix.health_path }}
          RUN_ENV: ${{ matrix.run_env || '' }}
        run: |
          set -euo pipefail
          # RUN_ENV est une liste de drapeaux `-e` à découper en mots : le
          # non-quoting est volontaire (la directive shellcheck ci-dessous
          # n'admet pas de commentaire `--`, il doit être sur sa propre ligne).
          # shellcheck disable=SC2086
          cid="$(docker run -d -p ${PORT}:${PORT} ${RUN_ENV} ${{ matrix.image }}:smoke)"
          echo "Conteneur démarré: ${cid}"
          ok=false
          for i in $(seq 1 30); do
            code="$(curl -s -o /dev/null -w '%{http_code}' "http://127.0.0.1:${PORT}${HEALTH_PATH}" || true)"
            if [ "${code}" = "200" ]; then
              echo "Healthcheck OK (HTTP 200) après ${i}s."
              ok=true
              break
            fi
            sleep 1
          done
          if [ "${ok}" != "true" ]; then
            echo "::error::Healthcheck KO pour ${{ matrix.name }} (dernier code: ${code:-aucun})"
            docker logs "${cid}" || true
            docker rm -f "${cid}" >/dev/null 2>&1 || true
            exit 1
          fi
          docker rm -f "${cid}" >/dev/null 2>&1 || true

      # Signature ENSUITE (ADR 0069 — ordre imposé : le scan d'abord, la
      # signature ensuite). UNIQUEMENT sur `main` : aucun jeton OIDC de
      # signature n'est délivré à une PR (les PR scannent mais ne signent ni ne
      # publient). On n'arrive ici que si le scan ci-dessus a réussi : on ne
      # signe jamais une image qu'on n'a pas scannée (garde-fou « digest et
      # scan couplés »).
      - name: Install cosign
        if: env.RUN == 'true' && github.event_name == 'push'
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      # Signe le DIGEST sha256 de l'image (immuable), pas un tag mutable, en
      # mode keyless : `cosign` obtient un jeton OIDC GitHub Actions
      # (`id-token: write`) et lie la signature à l'identité du workflow,
      # attestée publiquement par Sigstore (journal de transparence). La
      # provenance SLSA et le SBOM CycloneDX par image sont déjà rattachés au
      # même digest par build-push-action (provenance:true / sbom:true).
      - name: Sign image digest (cosign keyless)
        if: env.RUN == 'true' && github.event_name == 'push'
        env:
          COSIGN_EXPERIMENTAL: "1"
          IMAGE: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          cosign sign --yes "${IMAGE}@${DIGEST}"
