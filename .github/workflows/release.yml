name: Release

# Phase 4.3 DevSecOps : releases automatiques. Chaque merge sur `main`
# qui consomme un changeset déclenche soit l'ouverture (ou la mise à
# jour) de la PR « chore: version packages », soit — si cette PR est
# déjà mergée — le publish vers npm public + GitHub Packages avec
# provenance OIDC. `workflow_dispatch` reste disponible pour les runs
# manuels (re-publication, rejouage post-incident).
on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Phase 4.3: attach npm provenance (OIDC-signed in-toto attestation) to
  # every `npm publish` / `pnpm publish` call in this job. Honored by both
  # `changeset publish` (npm registry) and the GitHub Packages loop in
  # scripts/release/publish-packages.sh.
  NPM_CONFIG_PROVENANCE: "true"

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      LEFTHOOK: 0
    permissions:
      contents: write
      pull-requests: write
      packages: write
      # OIDC token used by npm CLI to attach a provenance statement to each
      # publish (Phase 4.3). Without this scope, `--provenance` fails to
      # mint the in-toto attestation.
      id-token: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          cache: "pnpm"

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure Git identity
        run: |
          git config user.name "chasset"
          git config user.email "1488688+chasset@users.noreply.github.com"

      - name: Configure registry auth for publish step
        run: |
          {
            echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}"
            echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}"
          } >> .npmrc

      - name: Create Release Pull Request or Publish to registries
        id: changesets
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1
        with:
          version: pnpm run changeset:version
          publish: pnpm run release
          title: "chore: version packages"
          commit: "chore: version packages"
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge Release PR
        # --auto queues the merge until the 9 required checks finish on the
        # PR (CI typically takes ~3 min). Without it, this step races the
        # CI and fails with "the base branch policy prohibits the merge"
        # every time main protection requires status checks.
        if: steps.changesets.outputs.pullRequestNumber
        run: gh pr merge ${{ steps.changesets.outputs.pullRequestNumber }} --squash --delete-branch --auto
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
