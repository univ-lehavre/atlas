name: Release

# Phase 4.3 DevSecOps : releases automatiques, CYCLE COMPLET EN UNE NUIT.
# Un seul run nocturne (ou `workflow_dispatch`) exécute de bout en bout :
#   1. génération des changesets depuis les Conventional Commits scopés ;
#   2. ouverture + AUTO-MERGE des PR de version (dépôt via release-please,
#      packages via Changesets) ;
#   3. attente du merge effectif de ces PR sur `main` ;
#   4. SECONDE PASSE : re-checkout `main`, release-please tague/release le
#      dépôt, Changesets publie les packages (npm public + GitHub Packages
#      avec provenance OIDC) et crée les GitHub Releases signées (cosign).
# Voir ADR 0093 (cycle complet en une nuit) — lève le décalage « publish au
# run suivant » des ADR 0017/0053.
on:
  # Release QUOTIDIENNE à 03:00 UTC. Les changements s'accumulent dans la
  # journée ; une seule release nocturne les versionne ET les publie (cycle
  # complet, cf. ADR 0093). `workflow_dispatch` reste disponible pour les runs
  # manuels (re-publication, rejouage post-incident).
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

# Plancher restrictif au niveau workflow (principe du moindre privilège,
# critère Token-Permissions d'OpenSSF Scorecard — ADR 0083). Chaque job
# élève explicitement ce dont il a besoin ; tout autre hériterait de ce
# read seul.
permissions:
  contents: read

env:
  # (release publie via Changesets, n'invoque pas turbo ; anciens
  # TURBO_TOKEN/TEAM dormants retirés — cache Turbo géré par `caching-for-turbo`
  # là où turbo tourne, ADR 0090.)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Phase 4.3: attach npm provenance (OIDC-signed in-toto attestation) to
  # every `npm publish` / `pnpm publish` call in this job. Honored by both
  # `changeset publish` (npm registry) and the GitHub Packages loop in
  # scripts/release/publish-packages.sh.
  NPM_CONFIG_PROVENANCE: "true"

jobs:
  # Release du DÉPÔT (version unique monorepo, distincte des packages npm) via release-please :
  # pilotée par les Conventional Commits, elle bumpe la `version` du package.json racine (privé,
  # jamais publié) + `CITATION.cff` (extra-files) et tague `vX.Y.Z` (reprend après v1.2.1).
  # Coexiste avec le job `release` (Changesets, versions par-package) — artefacts DISJOINTS.
  #
  # Cycle complet (ADR 0093) : release-please est idempotent. À la 1re passe il OUVRE la PR de
  # version (qu'on auto-merge), à la 2de passe — le commit de version étant sur `main` — il TAGUE
  # et crée la GitHub Release. On enchaîne donc : passe 1 → attente du merge → passe 2, dans le
  # même run, pour que le tag `vX.Y.Z` et la Release sortent la nuit même.
  release-please:
    name: Release Please (version dépôt)
    runs-on: ubuntu-latest
    permissions:
      contents: write # tag + release GitHub du dépôt
      pull-requests: write # création/maj de la PR de release
    steps:
      # --- Passe 1 : ouvre (ou met à jour) la PR de version, ou tague si déjà mergée.
      - id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          token: ${{ secrets.PAT_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # release-please (extra-files générique) ne synchronise que le `version:` de
      # CITATION.cff (marqueur x-release-please-version), PAS `date-released`. On
      # l'estampille ICI dans la PR de version (avant l'auto-merge), à la date du
      # jour : le champ suit la date de release, dans le MÊME commit série que le
      # bump de version. Guillemets DOUBLES (style prettier du dépôt).
      - name: Estampiller date-released dans la PR de version (CITATION.cff)
        if: ${{ steps.release.outputs.prs_created == 'true' }}
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ fromJSON(steps.release.outputs.pr).headBranchName }}
          token: ${{ secrets.PAT_TOKEN }}
      - name: Écrire date-released
        if: ${{ steps.release.outputs.prs_created == 'true' }}
        env:
          RELEASE_PR: ${{ steps.release.outputs.pr }}
        run: |
          set -euo pipefail
          BRANCH=$(echo "$RELEASE_PR" | jq -r '.headBranchName')
          TODAY=$(date -u +%Y-%m-%d)
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          # Remplace `date-released:` si présent, sinon l'insère après `version:`.
          if grep -qE '^date-released:' CITATION.cff; then
            sed -i -E "s/^date-released:.*/date-released: \"${TODAY}\"/" CITATION.cff
          else
            sed -i -E "s/^(version:.*)$/\1\ndate-released: \"${TODAY}\"/" CITATION.cff
          fi
          if ! git diff --quiet CITATION.cff; then
            git add CITATION.cff
            git commit --quiet -m "chore: estampille date-released ${TODAY} (release-please)"
            git push --quiet origin "HEAD:${BRANCH}"
          fi

      # Auto-merge de la PR de version puis ATTENTE de son merge effectif (l'auto-merge
      # est asynchrone : il patiente jusqu'au vert de la CI de la PR, ~3-5 min). Sans cette
      # attente, la passe 2 ci-dessous re-tournerait avant que le commit de version soit sur
      # `main` et ne taguerait rien (décalage d'un run — ce qu'on supprime, ADR 0093).
      - name: Auto-merge and await the release PR
        if: ${{ steps.release.outputs.prs_created == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
          RELEASE_PR: ${{ steps.release.outputs.pr }}
        run: |
          set -euo pipefail
          PR_NUMBER=$(echo "$RELEASE_PR" | jq -r '.number')
          echo "PR de version dépôt : #${PR_NUMBER}"
          gh pr merge "$PR_NUMBER" --auto --merge --repo "$GITHUB_REPOSITORY"
          # Poll jusqu'au MERGED (timeout ~20 min : marge au-dessus de la CI requise).
          for i in $(seq 1 80); do
            state=$(gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --json state --jq '.state')
            echo "  [$i/80] PR #${PR_NUMBER} → ${state}"
            if [ "$state" = "MERGED" ]; then echo "✅ PR de version mergée." && exit 0; fi
            if [ "$state" = "CLOSED" ]; then echo "::error::PR #${PR_NUMBER} fermée sans merge." && exit 1; fi
            sleep 15
          done
          echo "::error::Timeout : PR #${PR_NUMBER} non mergée à temps (CI bloquée ?)."
          exit 1

      # --- Passe 2 : le commit de version est sur `main` ; release-please pose le tag `vX.Y.Z`
      # et crée la GitHub Release. No-op si la passe 1 n'avait rien à releaser.
      - name: Release Please (tag + GitHub Release)
        if: ${{ steps.release.outputs.prs_created == 'true' }}
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          token: ${{ secrets.PAT_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      LEFTHOOK: 0
    permissions:
      contents: write
      pull-requests: write
      packages: write
      # OIDC token used by npm CLI to attach a provenance statement to each
      # publish (Phase 4.3). Without this scope, `--provenance` fails to
      # mint the in-toto attestation.
      id-token: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          cache: "pnpm"

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure Git identity
        run: |
          git config user.name "chasset"
          git config user.email "1488688+chasset@users.noreply.github.com"

      - name: Configure registry auth for publish step
        run: |
          {
            echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}"
            echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}"
          } >> .npmrc

      # ============================ PASSE 1 ============================
      # Génère les changesets à partir des Conventional Commits SCOPÉS depuis la dernière release
      # (scope → package, type → bump ; scripts/release/generate-changesets.mjs). L'action
      # Changesets ci-dessous les CONSOMME (`changeset version`). Idempotent : rejoué à chaque run,
      # il réécrit les mêmes fichiers `auto-<pkg>.md` (slug déterministe) tant que la PR de version
      # n'est pas mergée. Le checkout `fetch-depth: 0` fournit l'historique nécessaire.
      - name: Generate changesets from conventional commits
        run: node scripts/release/generate-changesets.mjs

      - name: Create Release Pull Request or Publish to registries
        id: changesets
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1
        with:
          version: pnpm run changeset:version
          publish: pnpm run release
          title: "chore: version packages"
          commit: "chore: version packages"
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Auto-merge de la PR « chore: version packages » puis ATTENTE de son merge effectif.
      # --merge (PAS --squash) : la ruleset `main` restreint `allowed_merge_methods` à
      # `["merge"]` et le dépôt désactive le squash (ADR 0053). Changesets produit déjà un
      # commit unique propre (`commit: "chore: version packages"`) : l'objectif « un seul
      # commit de version » est préservé sans squash. L'attente (poll jusqu'au MERGED) est
      # ce qui permet à la passe 2 ci-dessous de publier dans le MÊME run (ADR 0093).
      - name: Auto-merge and await the version PR
        id: await_version_pr
        if: steps.changesets.outputs.pullRequestNumber
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
          PR_NUMBER: ${{ steps.changesets.outputs.pullRequestNumber }}
        run: |
          set -euo pipefail
          echo "PR de version packages : #${PR_NUMBER}"
          gh pr merge "$PR_NUMBER" --merge --delete-branch --auto
          for i in $(seq 1 80); do
            state=$(gh pr view "$PR_NUMBER" --json state --jq '.state')
            echo "  [$i/80] PR #${PR_NUMBER} → ${state}"
            if [ "$state" = "MERGED" ]; then echo "✅ PR de version mergée." && exit 0; fi
            if [ "$state" = "CLOSED" ]; then echo "::error::PR #${PR_NUMBER} fermée sans merge." && exit 1; fi
            sleep 15
          done
          echo "::error::Timeout : PR #${PR_NUMBER} non mergée à temps (CI bloquée ?)."
          exit 1

      # ============================ PASSE 2 ============================
      # La PR de version vient d'être mergée : on rapatrie `main` (qui porte désormais le commit
      # de version, les changesets consommés et supprimés), et on rejoue la génération +
      # `changesets/action`. Cette fois il n'y a PLUS de changeset en attente → l'action bascule
      # en mode PUBLISH (npm + GitHub Packages) et crée les GitHub Releases. No-op si aucune PR de
      # version n'avait été ouverte en passe 1 (rien à releaser cette nuit).
      - name: Sync main after version PR merge
        if: steps.changesets.outputs.pullRequestNumber
        run: |
          set -euo pipefail
          git fetch origin main
          git checkout main
          git reset --hard origin/main

      - name: Reinstall after sync
        if: steps.changesets.outputs.pullRequestNumber
        run: pnpm install --frozen-lockfile

      - name: Regenerate changesets (idempotent) on updated main
        if: steps.changesets.outputs.pullRequestNumber
        run: node scripts/release/generate-changesets.mjs

      - name: Publish to registries (second pass)
        id: publish
        if: steps.changesets.outputs.pullRequestNumber
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1
        with:
          version: pnpm run changeset:version
          publish: pnpm run release
          title: "chore: version packages"
          commit: "chore: version packages"
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Signature des artefacts de Release GitHub (ADR 0087). En complément de la
      # provenance OIDC npm (qui couvre le REGISTRE), on attache à CHAQUE GitHub
      # Release créée par Changesets le tarball du paquet, sa signature cosign
      # keyless (.sig + certificat .pem) et sa somme sha256. Vérifiable hors npm :
      #   cosign verify-blob --certificate <pkg>.pem --signature <pkg>.sig \
      #     --certificate-identity-regexp '^https://github.com/univ-lehavre/atlas/' \
      #     --certificate-oidc-issuer https://token.actions.githubusercontent.com <pkg>.tgz
      # Ne tourne que si la passe 2 a réellement publié (sinon : no-op).
      # cosign v3.x : les flags `--output-signature`/`--output-certificate` (utilisés
      # ci-dessous, contrat de vérification ADR 0087) sont RETIRÉS en cosign v4 au profit
      # d'un bundle `.sigstore.json` unique — un `cosign-installer@v4` fait échouer sign-blob
      # avec « create bundle file: open : no such file or directory ». On épingle donc v3.x
      # tant que la doc de vérification reste sur le couple .sig/.pem.
      - name: Install cosign
        if: steps.publish.outputs.published == 'true'
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign and attach release assets
        if: steps.publish.outputs.published == 'true'
        env:
          # Identité OIDC keyless (pas de clé à stocker) — comme images.yml / ADR 0069.
          COSIGN_YES: "true"
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
          PUBLISHED: ${{ steps.publish.outputs.publishedPackages }}
        run: |
          set -euo pipefail
          work="$(mktemp -d)"
          # publishedPackages = JSON [{ "name": "@scope/x", "version": "1.2.3" }, …]
          echo "$PUBLISHED" | jq -c '.[]' | while read -r pkg; do
            name="$(echo "$pkg" | jq -r '.name')"
            version="$(echo "$pkg" | jq -r '.version')"
            tag="${name}@${version}"  # Changesets nomme le tag/Release ainsi.
            echo "::group::Signing ${tag}"
            # Un seul tarball par itération : on vide la zone de travail avant.
            rm -f "$work"/*.tgz "$work"/*.tgz.* 2>/dev/null || true
            pnpm pack --filter "${name}" --pack-destination "$work" >/dev/null
            # `find` plutôt que `ls` (SC2012) : un seul tarball dans la zone vidée.
            tgz="$(find "$work" -maxdepth 1 -name '*.tgz' | head -1)"
            sha256sum "$tgz" > "${tgz}.sha256"
            # Signature keyless : .sig (signature) + .pem (certificat éphémère).
            cosign sign-blob --output-signature "${tgz}.sig" --output-certificate "${tgz}.pem" "$tgz"
            # Attache les 4 fichiers à la GitHub Release du tag (créée par Changesets).
            gh release upload "$tag" "$tgz" "${tgz}.sig" "${tgz}.pem" "${tgz}.sha256" --clobber
            echo "::endgroup::"
          done
