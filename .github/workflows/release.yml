name: Release

# Phase 4.3 DevSecOps : releases automatiques. Chaque merge sur `main`
# qui consomme un changeset déclenche soit l'ouverture (ou la mise à
# jour) de la PR « chore: version packages », soit — si cette PR est
# déjà mergée — le publish vers npm public + GitHub Packages avec
# provenance OIDC. `workflow_dispatch` reste disponible pour les runs
# manuels (re-publication, rejouage post-incident).
on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

# Plancher restrictif au niveau workflow (principe du moindre privilège,
# critère Token-Permissions d'OpenSSF Scorecard — ADR 0083). Le job `release`
# élève explicitement ce dont il a besoin (contents/packages/id-token write
# pour publier avec provenance) ; tout autre job hériterait de ce read seul.
permissions:
  contents: read

env:
  # (release publie via Changesets, n'invoque pas turbo ; anciens
  # TURBO_TOKEN/TEAM dormants retirés — cache Turbo géré par `caching-for-turbo`
  # là où turbo tourne, ADR 0090.)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Phase 4.3: attach npm provenance (OIDC-signed in-toto attestation) to
  # every `npm publish` / `pnpm publish` call in this job. Honored by both
  # `changeset publish` (npm registry) and the GitHub Packages loop in
  # scripts/release/publish-packages.sh.
  NPM_CONFIG_PROVENANCE: "true"

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      LEFTHOOK: 0
    permissions:
      contents: write
      pull-requests: write
      packages: write
      # OIDC token used by npm CLI to attach a provenance statement to each
      # publish (Phase 4.3). Without this scope, `--provenance` fails to
      # mint the in-toto attestation.
      id-token: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          cache: "pnpm"

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure Git identity
        run: |
          git config user.name "chasset"
          git config user.email "1488688+chasset@users.noreply.github.com"

      - name: Configure registry auth for publish step
        run: |
          {
            echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}"
            echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}"
          } >> .npmrc

      - name: Create Release Pull Request or Publish to registries
        id: changesets
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1
        with:
          version: pnpm run changeset:version
          publish: pnpm run release
          title: "chore: version packages"
          commit: "chore: version packages"
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Signature des artefacts de Release GitHub (ADR 0087). En complément de la
      # provenance OIDC npm (qui couvre le REGISTRE), on attache à CHAQUE GitHub
      # Release créée par Changesets le tarball du paquet, sa signature cosign
      # keyless (.sig + certificat .pem) et sa somme sha256. Vérifiable hors npm :
      #   cosign verify-blob --certificate <pkg>.pem --signature <pkg>.sig \
      #     --certificate-identity-regexp '^https://github.com/univ-lehavre/atlas/' \
      #     --certificate-oidc-issuer https://token.actions.githubusercontent.com <pkg>.tgz
      # Ne tourne que si Changesets a réellement publié (sinon : no-op).
      - name: Install cosign
        if: steps.changesets.outputs.published == 'true'
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign and attach release assets
        if: steps.changesets.outputs.published == 'true'
        env:
          # Identité OIDC keyless (pas de clé à stocker) — comme images.yml / ADR 0069.
          COSIGN_YES: "true"
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
          PUBLISHED: ${{ steps.changesets.outputs.publishedPackages }}
        run: |
          set -euo pipefail
          work="$(mktemp -d)"
          # publishedPackages = JSON [{ "name": "@scope/x", "version": "1.2.3" }, …]
          echo "$PUBLISHED" | jq -c '.[]' | while read -r pkg; do
            name="$(echo "$pkg" | jq -r '.name')"
            version="$(echo "$pkg" | jq -r '.version')"
            tag="${name}@${version}"  # Changesets nomme le tag/Release ainsi.
            echo "::group::Signing ${tag}"
            # Un seul tarball par itération : on vide la zone de travail avant.
            rm -f "$work"/*.tgz "$work"/*.tgz.* 2>/dev/null || true
            pnpm pack --filter "${name}" --pack-destination "$work" >/dev/null
            # `find` plutôt que `ls` (SC2012) : un seul tarball dans la zone vidée.
            tgz="$(find "$work" -maxdepth 1 -name '*.tgz' | head -1)"
            sha256sum "$tgz" > "${tgz}.sha256"
            # Signature keyless : .sig (signature) + .pem (certificat éphémère).
            cosign sign-blob --output-signature "${tgz}.sig" --output-certificate "${tgz}.pem" "$tgz"
            # Attache les 4 fichiers à la GitHub Release du tag (créée par Changesets).
            gh release upload "$tag" "$tgz" "${tgz}.sig" "${tgz}.pem" "${tgz}.sha256" --clobber
            echo "::endgroup::"
          done

      - name: Merge Release PR
        # --auto queues the merge until the required checks finish on the PR
        # (CI typically takes ~3 min). Without it, this step races the CI and
        # fails with "the base branch policy prohibits the merge" every time
        # main protection requires status checks.
        #
        # --merge (PAS --squash) : la ruleset `main` restreint
        # `allowed_merge_methods` à `["merge"]` et le dépôt désactive le squash
        # (ADR 0053). Un `gh pr merge --squash` est rejeté par la policy → la PR
        # « chore: version packages » ne s'auto-mergeait jamais, donc le publish
        # (déclenché par le merge de cette PR) ne partait pas. Changesets produit
        # déjà un commit unique propre (`commit: "chore: version packages"`),
        # l'objectif « un seul commit de version » est préservé sans squash.
        if: steps.changesets.outputs.pullRequestNumber
        run: gh pr merge ${{ steps.changesets.outputs.pullRequestNumber }} --merge --delete-branch --auto
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
