name: Daily review

# Revue quotidienne personnelle d'une dimension du dépôt (ADR 0044).
#
# Chaque jour ouvré, ce workflow DÉSIGNE une cible (un fichier source, un test,
# une doc, ou une dette globale) via `scripts/audit/daily-target.mjs` et ouvre
# une **issue-support** pré-remplie (échelles micro / meso / macro). Il NE
# conduit PAS la revue : un runner GitHub ne peut pas faire tourner Claude
# (même garde-fou qu'ADR 0039). La revue est manuelle ; les implications se
# discutent ensuite. Le sélecteur est déterministe par date → idempotent et
# rejouable.
#
# Cadence : lundi→vendredi, 06:00 UTC. Déclenchement manuel via
# workflow_dispatch (revue hors-calendrier ; --date optionnel).

on:
  schedule:
    - cron: "0 6 * * 1-5"
  workflow_dispatch:
    inputs:
      date:
        description: "Date de revue (YYYY-MM-DD). Vide = aujourd'hui (UTC)."
        required: false
        type: string

permissions:
  contents: read
  # Requis pour ouvrir l'issue-support.
  issues: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  open-review:
    name: Ouvrir l'issue de revue quotidienne
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc

      # Le sélecteur n'utilise que des modules natifs Node — aucune install.
      # L'input `date` passe par l'environnement (jamais interpolé dans le
      # script) — sinon une valeur malveillante serait exécutée par le shell
      # (injection). Le sélecteur valide en plus le format YYYY-MM-DD.
      - name: Sélectionner la cible du jour
        id: select
        env:
          REVIEW_DATE: ${{ github.event.inputs.date }}
        run: |
          DATE_ARG=""
          if [ -n "$REVIEW_DATE" ]; then
            DATE_ARG="--date=$REVIEW_DATE"
          fi
          node scripts/audit/daily-target.mjs $DATE_ARG --json > target.json
          cat target.json

      - uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const fs = require("fs");
            const t = JSON.parse(fs.readFileSync("target.json", "utf8"));

            const title = `Revue quotidienne — ${t.date} — ${t.target}`;

            // Idempotence : ne pas rouvrir si une issue ouverte du même titre
            // existe déjà (re-run du jour, double déclenchement…).
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: "revue-quotidienne",
              per_page: 100,
            });
            if (existing.data.some((i) => i.title === title)) {
              core.info(`Issue déjà ouverte : ${title} — rien à faire.`);
              return;
            }

            const hints = (t.hints || []).map((h) => `\`${h}\``).join(", ") || "—";

            const body = [
              "Revue personnelle automatique (ADR 0044). Cible désignée par",
              "`scripts/audit/daily-target.mjs` — **inspecte-la toi-même**, consigne tes",
              "constats aux trois échelles, **puis on en discute** (implications",
              "micro/meso/macro) avant d'agir. Le constat doit être **prouvé par le code**.",
              "",
              "## Cible du jour",
              "",
              `- **Dimension** : \`${t.dimension}\``,
              `- **Cible** : \`${t.target}\``,
              `- **Pourquoi cette cible** : ${t.why}`,
              `- **Indices** : ${hints}`,
              "",
              "## Micro — le constat local",
              "",
              "> Ce qui est devant moi, dans cette cible précise.",
              "",
              "- **Constat** (prouvé, `fichier:ligne`) :",
              "- **Amélioration immédiate proposée** :",
              "- **Effort estimé** : <!-- trivial | petit | moyen -->",
              "",
              "## Meso — le motif récurrent",
              "",
              "> Ce constat est-il isolé, ou le symptôme d'un motif présent ailleurs ?",
              "",
              "- **Récurrence observée** (autres fichiers/paquets) :",
              "- **Piste de systématisation** : <!-- règle lint, check d'audit, convention, helper… -->",
              "",
              "## Macro — l'implication structurante",
              "",
              "> Cette revue engage-t-elle tout le dépôt ?",
              "",
              "- **Question structurante** :",
              "- **Candidat ADR / plan** : <!-- oui/non + intitulé pressenti -->",
              "",
              "## Décision",
              "",
              "- [ ] Rien à faire (cible saine — consigner pourquoi)",
              "- [ ] Amélioration locale → PR directe",
              "- [ ] Ouvrir une issue de suivi (`enhancement` / `tech-debt`)",
              "- [ ] Rédiger un **ADR** (réflexion structurante)",
              "- [ ] Inscrire dans un **plan** de résorption",
              "",
              "_Convention : [ADR 0044](https://univ-lehavre.github.io/atlas/decisions/0044-revue-quotidienne-dimension/)._",
            ].join("\n");

            const created = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ["revue-quotidienne"],
            });
            core.info(`Issue créée : ${created.data.html_url}`);
