name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@a8198c4bff370c8506180b035930dea56dbd5288 # v5

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Create SvelteKit env files
        run: |
          for app in apps/amarre apps/ecrin apps/find-an-expert; do
            cp "$app/.env.example" "$app/.env" 2>/dev/null || true
          done

      - run: pnpm install --frozen-lockfile

      - name: Turbo cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - run: pnpm format:check

      - run: pnpm lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@a8198c4bff370c8506180b035930dea56dbd5288 # v5

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Create SvelteKit env files
        run: |
          for app in apps/amarre apps/ecrin apps/find-an-expert; do
            cp "$app/.env.example" "$app/.env" 2>/dev/null || true
          done

      - run: pnpm install --frozen-lockfile

      - name: Turbo cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - run: pnpm typecheck

      - run: pnpm svelte:check

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@a8198c4bff370c8506180b035930dea56dbd5288 # v5

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Create SvelteKit env files
        run: |
          for app in apps/amarre apps/ecrin apps/find-an-expert; do
            cp "$app/.env.example" "$app/.env" 2>/dev/null || true
          done

      - run: pnpm install --frozen-lockfile

      - name: Turbo cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - run: pnpm test:coverage

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@a8198c4bff370c8506180b035930dea56dbd5288 # v5

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Create SvelteKit env files
        run: |
          for app in apps/amarre apps/ecrin apps/find-an-expert; do
            cp "$app/.env.example" "$app/.env" 2>/dev/null || true
          done

      - run: pnpm install --frozen-lockfile

      - name: Turbo cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - run: pnpm build

      - name: Check bundle sizes
        run: pnpm audit:size

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    timeout-minutes: 40
    needs: [build]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@a8198c4bff370c8506180b035930dea56dbd5288 # v5

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Create SvelteKit env files
        run: |
          for app in apps/amarre apps/ecrin apps/find-an-expert; do
            cp "$app/.env.example" "$app/.env" 2>/dev/null || true
          done

      - run: pnpm install --frozen-lockfile

      - name: Turbo cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Build packages (for API docs)
        run: pnpm build

      - name: Generate API documentation
        run: pnpm docs:api

      - name: Build VitePress site
        run: pnpm docs:build

  audit:
    name: Audit
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@a8198c4bff370c8506180b035930dea56dbd5288 # v5

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Security audit
        run: pnpm audit:security

      - name: License audit
        run: pnpm audit:licenses

      - name: Unused code
        run: pnpm audit:unused

      - name: Code duplication
        run: pnpm audit:duplicates

      - name: Outdated dependencies
        run: pnpm audit:versions
