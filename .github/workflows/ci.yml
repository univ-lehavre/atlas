name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Détecte si la PR touche du code exécutable ou seulement de la
  # documentation. Les jobs lourds (Lint/Test/Build/Typecheck/Audit) consultent
  # `outputs.code` pour court-circuiter leur travail coûteux SANS jamais se
  # rendre `skipped` — un check requis `skipped` resterait « Pending » et
  # bloquerait le merge (cf. ADR 0034). Conservateur : tout fichier hors de la
  # liste blanche documentaire compte comme du code.
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Classify changed files
        id: filter
        env:
          # Sur une PR, on diffe contre la base de fusion ; sur un push (main),
          # `base` est vide et on force `code=true` (la branche protégée valide
          # toujours tout).
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          if [ -z "${BASE_SHA}" ]; then
            echo "Push (pas une PR) → pipeline complet."
            echo "code=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          files="$(git diff --name-only "${BASE_SHA}" "${HEAD_SHA}")"
          echo "Fichiers modifiés :"
          echo "${files}"
          # Liste blanche documentaire (ADR 0034) : un fichier qui matche l'un
          # de ces motifs est « doc ». Si TOUS les fichiers matchent, la PR est
          # documentaire (code=false) ; sinon code=true.
          code=false
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            case "$f" in
              docs/*) ;;                       # toute la documentation VitePress
              *.md) ;;                         # tout Markdown (README, ADR, plans…)
              *.mdx) ;;
              LICENSE|LICENSE.*) ;;            # licence
              .editorconfig) ;;                # confort éditeur
              fixtures/*.txt|fixtures/*.csv|fixtures/*.json) ;; # fixtures texte
              *) code=true; echo "→ hors liste blanche : $f" ;;
            esac
          done <<< "${files}"
          echo "code=${code}" >> "$GITHUB_OUTPUT"
          echo "Résultat : code=${code}"

  # Tous les jobs lourds ne dépendent QUE de `changes` : ils partent en
  # parallèle (ADR 0061). Turbo gère l'ordre réel des tâches (`^build`) à
  # l'intérieur de chaque job — chaîner les jobs CI entre eux n'ajoutait que des
  # barrières d'attente inutiles. Le pattern de court-circuit reste au niveau
  # *step* (drapeau `RUN`) pour que chaque check requis sorte toujours `success`,
  # jamais `skipped` (ADR 0034/0016).

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [changes]
    env:
      RUN: ${{ needs.changes.outputs.code == 'true' }}
    steps:
      - if: env.RUN == 'true'
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - if: env.RUN == 'true'
        uses: ./.github/actions/setup-workspace

      - if: env.RUN == 'true'
        run: pnpm format:check

      - if: env.RUN == 'true'
        run: pnpm lint

      - name: Skipped (PR documentaire)
        if: env.RUN != 'true'
        run: echo "PR sans code exécutable — lint non requis (ADR 0034)."

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [changes]
    env:
      RUN: ${{ needs.changes.outputs.code == 'true' }}
    steps:
      - if: env.RUN == 'true'
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - if: env.RUN == 'true'
        uses: ./.github/actions/setup-workspace

      - if: env.RUN == 'true'
        run: pnpm typecheck

      - if: env.RUN == 'true'
        run: pnpm svelte:check

      - name: Skipped (PR documentaire)
        if: env.RUN != 'true'
        run: echo "PR sans code exécutable — typecheck non requis (ADR 0034)."

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [changes]
    env:
      RUN: ${{ needs.changes.outputs.code == 'true' }}
    steps:
      - if: env.RUN == 'true'
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - if: env.RUN == 'true'
        uses: ./.github/actions/setup-workspace

      - if: env.RUN == 'true'
        run: pnpm test:coverage

      # Phase 1.2 + 3.8 : agrège les rapports vitest et échoue si un
      # paquet devient « missing » (test config présent, coverage data
      # absente) ou tombe sous la cible. Cible passée à 40 en Phase 3.8
      # après ajout massif de tests (cli/biblio, cli/citation,
      # cli/atlas-stats, cli/crf-stats, cli/researcher-profiles,
      # services/crf, packages/atlas-stats) ; sera remontée vers 80
      # quand les exemptions résiduelles (cli/net, find-an-expert)
      # seront renforcées à leur tour.
      - if: env.RUN == 'true'
        run: pnpm coverage:report 40

      - if: env.RUN == 'true'
        run: pnpm test:scripts

      - name: Skipped (PR documentaire)
        if: env.RUN != 'true'
        run: echo "PR sans code exécutable — tests non requis (ADR 0034)."

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # ADR 0061 : ne dépend plus de lint/typecheck/test. Ce ne sont pas des
    # dépendances de build mais des gates de qualité parallèles ; les chaîner
    # ne faisait qu'allonger le chemin critique. Turbo construit l'ordre réel
    # (`^build`) en interne.
    needs: [changes]
    env:
      RUN: ${{ needs.changes.outputs.code == 'true' }}
    steps:
      - if: env.RUN == 'true'
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - if: env.RUN == 'true'
        uses: ./.github/actions/setup-workspace

      - if: env.RUN == 'true'
        run: pnpm build

      - name: Check bundle sizes
        if: env.RUN == 'true'
        run: pnpm audit:size

      - name: Skipped (PR documentaire)
        if: env.RUN != 'true'
        run: echo "PR sans code exécutable — build non requis (ADR 0034)."

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    timeout-minutes: 40
    # ADR 0061 : détaché de `build`. `docs:build` ne lit que les sources
    # (README de paquets, package.json pour la carte, historique git pour les
    # stats) — aucun artefact buildé du workspace n'est requis (cf. step
    # ci-dessous). Il peut donc tourner en parallèle de Build.
    needs: [changes]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-workspace

      # `docs:build` ne lit que les sources (README de paquets, package.json
      # pour la carte, historique git pour les stats) — aucun artefact buildé.
      # Pas de build workspace préalable nécessaire.
      - name: Build Astro Starlight site
        run: pnpm docs:build

  audit:
    name: Audit
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [changes]
    env:
      RUN: ${{ needs.changes.outputs.code == 'true' }}
    steps:
      - if: env.RUN == 'true'
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          # Historique complet requis : `docs:generate:check` régénère la page
          # d'évolution (docs/quality/evolution-git.md) à partir de `git log`
          # sur tout l'historique. Un checkout superficiel ne verrait qu'un
          # commit et la comparaison échouerait.
          fetch-depth: 0

      # Valide les workflows et actions composites GitHub (ADR 0061) : un
      # `needs` orphelin, un `uses` non résolvable ou une expression `${{ }}`
      # cassée échouerait silencieusement en production — et sur un check requis,
      # bloquerait tout merge. actionlint embarque shellcheck pour les blocs
      # `run:`. Ne tourne que sur une PR « code » (RUN) : une PR qui touche
      # `.github/**` est par construction hors liste blanche documentaire.
      # reporter `local` : findings écrits dans les logs du job (pas d'API
      # Checks), donc aucune permission `checks: write` requise — le workflow
      # reste en `contents: read`. `fail_level: warning` rend le job rouge dès
      # le premier warning, ce qui est l'effet de gate voulu.
      - if: env.RUN == 'true'
        name: Lint GitHub workflows
        uses: reviewdog/action-actionlint@6fb7acc99f4a1008869fa8a0f09cfca740837d9d # v1.72.0
        with:
          reporter: local
          fail_level: warning

      - if: env.RUN == 'true'
        uses: ./.github/actions/setup-workspace

      # knip (audit:unused) résout le graphe d'imports des apps SvelteKit
      # à partir de `.svelte-kit/`. Or les `svelte.config.js` importent
      # `@univ-lehavre/atlas-sveltekit-csp` (Phase 9.2) : tant que ce
      # paquet n'est pas buildé, `svelte-kit sync` (lifecycle `prepare`)
      # échoue silencieusement et `.svelte-kit/` reste absent. On build
      # uniquement les paquets workspace puis on régénère `.svelte-kit/`
      # via `svelte-kit sync` (qui n'a PAS besoin des `$env` runtime,
      # contrairement à un `vite build` complet d'app). Le cache turbo
      # rend ce build quasi-instantané quand rien n'a changé.
      - if: env.RUN == 'true'
        name: Build workspace packages
        run: pnpm --filter="./packages/**" --filter="./ui/**" build

      - if: env.RUN == 'true'
        name: Sync SvelteKit metadata
        run: pnpm --filter="./apps/**" exec svelte-kit sync

      - if: env.RUN == 'true'
        name: Workspace structure
        run: pnpm audit:structure

      - if: env.RUN == 'true'
        name: Security audit
        run: pnpm audit:security

      - if: env.RUN == 'true'
        name: License audit
        run: pnpm audit:licenses

      - if: env.RUN == 'true'
        name: Unused code
        run: pnpm audit:unused

      - if: env.RUN == 'true'
        name: Code duplication
        run: pnpm audit:duplicates

      - if: env.RUN == 'true'
        name: Outdated dependencies
        run: pnpm audit:versions

      - if: env.RUN == 'true'
        name: Dependency specifier coherence
        run: pnpm audit:dep-versions

      - if: env.RUN == 'true'
        name: Packages map up-to-date
        run: pnpm docs:generate:check

      - if: env.RUN == 'true'
        name: Documentation audit
        run: pnpm audit:docs

      - name: Skipped (PR documentaire)
        if: env.RUN != 'true'
        run: echo "PR sans code exécutable — audit non requis (ADR 0034)."

  dataops:
    name: DataOps (Python)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      # Catégorie dataops/ (Python, ADR 0055) : mêmes exigences de qualité que le
      # code Node (ruff + pytest + couverture à seuil). pnpm orchestre (scripts
      # lint:python / test:python), uv exécute le toolchain Python.
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc

      # ADR 0061 : cache de l'environnement uv (téléchargements + venv résolu),
      # invalidé sur changement des lockfiles Python. Sans cache, chaque run
      # re-télécharge et re-résout l'environnement Dagster.
      - uses: astral-sh/setup-uv@e92bafb6253dcd438e0484186d7669ea7a8ca1cc # v6.4.3
        with:
          enable-cache: true
          cache-dependency-glob: "dataops/**/uv.lock"

      - name: DataOps quality (ruff + pytest + coverage)
        run: pnpm dataops:check
