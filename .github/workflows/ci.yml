name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Create SvelteKit env files
        run: |
          for app in apps/amarre apps/ecrin apps/find-an-expert apps/sillage; do
            cp "$app/.env.example" "$app/.env" 2>/dev/null || true
          done

      - run: pnpm install --frozen-lockfile

      - name: Turbo cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: .turbo
          key: turbo-v2-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-v2-${{ runner.os }}-

      - run: pnpm format:check

      - run: pnpm lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Create SvelteKit env files
        run: |
          for app in apps/amarre apps/ecrin apps/find-an-expert apps/sillage; do
            cp "$app/.env.example" "$app/.env" 2>/dev/null || true
          done

      - run: pnpm install --frozen-lockfile

      - name: Turbo cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: .turbo
          key: turbo-v2-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-v2-${{ runner.os }}-

      - run: pnpm typecheck

      - run: pnpm svelte:check

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Create SvelteKit env files
        run: |
          for app in apps/amarre apps/ecrin apps/find-an-expert apps/sillage; do
            cp "$app/.env.example" "$app/.env" 2>/dev/null || true
          done

      - run: pnpm install --frozen-lockfile

      - name: Turbo cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: .turbo
          key: turbo-v2-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-v2-${{ runner.os }}-

      - run: pnpm test:coverage

      # Phase 1.2 + 3.8 : agrège les rapports vitest et échoue si un
      # paquet devient « missing » (test config présent, coverage data
      # absente) ou tombe sous la cible. Cible passée à 40 en Phase 3.8
      # après ajout massif de tests (cli/biblio, cli/citation,
      # cli/atlas-stats, cli/crf-stats, cli/researcher-profiles,
      # services/crf, packages/atlas-stats) ; sera remontée vers 80
      # quand les exemptions résiduelles (cli/net, find-an-expert)
      # seront renforcées à leur tour.
      - run: pnpm coverage:report 40

      - run: pnpm test:scripts

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Create SvelteKit env files
        run: |
          for app in apps/amarre apps/ecrin apps/find-an-expert apps/sillage; do
            cp "$app/.env.example" "$app/.env" 2>/dev/null || true
          done

      - run: pnpm install --frozen-lockfile

      - name: Turbo cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: .turbo
          key: turbo-v2-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-v2-${{ runner.os }}-

      - run: pnpm build

      - name: Check bundle sizes
        run: pnpm audit:size

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    timeout-minutes: 40
    needs: [build]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Create SvelteKit env files
        run: |
          for app in apps/amarre apps/ecrin apps/find-an-expert apps/sillage; do
            cp "$app/.env.example" "$app/.env" 2>/dev/null || true
          done

      - run: pnpm install --frozen-lockfile

      - name: Turbo cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: .turbo
          key: turbo-v2-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-v2-${{ runner.os }}-

      - name: Build VitePress site
        run: pnpm docs:build

  audit:
    name: Audit
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Turbo cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: .turbo
          key: turbo-v2-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-v2-${{ runner.os }}-

      # knip (audit:unused) résout le graphe d'imports des apps SvelteKit
      # à partir de `.svelte-kit/`. Or les `svelte.config.js` importent
      # `@univ-lehavre/atlas-sveltekit-csp` (Phase 9.2) : tant que ce
      # paquet n'est pas buildé, `svelte-kit sync` (lifecycle `prepare`)
      # échoue silencieusement et `.svelte-kit/` reste absent. On build
      # uniquement les paquets workspace puis on régénère `.svelte-kit/`
      # via `svelte-kit sync` (qui n'a PAS besoin des `$env` runtime,
      # contrairement à un `vite build` complet d'app). Le cache turbo
      # ci-dessus rend ce build quasi-instantané quand rien n'a changé.
      - name: Build workspace packages
        run: pnpm --filter="./packages/**" --filter="./ui/**" build

      - name: Sync SvelteKit metadata
        run: pnpm --filter="./apps/**" exec svelte-kit sync

      - name: Security audit
        run: pnpm audit:security

      - name: License audit
        run: pnpm audit:licenses

      - name: Unused code
        run: pnpm audit:unused

      - name: Code duplication
        run: pnpm audit:duplicates

      - name: Outdated dependencies
        run: pnpm audit:versions

      - name: Packages map up-to-date
        run: pnpm docs:generate:check

      - name: Documentation audit
        run: pnpm audit:docs
