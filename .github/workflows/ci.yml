name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Détecte si la PR touche du code exécutable ou seulement de la
  # documentation. Les jobs lourds (Test/Build/Typecheck) consultent
  # `outputs.code` pour court-circuiter leur travail coûteux SANS jamais se
  # rendre `skipped` — un check requis `skipped` resterait « Pending » et
  # bloquerait le merge (cf. ADR 0034). Conservateur : tout fichier hors de la
  # liste blanche documentaire compte comme du code.
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Classify changed files
        id: filter
        env:
          # Sur une PR, on diffe contre la base de fusion ; sur un push (main),
          # `base` est vide et on force `code=true` (la branche protégée valide
          # toujours tout).
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          if [ -z "${BASE_SHA}" ]; then
            echo "Push (pas une PR) → pipeline complet."
            echo "code=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          files="$(git diff --name-only "${BASE_SHA}" "${HEAD_SHA}")"
          echo "Fichiers modifiés :"
          echo "${files}"
          # Liste blanche documentaire (ADR 0034) : un fichier qui matche l'un
          # de ces motifs est « doc ». Si TOUS les fichiers matchent, la PR est
          # documentaire (code=false) ; sinon code=true.
          code=false
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            case "$f" in
              docs/*) ;;                       # toute la documentation VitePress
              *.md) ;;                         # tout Markdown (README, ADR, plans…)
              *.mdx) ;;
              LICENSE|LICENSE.*) ;;            # licence
              *.editorconfig|.editorconfig) ;; # confort éditeur
              fixtures/*.txt|fixtures/*.csv|fixtures/*.json) ;; # fixtures texte
              *) code=true; echo "→ hors liste blanche : $f" ;;
            esac
          done <<< "${files}"
          echo "code=${code}" >> "$GITHUB_OUTPUT"
          echo "Résultat : code=${code}"

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Create SvelteKit env files
        run: |
          for app in apps/amarre apps/ecrin apps/find-an-expert apps/sillage; do
            cp "$app/.env.example" "$app/.env" 2>/dev/null || true
          done

      - run: pnpm install --frozen-lockfile

      - name: Turbo cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: .turbo
          key: turbo-v2-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-v2-${{ runner.os }}-

      - run: pnpm format:check

      - run: pnpm lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Court-circuit step-level (ADR 0034) : le job tourne toujours (le check
    # requis est rapporté), mais ses étapes lourdes sont sautées si la PR ne
    # touche pas de code → le job sort « success », jamais « skipped ».
    needs: [changes]
    env:
      RUN: ${{ needs.changes.outputs.code == 'true' }}
    steps:
      - if: env.RUN == 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - if: env.RUN == 'true'
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - if: env.RUN == 'true'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Create SvelteKit env files
        if: env.RUN == 'true'
        run: |
          for app in apps/amarre apps/ecrin apps/find-an-expert apps/sillage; do
            cp "$app/.env.example" "$app/.env" 2>/dev/null || true
          done

      - if: env.RUN == 'true'
        run: pnpm install --frozen-lockfile

      - name: Turbo cache
        if: env.RUN == 'true'
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: .turbo
          key: turbo-v2-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-v2-${{ runner.os }}-

      - if: env.RUN == 'true'
        run: pnpm typecheck

      - if: env.RUN == 'true'
        run: pnpm svelte:check

      - name: Skipped (PR documentaire)
        if: env.RUN != 'true'
        run: echo "PR sans code exécutable — typecheck non requis (ADR 0034)."

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Court-circuit step-level (ADR 0034) : voir le job `typecheck`.
    needs: [changes]
    env:
      RUN: ${{ needs.changes.outputs.code == 'true' }}
    steps:
      - if: env.RUN == 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - if: env.RUN == 'true'
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - if: env.RUN == 'true'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Create SvelteKit env files
        if: env.RUN == 'true'
        run: |
          for app in apps/amarre apps/ecrin apps/find-an-expert apps/sillage; do
            cp "$app/.env.example" "$app/.env" 2>/dev/null || true
          done

      - if: env.RUN == 'true'
        run: pnpm install --frozen-lockfile

      - name: Turbo cache
        if: env.RUN == 'true'
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: .turbo
          key: turbo-v2-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-v2-${{ runner.os }}-

      - if: env.RUN == 'true'
        run: pnpm test:coverage

      # Phase 1.2 + 3.8 : agrège les rapports vitest et échoue si un
      # paquet devient « missing » (test config présent, coverage data
      # absente) ou tombe sous la cible. Cible passée à 40 en Phase 3.8
      # après ajout massif de tests (cli/biblio, cli/citation,
      # cli/atlas-stats, cli/crf-stats, cli/researcher-profiles,
      # services/crf, packages/atlas-stats) ; sera remontée vers 80
      # quand les exemptions résiduelles (cli/net, find-an-expert)
      # seront renforcées à leur tour.
      - if: env.RUN == 'true'
        run: pnpm coverage:report 40

      - if: env.RUN == 'true'
        run: pnpm test:scripts

      - name: Skipped (PR documentaire)
        if: env.RUN != 'true'
        run: echo "PR sans code exécutable — tests non requis (ADR 0034)."

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Court-circuit step-level (ADR 0034). `needs` inclut `changes` pour lire le
    # drapeau ; les `needs` lint/typecheck/test restent (ordre du pipeline).
    needs: [changes, lint, typecheck, test]
    env:
      RUN: ${{ needs.changes.outputs.code == 'true' }}
    steps:
      - if: env.RUN == 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - if: env.RUN == 'true'
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - if: env.RUN == 'true'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Create SvelteKit env files
        if: env.RUN == 'true'
        run: |
          for app in apps/amarre apps/ecrin apps/find-an-expert apps/sillage; do
            cp "$app/.env.example" "$app/.env" 2>/dev/null || true
          done

      - if: env.RUN == 'true'
        run: pnpm install --frozen-lockfile

      - name: Turbo cache
        if: env.RUN == 'true'
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: .turbo
          key: turbo-v2-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-v2-${{ runner.os }}-

      - if: env.RUN == 'true'
        run: pnpm build

      - name: Check bundle sizes
        if: env.RUN == 'true'
        run: pnpm audit:size

      - name: Skipped (PR documentaire)
        if: env.RUN != 'true'
        run: echo "PR sans code exécutable — build non requis (ADR 0034)."

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    timeout-minutes: 40
    needs: [build]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Create SvelteKit env files
        run: |
          for app in apps/amarre apps/ecrin apps/find-an-expert apps/sillage; do
            cp "$app/.env.example" "$app/.env" 2>/dev/null || true
          done

      - run: pnpm install --frozen-lockfile

      - name: Turbo cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: .turbo
          key: turbo-v2-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-v2-${{ runner.os }}-

      # TypeDoc (lancé par `docs:build` via `docs:api`) résout les types
      # importés depuis les paquets frères à partir de leurs `.d.ts` buildés.
      # Chaque job CI part d'un checkout neuf sans `dist/`, donc on build les
      # paquets workspace d'abord (le cache turbo rend l'opération quasi
      # instantanée quand le job `build` a déjà tourné sur le même SHA).
      - name: Build workspace packages
        run: pnpm build --filter="!./apps/**"

      - name: Build VitePress site
        run: pnpm docs:build

  audit:
    name: Audit
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          # Historique complet requis : `docs:generate:check` régénère la page
          # d'évolution (docs/quality/evolution-git.md) à partir de `git log`
          # sur tout l'historique. Un checkout superficiel ne verrait qu'un
          # commit et la comparaison échouerait.
          fetch-depth: 0

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Turbo cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: .turbo
          key: turbo-v2-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-v2-${{ runner.os }}-

      # knip (audit:unused) résout le graphe d'imports des apps SvelteKit
      # à partir de `.svelte-kit/`. Or les `svelte.config.js` importent
      # `@univ-lehavre/atlas-sveltekit-csp` (Phase 9.2) : tant que ce
      # paquet n'est pas buildé, `svelte-kit sync` (lifecycle `prepare`)
      # échoue silencieusement et `.svelte-kit/` reste absent. On build
      # uniquement les paquets workspace puis on régénère `.svelte-kit/`
      # via `svelte-kit sync` (qui n'a PAS besoin des `$env` runtime,
      # contrairement à un `vite build` complet d'app). Le cache turbo
      # ci-dessus rend ce build quasi-instantané quand rien n'a changé.
      - name: Build workspace packages
        run: pnpm --filter="./packages/**" --filter="./ui/**" build

      - name: Sync SvelteKit metadata
        run: pnpm --filter="./apps/**" exec svelte-kit sync

      - name: Workspace structure
        run: pnpm audit:structure

      - name: Security audit
        run: pnpm audit:security

      - name: License audit
        run: pnpm audit:licenses

      - name: Unused code
        run: pnpm audit:unused

      - name: Code duplication
        run: pnpm audit:duplicates

      - name: Outdated dependencies
        run: pnpm audit:versions

      - name: Dependency specifier coherence
        run: pnpm audit:dep-versions

      - name: Packages map up-to-date
        run: pnpm docs:generate:check

      - name: Documentation audit
        run: pnpm audit:docs

      - name: API entry points up-to-date
        run: pnpm docs:api:check
