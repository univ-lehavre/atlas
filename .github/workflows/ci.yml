name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Cache Turbo : remote cache adossé au cache GitHub Actions, activé par
  # `caching-for-turbo` dans la composite `setup-workspace` (ADR 0090). L'action
  # pose elle-même TURBO_API/TOKEN/TEAM vers son serveur local — ne PAS remettre
  # de TURBO_TOKEN/TEAM ici (ils pointeraient vers un remote Vercel inexistant).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Détecte si la PR touche du code exécutable ou seulement de la
  # documentation. Les jobs lourds (Lint/Test/Build/Typecheck/Audit) consultent
  # `outputs.code` pour court-circuiter leur travail coûteux SANS jamais se
  # rendre `skipped` — un check requis `skipped` resterait « Pending » et
  # bloquerait le merge (cf. ADR 0034). Conservateur : tout fichier hors de la
  # liste blanche documentaire compte comme du code.
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Classify changed files
        id: filter
        env:
          # Sur une PR, on diffe contre la base de fusion ; sur un push (main),
          # `base` est vide et on force `code=true` (la branche protégée valide
          # toujours tout).
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          if [ -z "${BASE_SHA}" ]; then
            echo "Push (pas une PR) → pipeline complet."
            echo "code=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          files="$(git diff --name-only "${BASE_SHA}" "${HEAD_SHA}")"
          echo "Fichiers modifiés :"
          echo "${files}"
          # Liste blanche documentaire (ADR 0034) : un fichier qui matche l'un
          # de ces motifs est « doc ». Si TOUS les fichiers matchent, la PR est
          # documentaire (code=false) ; sinon code=true.
          code=false
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            case "$f" in
              docs/*) ;;                       # toute la documentation VitePress
              *.md) ;;                         # tout Markdown (README, ADR, plans…)
              *.mdx) ;;
              LICENSE|LICENSE.*) ;;            # licence
              .editorconfig) ;;                # confort éditeur
              fixtures/*.txt|fixtures/*.csv|fixtures/*.json) ;; # fixtures texte
              *) code=true; echo "→ hors liste blanche : $f" ;;
            esac
          done <<< "${files}"
          echo "code=${code}" >> "$GITHUB_OUTPUT"
          echo "Résultat : code=${code}"

  # Tous les jobs lourds ne dépendent QUE de `changes` : ils partent en
  # parallèle (ADR 0061). Turbo gère l'ordre réel des tâches (`^build`) à
  # l'intérieur de chaque job — chaîner les jobs CI entre eux n'ajoutait que des
  # barrières d'attente inutiles. Le pattern de court-circuit reste au niveau
  # *step* (drapeau `RUN`) pour que chaque check requis sorte toujours `success`,
  # jamais `skipped` (ADR 0034/0016).

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [changes]
    env:
      RUN: ${{ needs.changes.outputs.code == 'true' }}
    steps:
      - if: env.RUN == 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - if: env.RUN == 'true'
        uses: ./.github/actions/setup-workspace

      - if: env.RUN == 'true'
        run: pnpm format:check

      - if: env.RUN == 'true'
        run: pnpm lint

      - name: Skipped (PR documentaire)
        if: env.RUN != 'true'
        run: echo "PR sans code exécutable — lint non requis (ADR 0034)."

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [changes]
    env:
      RUN: ${{ needs.changes.outputs.code == 'true' }}
    steps:
      - if: env.RUN == 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - if: env.RUN == 'true'
        uses: ./.github/actions/setup-workspace

      - if: env.RUN == 'true'
        run: pnpm typecheck

      - if: env.RUN == 'true'
        run: pnpm svelte:check

      - name: Skipped (PR documentaire)
        if: env.RUN != 'true'
        run: echo "PR sans code exécutable — typecheck non requis (ADR 0034)."

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [changes]
    env:
      RUN: ${{ needs.changes.outputs.code == 'true' }}
    steps:
      - if: env.RUN == 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - if: env.RUN == 'true'
        uses: ./.github/actions/setup-workspace

      - if: env.RUN == 'true'
        run: pnpm test:coverage

      # Phase 1.2 + 3.8 : agrège les rapports vitest et échoue si un
      # paquet devient « missing » (test config présent, coverage data
      # absente) ou tombe sous la cible. Cible passée à 40 en Phase 3.8
      # après ajout massif de tests (cli/biblio, cli/citation,
      # cli/atlas-stats, cli/crf-stats, cli/researcher-profiles,
      # services/crf, packages/atlas-stats) ; sera remontée vers 80
      # quand les exemptions résiduelles (cli/net, find-an-expert)
      # seront renforcées à leur tour.
      #
      # DIVERGENCE ASSUMÉE avec le pre-push (lefthook.yml : `coverage:report 80`).
      # Le 40 est un plancher CI TRANSITOIRE (cf. ci-dessus) ; le pre-push exige
      # déjà 80 pour ne pas relâcher l'anti-régression locale des ~30 paquets
      # ≥ 80. Les deux convergeront vers 80 ensemble — toute modification d'un
      # seuil doit mettre à jour L'AUTRE (garder ce repère croisé).
      - if: env.RUN == 'true'
        run: pnpm coverage:report 40

      - if: env.RUN == 'true'
        run: pnpm test:scripts

      - name: Skipped (PR documentaire)
        if: env.RUN != 'true'
        run: echo "PR sans code exécutable — tests non requis (ADR 0034)."

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # ADR 0061 : ne dépend plus de lint/typecheck/test. Ce ne sont pas des
    # dépendances de build mais des gates de qualité parallèles ; les chaîner
    # ne faisait qu'allonger le chemin critique. Turbo construit l'ordre réel
    # (`^build`) en interne.
    needs: [changes]
    env:
      RUN: ${{ needs.changes.outputs.code == 'true' }}
    steps:
      - if: env.RUN == 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - if: env.RUN == 'true'
        uses: ./.github/actions/setup-workspace

      - if: env.RUN == 'true'
        run: pnpm build

      - name: Check bundle sizes
        if: env.RUN == 'true'
        run: pnpm audit:size

      - name: Skipped (PR documentaire)
        if: env.RUN != 'true'
        run: echo "PR sans code exécutable — build non requis (ADR 0034)."

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    timeout-minutes: 40
    # ADR 0061 : détaché de `build`. `docs:build` ne lit que les sources
    # (README de paquets, package.json pour la carte, historique git pour les
    # stats) — aucun artefact buildé du workspace n'est requis (cf. step
    # ci-dessous). Il peut donc tourner en parallèle de Build.
    needs: [changes]
    # Ce job VALIDE que le site de doc se construit avant merge (sur PR). Sur un
    # push `main`, le workflow `docs.yml` reconstruit ET déploie le même site :
    # le rebuild ici serait une double construction pure (≈1-2 min, `docs:build`
    # n'étant pas mis en cache par Turbo). On court-circuite donc au niveau du
    # STEP en `push` (le job reste présent et sort `success`), pas au niveau job.
    env:
      RUN: ${{ github.event_name == 'pull_request' }}
    steps:
      - if: env.RUN == 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - if: env.RUN == 'true'
        uses: ./.github/actions/setup-workspace

      # `docs:build` ne lit que les sources (README de paquets, package.json
      # pour la carte, historique git pour les stats) — aucun artefact buildé.
      # Pas de build workspace préalable nécessaire.
      - name: Build Astro Starlight site
        if: env.RUN == 'true'
        run: pnpm docs:build

      - name: Skipped (push main — docs.yml reconstruit et déploie déjà)
        if: env.RUN != 'true'
        run: echo "Push main, build de doc délégué à docs.yml (déploiement) — pas de rebuild ici."

  audit:
    name: Audit
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [changes]
    env:
      RUN: ${{ needs.changes.outputs.code == 'true' }}
    steps:
      - if: env.RUN == 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Historique complet requis : `docs:generate:check` régénère la page
          # d'évolution (docs/quality/evolution-git.md) à partir de `git log`
          # sur tout l'historique. Un checkout superficiel ne verrait qu'un
          # commit et la comparaison échouerait.
          fetch-depth: 0

      # Valide les workflows et actions composites GitHub (ADR 0061) : un
      # `needs` orphelin, un `uses` non résolvable ou une expression `${{ }}`
      # cassée échouerait silencieusement en production — et sur un check requis,
      # bloquerait tout merge. actionlint embarque shellcheck pour les blocs
      # `run:`. Ne tourne que sur une PR « code » (RUN) : une PR qui touche
      # `.github/**` est par construction hors liste blanche documentaire.
      # On invoque actionlint EN DIRECT (image officielle épinglée par digest)
      # plutôt que via reviewdog : le reporter `local` de reviewdog exige un diff
      # git qu'un job CI n'a pas (« diff command is empty » → step en erreur). Le
      # binaire sort en code ≠ 0 au premier problème → le job rougit nativement,
      # sans API Checks ni permission `checks: write` (workflow en `contents: read`).
      - if: env.RUN == 'true'
        name: Lint GitHub workflows
        run: |
          docker run --rm -v "$PWD":/repo --workdir /repo \
            rhysd/actionlint@sha256:b1934ee5f1c509618f2508e6eb47ee0d3520686341fec936f3b79331f9315667 \
            -color

      - if: env.RUN == 'true'
        uses: ./.github/actions/setup-workspace

      # knip (audit:unused) résout le graphe d'imports des apps SvelteKit
      # à partir de `.svelte-kit/`. Or les `svelte.config.js` importent
      # `@univ-lehavre/atlas-sveltekit-csp` (Phase 9.2) : tant que ce
      # paquet n'est pas buildé, `svelte-kit sync` (lifecycle `prepare`)
      # échoue silencieusement et `.svelte-kit/` reste absent. On build
      # uniquement les paquets workspace puis on régénère `.svelte-kit/`
      # via `svelte-kit sync` (qui n'a PAS besoin des `$env` runtime,
      # contrairement à un `vite build` complet d'app). Le cache turbo
      # rend ce build quasi-instantané quand rien n'a changé.
      - if: env.RUN == 'true'
        name: Build workspace packages
        run: pnpm --filter="./packages/**" --filter="./ui/**" build

      - if: env.RUN == 'true'
        name: Sync SvelteKit metadata
        run: pnpm --filter="./apps/**" exec svelte-kit sync

      - if: env.RUN == 'true'
        name: Workspace structure
        run: pnpm audit:structure

      - if: env.RUN == 'true'
        name: Security audit
        run: pnpm audit:security

      - if: env.RUN == 'true'
        name: License audit
        run: pnpm audit:licenses

      - if: env.RUN == 'true'
        name: Unused code
        run: pnpm audit:unused

      - if: env.RUN == 'true'
        name: Code duplication
        run: pnpm audit:duplicates

      # `audit:versions` (taze) retiré du gate : il interroge le réseau pour
      # lister les deps obsolètes mais NE BLOQUE PAS (pas de `--fail-on-outdated`,
      # sortie 0 même sur deps en retard) — c'est de l'information, redondante
      # avec Dependabot (PR hebdomadaire groupée par écosystème). On épargne le
      # coût réseau par run sans perdre aucun garde-fou. La commande reste
      # disponible en local (`pnpm audit:versions`) pour un audit ponctuel.
      - if: env.RUN == 'true'
        name: Dependency specifier coherence
        run: pnpm audit:dep-versions

      - if: env.RUN == 'true'
        name: Packages map up-to-date
        run: pnpm docs:generate:check

      - if: env.RUN == 'true'
        name: Documentation audit
        run: pnpm audit:docs

      - name: Skipped (PR documentaire)
        if: env.RUN != 'true'
        run: echo "PR sans code exécutable — audit non requis (ADR 0034)."

  dataops:
    name: DataOps (Python)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Catégorie dataops/ (Python, ADR 0055) : mêmes exigences de qualité que le
      # code Node (ruff + pytest + couverture à seuil). pnpm orchestre (scripts
      # lint:python / test:python via turbo, ADR 0066), uv exécute le toolchain
      # Python. setup-workspace fournit pnpm + Node + install + CACHE TURBO : les
      # checks dataops (lint:py/test:py/manifests:py) bénéficient ainsi du cache de
      # contenu inter-runs (ADR 0066) — un contenu déjà validé tombe en FULL TURBO.
      - uses: ./.github/actions/setup-workspace

      # ADR 0061 : cache de l'environnement uv (téléchargements + venv résolu),
      # invalidé sur changement des lockfiles Python. Sans cache, chaque run
      # re-télécharge et re-résout l'environnement Dagster.
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: "dataops/**/uv.lock"

      # Modèle d'embedding (lot 3) NON versionné : téléchargé (révision HF figée +
      # sha256) avant les tests, sinon la fixture embedding_model SKIP les tests du
      # vecteur et la couverture chute sous le seuil. Caché par révision (clé =
      # fetch_model.py) pour ne pas retélécharger à chaque run.
      - name: Cache embedding model
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v5
        with:
          path: dataops/citation-dagster/src/citation_dagster/models/all-MiniLM-L6-v2
          key: onnx-model-${{ hashFiles('dataops/citation-dagster/scripts/fetch_model.py') }}

      - name: Fetch embedding model
        run: >-
          uv --project dataops/citation-dagster run python
          dataops/citation-dagster/scripts/fetch_model.py
          dataops/citation-dagster/src/citation_dagster/models/all-MiniLM-L6-v2

      # kubeconform pour valider les manifestes de déploiement rendus par
      # kustomize (kubectl est préinstallé sur les runners). Version pinnée
      # (cohérent avec le pin par SHA des actions) ; checksum vérifié.
      - name: Install kubeconform
        run: |
          set -euo pipefail
          ver=v0.6.7
          url="https://github.com/yannh/kubeconform/releases/download/${ver}/kubeconform-linux-amd64.tar.gz"
          sha=95f14e87aa28c09d5941f11bd024c1d02fdc0303ccaa23f61cef67bc92619d73
          curl -fsSL "$url" -o kubeconform.tar.gz
          echo "${sha}  kubeconform.tar.gz" | sha256sum -c -
          tar -xzf kubeconform.tar.gz kubeconform
          sudo install kubeconform /usr/local/bin/
          rm -f kubeconform.tar.gz kubeconform

      - name: DataOps quality (ruff + pytest + coverage + manifests)
        run: pnpm dataops:check
