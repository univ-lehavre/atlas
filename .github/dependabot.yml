# Dependabot keeps the dependencies fresh and the GitHub Actions pinned by SHA
# up-to-date (re-pins to the latest SHA when a version is released).
# Reference: https://docs.github.com/en/code-security/dependabot/working-with-dependabot/dependabot-options-reference
#
# Bruit de PR : tous les minor/patch sont regroupés dans une PR unique
# par écosystème et par run (1×/semaine, lundi 06:00 Europe/Paris) ;
# `open-pull-requests-limit: 1` garantit qu'une seule PR Dependabot par
# écosystème reste ouverte à la fois — les mises à jour s'enfilent en
# file d'attente derrière la PR en cours. Les majors sortent en PR
# séparée (Dependabot default) mais sont également soumis au limit, donc
# attendent leur tour. Les *security updates* (alertes Dependabot) ne
# sont pas affectés par ce limit et restent prioritaires.

version: 2

updates:
  # ---------------------------------------------------------------------------
  # npm — workspace root (covers all pnpm workspaces)
  # ---------------------------------------------------------------------------
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Paris"
    open-pull-requests-limit: 1
    labels:
      - "dependencies"
      - "automation"
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      # Toutes les mises à jour minor + patch dans une seule PR par run.
      # Les majors ouvrent leur propre PR (Dependabot default).
      all-minor-patch:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # ---------------------------------------------------------------------------
  # GitHub Actions — keep pinned SHAs current with version bumps
  # ---------------------------------------------------------------------------
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Paris"
    open-pull-requests-limit: 1
    labels:
      - "github-actions"
      - "automation"
    commit-message:
      prefix: "ci"
      include: "scope"
    groups:
      # Tous les bumps d'actions dans une seule PR par run.
      all-actions:
        applies-to: version-updates
        patterns:
          - "*"

  # ---------------------------------------------------------------------------
  # pip — code-location DataOps (Python natif, ADR 0055 ; hors graphe pnpm)
  # ---------------------------------------------------------------------------
  # Sans ce bloc, Dependabot ouvrait une PR PAR paquet Python (bruit) et
  # proposait des bumps INGÉRABLES car la stack est verrouillée par alignement
  # de versions (chart Helm Dagster ↔ paquets Python, ADR cluster 0006) :
  # dagster 1.13.7 ↔ dagster-dbt/dagster-postgres/dagster-k8s 0.29.7, et la
  # chaîne dbt (dbt-core/dbt-common/dbt-adapters) + deepdiff<8 qu'épingle
  # dagster-dbt. On groupe minor/patch en une PR et on IGNORE les paquets dont
  # la version est contrainte (un bump y casse la résolution / l'alignement).
  - package-ecosystem: "pip"
    directory: "/dataops/citation-dagster"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Paris"
    open-pull-requests-limit: 1
    labels:
      - "dependencies"
      - "automation"
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      # Tous les minor + patch dans une seule PR par run.
      dataops-minor-patch:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      # Verrouillés par l'alignement Dagster (ADR cluster 0006) : ne bumper
      # qu'en relevant dagster core de façon coordonnée, jamais par Dependabot.
      - dependency-name: "dagster"
      - dependency-name: "dagster-dbt"
      - dependency-name: "dagster-postgres"
      - dependency-name: "dagster-k8s"
      # Chaîne dbt épinglée par dagster-dbt==0.29.7 (dont deepdiff<8) : un bump
      # rétrograde dbt-core et rompt l'alignement (cf. dependency-review.yml).
      - dependency-name: "dbt-core"
      - dependency-name: "dbt-common"
      - dependency-name: "dbt-adapters"
      - dependency-name: "dbt-duckdb"
      - dependency-name: "deepdiff"
      # onnxruntime : verrouillé par l'image python:3.10-slim (parité Dagster,
      # ADR cluster 0006). À partir de 1.24, onnxruntime ne publie PLUS de wheel
      # cp310 → `uv` ne résout plus du tout (CI DataOps en échec immédiat, #418).
      # À ne bumper qu'avec une montée coordonnée de la version de Python.
      - dependency-name: "onnxruntime"
      # evidently : l'API a été RÉÉCRITE entre 0.4 et 0.6+ (ColumnMapping,
      # EmbeddingsDriftMetric, Report.as_dict() supprimés/déplacés). Un bump casse
      # `assets/drift.py` — c'est un chantier de réécriture, pas une MAJ auto (#418).
      # Épinglé à la ligne 0.4.x tant que drift.py n'est pas porté à la nouvelle API.
      - dependency-name: "evidently"
      # Majors écartés globalement (alignement à valider à la main) ; les
      # minor/patch des autres paquets restent suivis et groupés.
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # ---------------------------------------------------------------------------
  # docker — images de base épinglées par digest (ADR 0084)
  # ---------------------------------------------------------------------------
  # Les `FROM` des Dockerfile sont épinglés par `@sha256:…` : sans cette boucle,
  # un digest figé ne recevrait plus les correctifs de l'image de base. Dependabot
  # rouvre une PR quand un digest prend du retard sur son tag (node, python, php).
  # On groupe tous les bumps d'images dans une PR unique par run.
  - package-ecosystem: "docker"
    directories:
      - "/apps/amarre"
      - "/apps/atlas-dashboard"
      - "/apps/crf-dashboard"
      - "/apps/ecrin"
      - "/apps/find-an-expert"
      - "/apps/sillage"
      - "/services/crf"
      - "/dataops/citation-dagster"
      - "/dataops/mediawatch-dagster"
      - "/sandbox/crf-sandbox/docker/php"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Paris"
    open-pull-requests-limit: 1
    labels:
      - "dependencies"
      - "automation"
    commit-message:
      prefix: "ci"
      include: "scope"
    ignore:
      # Garde de portabilité (ADR 0088). Les `FROM python:` / `php:` portent un
      # tag LITTÉRAL (`python:3.10-slim@sha256:…`) : Dependabot en parse la
      # version et peut proposer un bump de tag — c'est ainsi que les images
      # dataops sont passées à tort de `3.10` à `3.14`, cassant la parité Dagster
      # (verrou chart Helm 1:1, ADR cluster 0006) et `requires-python <3.11`. On
      # NE veut QUE les patches de sécurité du MÊME tag (mise à jour du digest,
      # toujours autorisée) : on ignore donc tout bump major ET minor de version.
      # `php` est aligné sur l'upstream REDCap, même logique de verrou amont.
      # `node` n'a pas besoin de règle : son tag est interpolé par ARG
      # (`node:${NODE_VERSION}-…`), que Dependabot ne bumpe pas (seul le digest).
      - dependency-name: "python"
        update-types:
          - "version-update:semver-major"
          - "version-update:semver-minor"
      - dependency-name: "php"
        update-types:
          - "version-update:semver-major"
          - "version-update:semver-minor"
    groups:
      # Tous les bumps de digests d'images dans une seule PR par run.
      docker-images:
        patterns:
          - "*"
