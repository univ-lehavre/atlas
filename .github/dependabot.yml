# Dependabot keeps the dependencies fresh and the GitHub Actions pinned by SHA
# up-to-date (re-pins to the latest SHA when a version is released).
# Reference: https://docs.github.com/en/code-security/dependabot/working-with-dependabot/dependabot-options-reference
#
# Bruit de PR : tous les minor/patch sont regroupés dans une PR unique
# par écosystème et par run (1×/semaine, lundi 06:00 Europe/Paris) ;
# `open-pull-requests-limit: 1` garantit qu'une seule PR Dependabot par
# écosystème reste ouverte à la fois — les mises à jour s'enfilent en
# file d'attente derrière la PR en cours. Les majors sortent en PR
# séparée (Dependabot default) mais sont également soumis au limit, donc
# attendent leur tour. Les *security updates* (alertes Dependabot) ne
# sont pas affectés par ce limit et restent prioritaires.

version: 2

updates:
  # ---------------------------------------------------------------------------
  # npm — workspace root (covers all pnpm workspaces)
  # ---------------------------------------------------------------------------
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Paris"
    open-pull-requests-limit: 1
    labels:
      - "dependencies"
      - "automation"
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      # Toutes les mises à jour minor + patch dans une seule PR par run.
      # Les majors ouvrent leur propre PR (Dependabot default).
      all-minor-patch:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # ---------------------------------------------------------------------------
  # GitHub Actions — keep pinned SHAs current with version bumps
  # ---------------------------------------------------------------------------
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Paris"
    open-pull-requests-limit: 1
    labels:
      - "github-actions"
      - "automation"
    commit-message:
      prefix: "ci"
      include: "scope"
    groups:
      # Tous les bumps d'actions dans une seule PR par run.
      all-actions:
        applies-to: version-updates
        patterns:
          - "*"
