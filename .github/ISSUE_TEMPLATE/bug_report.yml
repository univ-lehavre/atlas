name: "🐛 Bug / Anomalie"
description: "Signaler un comportement incorrect (FR ou EN). Report a bug (French or English)."
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Merci de signaler ce problème. Réponds en **français ou en anglais** —
        les deux sont acceptés. Pour une **faille de sécurité**, n'ouvre pas
        d'issue : utilise le [signalement privé](https://github.com/univ-lehavre/atlas/security/advisories/new)
        (cf. [SECURITY.md](https://github.com/univ-lehavre/atlas/blob/main/SECURITY.md)).
  - type: textarea
    id: what-happened
    attributes:
      label: "Description / What happened"
      description: "Ce qui se passe, et ce que tu attendais. What happens, and what you expected."
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: "Étapes de reproduction / Steps to reproduce"
      description: "Étapes minimales pour reproduire. Minimal steps to reproduce."
      placeholder: |
        1. …
        2. …
        3. …
    validations:
      required: true
  - type: input
    id: scope
    attributes:
      label: "Workspace concerné / Affected workspace"
      description: "Ex. apps/amarre, services/crf, dataops/citation-dagster, packages/… (si connu)."
    validations:
      required: false
  - type: textarea
    id: env
    attributes:
      label: "Environnement / Environment"
      description: "OS, version Node (.nvmrc), navigateur, etc. — si pertinent."
    validations:
      required: false
