packages:
  - apps/*
  - docs
  - assets/*
  - cli/*
  - config/*
  - packages/*
  - sandbox/*
  - services/*
  - ui/*
  # Code-locations dataops (Python/uv) — déclarées ICI uniquement pour entrer dans
  # le graphe Turbo et bénéficier du cache des checks (lint:py/test:py/manifests:py,
  # ADR 0066). Elles restent pilotées par uv/ruff/pytest, hors des audits Node
  # (knip les exclut, audit:structure ne les voit pas). Chemins EXPLICITES (pas
  # `dataops/*`) : les projets dbt (citation-dbt/mediawatch-dbt) n'ont pas de
  # package.json et restent hors workspace.
  - dataops/citation-dagster
  - dataops/mediawatch-dagster

ignoredOptionalDependencies:
  # sharp (optionalDependency d'astro) tire @img/sharp-libvips-* en LGPL.
  # On ne l'installe pas : la doc n'utilise pas le service d'images Astro
  # (logos servis statiquement depuis public/). Évite la licence LGPL sans
  # exception à maintenir (ADR 0036).
  - sharp

onlyBuiltDependencies:
  - "@duckdb/node-api"
  - "@parcel/watcher"
  - "@scarf/scarf"
  - core-js
  - esbuild
  - lefthook
  - msgpackr-extract
  - protobufjs
  - tesseract.js
  - unrs-resolver
  - vue-demi

# Moved from the deprecated `pnpm.*` block in package.json: pnpm 10 reads
# these from here, not from package.json (silent-ignore otherwise).
#
# Security overrides are always *scoped to the vulnerable version range*
# (e.g. `"pkg@>=A <B": ">=B"`) rather than applied globally. A global
# override forces every consumer — including legacy majors that aren't
# affected by the CVE — onto the new version, and that often breaks
# API-incompatible consumers : see js-yaml 3→4 (read-yaml-file uses the
# removed `safeLoad`) and ajv 6→8 (eslint 10 imports the v6 ref path).
# The conditional syntax leaves unaffected majors alone.
overrides:
  "@isaacs/brace-expansion": ">=5.0.1"
  # Unbounded memory alloc dans la propagation W3C Baggage, patché en 2.8.0
  # (transitive via services__crf>@effect/opentelemetry).
  "@opentelemetry/core@<2.8.0": ">=2.8.0"
  "@sveltejs/kit": ">=2.58.0"
  "@xmldom/xmldom": ">=0.9.10"
  "ajv@>=7.0.0-alpha.0 <8.18.0": ">=8.18.0"
  "cookie@<0.7.0": ">=0.7.0"
  defu: ">=6.1.7"
  devalue: ">=5.8.1"
  # Scoped au major 3.x (transitive via docs>mermaid) ; le quadratic-DoS et
  # les bypass IN_PLACE sont patchés en 3.4.7.
  "dompurify@<3.4.7": ">=3.4.7"
  effect: ">=3.21.2"
  "esbuild@<0.28.1": ">=0.28.1"
  fast-uri: ">=3.1.2"
  fast-xml-parser: ">=5.7.2"
  flatted: ">=3.4.2"
  # Plancher 4.2.0 (advisory merge-key DoS) ET plafond <5 : js-yaml 5.x est
  # ESM-only (plus d'export `default`), or @astrojs/internal-helpers fait
  # `import yaml from "js-yaml"` → `astro build` casse (« does not provide an
  # export named 'default' », job Documentation). La 4.x couvre l'advisory ; la
  # 5.x n'apporte rien ici. À relever quand Astro consommera js-yaml 5 (named).
  "js-yaml@>=4.0.0 <5": ">=4.2.0 <5"
  lodash: ">=4.18.1"
  lodash-es: ">=4.18.1"
  minimatch: ">=10.2.5"
  picomatch: ">=4.0.4"
  # Both 7.x (used by @xenova/transformers) and 8.x have separate CVEs ;
  # cover each major in its own scoped override.
  "protobufjs@<7.5.8": ">=7.5.8"
  "protobufjs@>=8.0.0 <8.2.0": ">=8.2.0"
  # @manypkg/get-packages@1.1.3 (via @changesets/cli) épingle read-yaml-file
  # 1.x → js-yaml 3.14.2, vulnérable au merge-key DoS. La 2.1.0 reste CJS
  # (require-compatible) et tire js-yaml 4.x → patché. La 3.0.0 est ESM-only
  # et casserait le require() de manypkg, donc on borne à <3.
  "read-yaml-file@<2.0.0": "2.1.0"
  rollup: ">=4.60.2"
  # TLS cert bypass, WebSocket DoS, cross-origin routing & cross-user info
  # disclosure (GHSA-vmh5-mc38-953g / vxpw-j846-p89q / hm92-r4w5-c3mj + 1
  # moderate) patchés en 7.28.0 ; transitif via jsdom et @effect/platform-node.
  undici: ">=7.28.0 <8"
  "uuid@>=11.0.0 <11.1.1": ">=11.1.1"
  "vite@<=6.4.1": ">=6.4.2"
  "ws@>=8.0.0 <8.20.1": ">=8.20.1"

patchedDependencies:
  reprism@0.0.11: patches/reprism@0.0.11.patch

peerDependencyRules:
  allowedVersions:
    "@effect/vitest>vitest": "^4"
    "@standard-community/standard-json>quansync": "^1"
    "openapi-typescript>typescript": "^6"
