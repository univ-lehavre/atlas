packages:
  - apps/*
  - cli/*
  - config/*
  - packages/*
  - sandbox/*
  - services/*
  - ui/*

onlyBuiltDependencies:
  - "@duckdb/node-api"
  - "@parcel/watcher"
  - "@scarf/scarf"
  - core-js
  - esbuild
  - lefthook
  - msgpackr-extract
  - protobufjs
  - sharp
  - tesseract.js
  - unrs-resolver
  - vue-demi

# Moved from the deprecated `pnpm.*` block in package.json: pnpm 10 reads
# these from here, not from package.json (silent-ignore otherwise — see the
# WARN emitted by pnpm on every command).
overrides:
  "@isaacs/brace-expansion": ">=5.0.1"
  "@sveltejs/kit": ">=2.58.0"
  "@xmldom/xmldom": ">=0.9.10"
  ajv: ">=8.18.0"
  cookie: ">=0.7.0"
  defu: ">=6.1.7"
  devalue: ">=5.8.1"
  effect: ">=3.21.2"
  esbuild: ">=0.25.0"
  fast-uri: ">=3.1.2"
  fast-xml-parser: ">=5.7.2"
  flatted: ">=3.4.2"
  js-yaml: ">=4.1.1"
  lodash: ">=4.18.1"
  lodash-es: ">=4.18.1"
  minimatch: ">=10.2.5"
  picomatch: ">=4.0.4"
  protobufjs: ">=8.2.0"
  rollup: ">=4.60.2"
  undici: ">=7.25.0 <8"
  uuid: ">=11.1.1"
  vite: ">=6.4.2"
  ws: ">=8.20.1"

patchedDependencies:
  reprism@0.0.11: patches/reprism@0.0.11.patch

peerDependencyRules:
  allowedVersions:
    "@effect/vitest>vitest": "^4"
    "@standard-community/standard-json>quansync": "^1"
    "openapi-typescript>typescript": "^6"
