# Gitleaks configuration for Atlas.
# Documentation: https://github.com/gitleaks/gitleaks#configuration
#
# Inherits the default rules then adds patterns specific to Atlas:
#   - REDCap project tokens (32-char uppercase hex) — only when surrounded by
#     an explicit assignment context (`=` or `:`) to avoid matching JSDoc /
#     doc examples that contain look-alike hex strings.
#   - REDCap token CSVs at repo root.
#
# Whitelists:
#   - Markdown files (`*.md`) — documentation by nature contains example
#     tokens (e.g. `RedcapToken('ABCDEF…')`). Source code with real secrets
#     would not live in `.md`.
#   - Test fixtures and example files (`.env.example`, sandbox docker
#     `.env.test`) intentionally contain look-alike values.
#   - Known fixture patterns explicitly used in JSDoc / doc examples
#     (`A1B2C3D4…`, `ABCDEF0123…`) — see PR #127 follow-up in TODO.md.
#   - `redcap-token.csv` is gitignored and never tracked, but we still
#     blacklist its path defensively.

[extend]
useDefault = true

# ---------------------------------------------------------------------------
# Custom rules
# ---------------------------------------------------------------------------

[[rules]]
id = "redcap-api-token"
description = "REDCap API project token (32-char uppercase hex) in an assignment context"
# Requires the hex value to follow an assignment-like context (`=` or `:`)
# preceded by a redcap-token-related identifier. This avoids matching JSDoc
# function-call examples such as `RedcapToken('A1B2C3D4…')`.
regex = '''(?i)(?:redcap[_-]?(?:api[_-]?)?token|REDCAP_API_TOKEN)\s*[:=]\s*['"]?([A-F0-9]{32})['"]?'''
keywords = ["redcap", "REDCAP_API_TOKEN", "redcap_token"]
entropy = 3.0
secretGroup = 1

[[rules]]
id = "redcap-token-csv"
description = "REDCap token CSV row (project_id,token)"
regex = '''^\s*\d+\s*,\s*[A-F0-9]{32}'''
keywords = ["redcap", "token"]

# ---------------------------------------------------------------------------
# Allowlist
# ---------------------------------------------------------------------------

[allowlist]
paths = [
  # Generated / template files that mimic tokens for documentation
  '''\.env\.example$''',
  '''\.env\.[a-z]+\.example$''',
  '''sandbox/crf-sandbox/docker/config/\.env\.test$''',
  '''sandbox/crf-sandbox/docker/config/\.env\.test\.example$''',
  # Workspace-locked CSV containing project tokens — never tracked but
  # defended in depth.
  '''^redcap-token\.csv$''',
  # Test fixtures with synthetic data — covers current and historical paths
  # (e.g. `packages/<pkg>/tests/fixtures/`, the now-renamed
  # `packages/redcap/tests/fixtures/` from before the trademark migration,
  # and the sandbox tree).
  '''(?:^|/)tests/fixtures/''',
  '''packages/.*/src/.*\.test\.ts$''',
  '''packages/.*/src/.*\.spec\.ts$''',
  # Markdown documentation — contains example tokens by nature, never
  # real secrets.
  '''\.md$''',
]

# Common test fixtures (e.g. 32-char hex that aren't real tokens)
regexes = [
  # Vitest / unit-test placeholders frequently use AAAA... or 1234... patterns
  '''^[A-Z0]{32}$''',
  # SHA hashes (40 chars) are NOT secrets
  '''^[a-f0-9]{40}$''',
  # Known doc/JSDoc fixture patterns (repeating 16-char blocks)
  '''^A1B2C3D4E5F6A1B2C3D4E5F6A1B2C3D4$''',
  '''^ABCDEF0123456789ABCDEF0123456789$''',
]
