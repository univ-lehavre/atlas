# Overlay PROD (RGW Ceph, ObjectBucketClaim).
#
# Ajoute l'ObjectBucketClaim (Rook génère Secret AWS_* + ConfigMap BUCKET_*) et
# branche la code-location sur les deux via envFrom (patch-s3-envfrom).
#
# Image : le tag `:dev` de la base est interdit en production (contrat cluster
# ADR 0033 : « taguées explicitement, pas `latest` »). Surcharger `newTag` par le
# tag immuable (SHA/version) au déploiement de l'instance — valeur d'exemple ici.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
  - objectbucketclaim.yaml
patches:
  - path: patch-s3-envfrom.yaml
    target:
      kind: Deployment
      name: citation-dagster
images:
  - name: registry:80/citation-dagster
    newTag: "0.0.0" # exemple ; remplacer par le tag immuable de l'instance
