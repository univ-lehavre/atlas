# Accès S3 du lakehouse — profil PROD (RGW Ceph, ObjectBucketClaim).
#
# NON appliqué au banc léger (SeaweedFS, voir s3-access.bench.yaml) : ce fichier
# documente le mécanisme de prod. Rook provisionne le bucket et génère :
#   - un Secret homonyme : AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY ;
#   - un ConfigMap homonyme : BUCKET_HOST / BUCKET_PORT / BUCKET_NAME.
# La code-location les consomme via `envFrom` (mêmes noms qu'au banc), donc le code
# de l'asset `raw_snapshot` est identique banc ↔ prod.
apiVersion: objectbucket.io/v1alpha1
kind: ObjectBucketClaim
metadata:
  name: atlas-datalake
  namespace: dagster
spec:
  generateBucketName: atlas-datalake
  storageClassName: rook-ceph-bucket
