# Code-location Dagster « citation » : serveur gRPC + Service.
#
# L'orchestrateur Dagster (livré vide par le cluster) découvre ce serveur via le
# patch du ConfigMap dagster-workspace (voir workspace-patch.yaml). Le Deployment
# et le Service vivent dans le namespace `dagster` : c'est là que tournent aussi
# les runs (Jobs K8s du K8sRunLauncher), qui héritent des NetworkPolicies du
# namespace (dont allow-internet-egress pour atteindre s3://openalex).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: citation-dagster
  namespace: dagster
  labels:
    app.kubernetes.io/name: citation-dagster
    app.kubernetes.io/part-of: atlas
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: citation-dagster
  template:
    metadata:
      labels:
        app.kubernetes.io/name: citation-dagster
    spec:
      containers:
        - name: grpc
          image: registry:80/citation-dagster:dev
          imagePullPolicy: Always
          ports:
            - name: grpc
              containerPort: 4000
          env:
            # Image que le K8sRunLauncher donne aux pods de run (run workers).
            # Sans elle, le launcher échoue (« dagster/image … Got None »).
            - name: DAGSTER_CURRENT_IMAGE
              value: registry:80/citation-dagster:dev
            # Lineage OpenLineage → Marquez (contrat cluster).
            - name: OPENLINEAGE_URL
              value: http://marquez.marquez.svc.cluster.local:5000
            - name: OPENLINEAGE_ENDPOINT
              value: api/v1/lineage
            - name: OPENLINEAGE_NAMESPACE
              value: dagster
            # Suivi de modèles MLflow → serveur du socle (contrat cluster,
            # ADR 0062). FQDN intra-cluster identique banc ↔ prod. Le code
            # (drift Evidently, instrumentation CT) logue runs/params/métriques
            # ici ; sans cette variable, le logging best-effort tombe en no-op
            # silencieux. L'egress dagster→mlflow:5000 est ouvert côté cluster
            # (allow-mlflow-egress, univ-lehavre/cluster#407).
            - name: MLFLOW_TRACKING_URI
              value: http://mlflow.mlflow.svc.cluster.local:5000
          # Accès S3 du lakehouse (creds + endpoint) : injecté par overlay, car
          # la SOURCE diffère selon le profil — banc léger = Secret SeaweedFS
          # (overlays/bench) ; prod = Secret + ConfigMap de l'ObjectBucketClaim
          # Ceph (overlays/prod). Les NOMS de variables (AWS_*/BUCKET_*) sont
          # identiques des deux côtés, donc le code de l'asset est inchangé.
          readinessProbe:
            tcpSocket:
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: citation-dagster
  namespace: dagster
  labels:
    app.kubernetes.io/name: citation-dagster
spec:
  selector:
    app.kubernetes.io/name: citation-dagster
  ports:
    - name: grpc
      port: 4000
      targetPort: 4000
