# Kustomization du banc léger (SeaweedFS).
#
# Agrège les manifestes appliqués par Argo CD sur le banc Lima. Le profil prod
# (Ceph) substituerait s3-access.bench.yaml par objectbucketclaim.prod.yaml.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - code-location.yaml
  - s3-access.bench.yaml
  - workspace-patch.yaml
