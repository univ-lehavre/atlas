# Accès S3 du lakehouse — profil PROD (RGW Ceph, ObjectBucketClaim).
#
# Rook provisionne le bucket et génère DEUX ressources du nom de la claim
# (`pageviews-datalake`), dans le namespace `dagster` :
#   - un Secret `pageviews-datalake` : AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY ;
#   - un ConfigMap `pageviews-datalake` : BUCKET_HOST / BUCKET_PORT / BUCKET_NAME.
# La code-location les consomme via `envFrom` (patch-s3-envfrom.yaml) — mêmes NOMS
# de variables qu'au banc SeaweedFS, donc le code des assets est identique banc ↔
# prod ; seule la source (1 Secret au banc ; Secret + ConfigMap en prod) change,
# d'où l'injection par overlay.
#
# Claim DISTINCTE de `citation-datalake` / `mediawatch-datalake` : la prévision des
# vues a son propre bucket, isolé de la bibliométrie et de la veille médiatique.
#
# StorageClass `rook-ceph-datalake` : la SC bucket exposée par le socle
# (contract/storage-classes.example.yaml → object_store.bucket_storage_class).
apiVersion: objectbucket.io/v1alpha1
kind: ObjectBucketClaim
metadata:
  name: pageviews-datalake
  namespace: dagster
spec:
  generateBucketName: pageviews-datalake
  storageClassName: rook-ceph-datalake
