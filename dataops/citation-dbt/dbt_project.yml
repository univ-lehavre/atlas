# Projet dbt-duckdb du pipeline de citations (étape 3, ADR 0055).
#
# dbt produit les modèles (staging → curated → marts) ; Dagster les orchestre et
# émet le lineage (dagster-dbt). Le backend S3 est configuré dans profiles.yml
# (DuckDB httpfs + secret path-style depuis l'environnement). Étape 3.2 : couches
# staging (vues éphémères de session `:memory:`) → curated (Parquet external S3).
name: "citation"
version: "0.0.0"
config-version: 2

profile: "citation"

# Pas de télémétrie réseau ni d'identifiant machine généré (hermétisme, ADR 0057).
flags:
  send_anonymous_usage_stats: false

model-paths: ["models"]
seed-paths: ["seeds"]
test-paths: ["tests"]
macro-paths: ["macros"]

# Variables injectées par Dagster au run (`dbt build --vars …`). Les défauts sont
# inertes : ils permettent `dbt parse` et le dev local de réussir sans Dagster.
#   - curated_dt  : période de la partition curated (YYYY-MM), remplacée au run.
#   - curated_run : identifiant de run IMMUABLE (rejeu = nouveau run=<id>), de
#     context.run_id côté Dagster. Garantit qu'un rejeu n'écrase jamais en place.
#   - raw_root    : racine du brut (surchargée en test vers le bucket MinIO).
vars:
  curated_dt: "0000-00"
  curated_run: "dev"
  raw_root: "s3://citation/raw"

# Staging = vues vivant le temps de la session DuckDB `:memory:` (pas d'artefact S3
# intermédiaire). Seul `curated` est externalisé en Parquet — le contrat de sortie
# de 3.2 (`location` immuable dt=…/run=…/ posée par modèle, cf. macro curated_location).
models:
  citation:
    staging:
      +materialized: view
    curated:
      +materialized: external
    marts:
      +materialized: external
