version: 2

# Source de la chaîne dbt : le **mart EUNICoast** (Parquet), produit EN AMONT par
# l'asset Python `mart_eunicoast` (ADR 0105). Le mart contient déjà le périmètre
# filtré (works ayant ≥1 auteur EUNICoast, publiés depuis 2016), en projection stricte
# (work_id, publication_year, title, authorships, topics, keywords, fwci, cited_by_count).
# dbt lit ce Parquet colonnaire — plus le brut JSONL.gz (qui faisait OOM au datalake
# complet, drifts L76/L77 ; le filtre EUNICoast vit maintenant dans l'asset, pas dbt).
#
# dbt-duckdb résout `meta.external_location` en un `read_parquet` ; le secret S3 du profil
# (path-style, depuis l'environnement) s'y applique. Centraliser le chemin ici (plutôt
# qu'un `read_parquet` en dur dans chaque modèle) rend le lineage mart→staging visible
# dans le manifest (Marquez, étape 3.5).
#
# `mart_root` est une var (défaut `s3://citation/mart_eunicoast`, surchargée en test →
# bucket MinIO épinglé). Le glob `run=*/**.parquet` couvre les fragments du dernier run.
# Le grain reste le work (le mart NE déroule PAS authorships/topics — c'est le staging
# qui unnest). `work_id` y remplace `id` (déjà renommé par l'asset).
sources:
  - name: citation_raw
    description: "Mart EUNICoast (Parquet) : works du périmètre, filtrés en amont par l'asset."
    tables:
      - name: works
        description: "Œuvres du périmètre EUNICoast : work_id, année, title, authorships, topics, keywords, FWCI, compteurs."
        meta:
          external_location: "read_parquet('{{ var('mart_root') }}/run=*/*.parquet')"
