version: 2

# Tests dbt sur les couches staging. Invariants vrais à TOUTE échelle (pas de test
# « fixture-only » ici : le golden chiffré vit côté pytest). orcid n'a PAS de
# not_null (nullable par nature).
models:
  - name: stg_citation_works
    description: "Œuvres typées depuis le brut (vue de session)."
    columns:
      - name: work_id
        description: "URL OpenAlex de l'œuvre (clé)."
        data_tests: [not_null, unique]

  - name: stg_citation_authors
    description: "Auteurs typés depuis le brut (vue de session)."
    columns:
      - name: author_id
        description: "URL OpenAlex de l'auteur (clé)."
        data_tests: [not_null, unique]

  - name: stg_citation_authorships
    description: "Liens œuvre↔auteur (UNNEST des authorships)."
    columns:
      - name: work_id
        data_tests: [not_null]
      - name: author_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_citation_authors')
                field: author_id

  - name: stg_citation_referenced_works
    description: "Arêtes brutes œuvre→référence (UNNEST des referenced_works)."
    columns:
      - name: citing_work_id
        data_tests: [not_null]
      - name: cited_work_id
        data_tests: [not_null]

  - name: stg_citation_topics
    description: "Liens œuvre↔topic (UNNEST des topics) — provenance complète, sans filtre de score."
    columns:
      - name: work_id
        data_tests: [not_null]
      - name: topic_id
        data_tests: [not_null]

  - name: stg_citation_keywords
    description: "Liens œuvre↔mot-clé (UNNEST des keywords) — provenance complète, sans filtre de score."
    columns:
      - name: work_id
        data_tests: [not_null]
      - name: keyword_id
        data_tests: [not_null]

  - name: stg_citation_author_institutions
    description: "Affiliations (work_id, author_id, ror) — double UNNEST authorships/institutions (ADR 0067)."
    columns:
      - name: work_id
        data_tests: [not_null]
      - name: author_id
        data_tests: [not_null]
      - name: ror
        description: "ROR de l'établissement (URL OpenAlex complète) — jointure au seed EUNICoast."
        data_tests: [not_null]

seeds:
  - name: ref_eunicoast
    description: "Référentiel des 13 ROR EUNICoast (+ alias legacy Antilles) — autorité du filtre périmètre (ADR 0067)."
    columns:
      - name: ror
        description: "ROR (URL complète) d'un établissement membre EUNICoast."
        data_tests: [not_null, unique]
