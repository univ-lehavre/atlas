version: 2

# Tests dbt sur les couches staging. Invariants vrais à TOUTE échelle (pas de test
# « fixture-only » ici : le golden chiffré vit côté pytest). Le staging lit désormais le
# MART EUNICoast (Parquet déjà filtré au périmètre, ADR 0105) : plus de modèle de scope,
# plus de staging authors/referenced_works/author_institutions.
#
# PAS de relationships author_id→auteurs : l'entité `authors` d'OpenAlex n'est PAS un
# sur-ensemble des author_id référencés par les `works` (les authorships sont dérivées de
# l'entité works ; les fusions/redirections OpenAlex ne sont pas réconciliées, ADR 0059).
# Un relationships author_id produirait donc de FAUX échecs à l'échelle réelle (1133+
# orphelins prouvés en prod). On garde not_null (author_id est toujours présent côté works).
models:
  - name: stg_citation_works
    description: "Œuvres typées depuis le mart EUNICoast (vue de session)."
    columns:
      - name: work_id
        description: "URL OpenAlex de l'œuvre (clé)."
        data_tests: [not_null, unique]

  - name: stg_citation_authorships
    description: "Liens œuvre↔auteur (UNNEST des authorships)."
    columns:
      - name: work_id
        data_tests: [not_null]
      - name: author_id
        data_tests: [not_null]

  - name: stg_citation_topics
    description: "Liens œuvre↔topic (UNNEST des topics) — provenance complète, sans filtre de score."
    columns:
      - name: work_id
        data_tests: [not_null]
      - name: topic_id
        data_tests: [not_null]

  - name: stg_citation_keywords
    description: "Liens œuvre↔mot-clé (UNNEST des keywords) — provenance complète, sans filtre de score."
    columns:
      - name: work_id
        data_tests: [not_null]
      - name: keyword_id
        data_tests: [not_null]

seeds:
  - name: ref_eunicoast
    description: "Référentiel des ROR EUNICoast — autorité du filtre périmètre appliqué en amont dans l'asset mart_eunicoast (ADR 0105)."
    columns:
      - name: ror
        description: "ROR (URL complète) d'un établissement membre EUNICoast."
        data_tests: [not_null, unique]
