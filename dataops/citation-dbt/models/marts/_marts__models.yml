version: 2

# Tests dbt du mart (Parquet external relu pour exécuter les tests). Invariants
# vrais à TOUTE échelle ; les valeurs chiffrées golden (co_publications par paire sur les
# fixtures) sont vérifiées côté pytest. La paire (author_a, author_b) est la clé.
#
# PAS de relationships author_id→auteurs (author_a/author_b, marts_researchers,
# marts_researchers_fts) : les author_id dérivent des works (authorships), et l'entité
# `authors` d'OpenAlex n'en est pas un sur-ensemble (fusions/redirections non
# réconciliées, ADR 0059) → faux échecs à l'échelle réelle (cf. _curated__models.yml).
# Un orphelin reste un auteur RÉEL, correctement indexé (index_load/embeddings dérivent
# author_id des works, jamais d'une entité authors) ; le filtrer jetterait de la donnée
# valide. On garde not_null (et unique sur fts).
models:
  - name: marts_collab_pairs
    description: >-
      Co-autorat par paire de chercheurs. Une ligne par paire non orientée
      (author_a < author_b). co_publications = nombre de works co-signés par les deux.
    columns:
      - name: author_a
        description: "Auteur de la paire, id le plus petit (forme canonique)."
        data_tests: [not_null]
      - name: author_b
        description: "Auteur de la paire, id le plus grand (forme canonique)."
        data_tests: [not_null]
      - name: co_publications
        description: "Nombre de publications co-signées par les deux chercheurs (>= 1)."
        data_tests: [not_null]

  - name: marts_researchers
    description: >-
      Sac de labels pondérés par chercheur (mart lexical servi, lot 2). Une ligne
      par (author_id, kind, label_id) ; weight = somme des scores des publications
      contributrices (tf brut), freq = nombre de ces publications. Pas d'IDF/L2
      (corpus-relatif, non reproductible par partition). Le golden chiffré (7 lignes
      sur les fixtures) est vérifié côté pytest.
    columns:
      - name: author_id
        description: "Identifiant d'auteur OpenAlex (clé d'ancrage, ADR 0059)."
        data_tests: [not_null]
      - name: kind
        description: "Type de label : 'topic' ou 'keyword'."
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["topic", "keyword"]
      - name: label_id
        description: "Id du label (topic_id OpenAlex ou keyword_id/URL selon kind)."
        data_tests: [not_null]
      - name: label
        description: "Libellé affichable du label (display_name)."
        data_tests: [not_null]
      - name: weight
        description: "Poids = SUM(score) des publications portant le label (>= seuil)."
        data_tests: [not_null]
      - name: freq
        description: "Nombre de publications du chercheur ayant contribué au label (>= 1)."
        data_tests: [not_null]

  - name: marts_researchers_fts
    description: >-
      Document texte FTS par chercheur (étape 4, index_load). Une ligne par author_id ;
      doc_text = labels de marts_researchers répétés `freq` fois, concaténés dans un
      ordre déterministe (weight desc, kind, label_id). Source de la colonne tsvector
      de l'index Postgres. Hérite des seuils (lot 2) et de la purge d'opposition (lot 5).
    columns:
      - name: author_id
        description: "Identifiant d'auteur OpenAlex (mappé en researcher_id au chargement)."
        data_tests: [not_null, unique]
      - name: doc_text
        description: "Document texte agrégé (labels pondérés par répétition) à indexer en FTS."
        data_tests: [not_null]

  - name: marts_author_profiles
    description: >-
      Profil thématique par auteur (ADR 0067, lot 2) : distribution pondérée sur les
      subfields OpenAlex, restreinte au périmètre EUNICoast. Une ligne par
      (author_id, subfield_id) ; weight = SUM(score), freq = nb de publications. L'une
      des deux représentations thématiques de l'auteur (l'autre = embedding 384).
    columns:
      - name: author_id
        description: "Clé de jointure du profil (jamais une feature du modèle, ADR 0067)."
        data_tests: [not_null]
      - name: subfield_id
        description: "Subfield OpenAlex (axe du vecteur thématique interprétable)."
        data_tests: [not_null]
      - name: weight
        description: "Poids = SUM(score) des publications EUNICoast portant le subfield."
        data_tests: [not_null]
      - name: freq
        description: "Nombre de publications contributrices (>= 1)."
        data_tests: [not_null]
