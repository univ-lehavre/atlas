version: 2

# Tests dbt sur la couche curated (Parquet external relu pour exécuter les tests).
# Invariants vrais à TOUTE échelle, SAUF les deux relationships sciemment omis
# ci-dessous — deux frontières de périmètre de données où un côté `to:` n'est jamais
# garanti sur-ensemble du côté référençant à l'échelle réelle :
#   - `curated_edges.cited_work_id` : referenced_works pointe HORS snapshot (au-delà du
#     périmètre ingéré) → seul `citing_work_id` porte un relationships→curated_works.
#   - `curated_authorships.author_id` (et les marts qui en dérivent) : l'entité `authors`
#     d'OpenAlex n'est PAS un sur-ensemble des author_id référencés par les works
#     (fusions/redirections OpenAlex non réconciliées — merged_ids ne couvre pas les
#     auteurs, ADR 0059) → 1133+ orphelins prouvés en prod. Contrairement à
#     cited_work_id (hors échantillon temporel), ceci persiste même à snapshot complet :
#     l'hypothèse « prod complète ⇒ author_id cohérents » (ADR 0063) est falsifiée par le
#     run. On garde not_null ; le relationships author_id→authors est omis (faux échecs).
models:
  - name: curated_works
    description: "Œuvres canoniques (dédupliquées), Parquet external immuable."
    columns:
      - name: work_id
        data_tests: [not_null, unique]

  - name: curated_authors
    description: "Auteurs canoniques (dédupliqués), Parquet external immuable."
    columns:
      - name: author_id
        data_tests: [not_null, unique]

  - name: curated_authorships
    description: "Liens œuvre↔auteur canoniques."
    columns:
      - name: work_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('curated_works')
                field: work_id
      - name: author_id
        data_tests: [not_null]

  - name: curated_edges
    description: "Arêtes article→référence dédupliquées (couple citant→cité unique)."
    columns:
      - name: citing_work_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('curated_works')
                field: work_id
      - name: cited_work_id
        data_tests: [not_null]

  - name: curated_work_topics
    description: "Provenance topic↔œuvre (grain publication, ADR 0059). Socle de la purge chirurgicale."
    columns:
      - name: work_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('curated_works')
                field: work_id
      - name: topic_id
        data_tests: [not_null]

  - name: curated_work_keywords
    description: "Provenance mot-clé↔œuvre (grain publication, ADR 0059). Socle de la purge chirurgicale."
    columns:
      - name: work_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('curated_works')
                field: work_id
      - name: keyword_id
        data_tests: [not_null]

  - name: curated_eunicoast_works
    description: "Périmètre EUNICoast : works avec ≥1 auteur affilié EUNICoast ∩ <10 ans, porte le FWCI (ADR 0067)."
    columns:
      - name: work_id
        data_tests: [not_null, unique]
      - name: publication_year
        data_tests: [not_null]

  - name: curated_pair_uplift_labels
    description: >-
      Labels d'uplift FWCI observé par paire (ADR 0067, lot 3) — cible d'entraînement.
      Une ligne par (author_a, author_b) ayant ≥2 co-publications EUNICoast avec
      baseline solo ANTÉRIEURE des deux côtés (anti-fuite temporelle). uplift =
      copub_fwci − moyenne des baselines solo.
    columns:
      - name: author_a
        data_tests: [not_null]
      - name: author_b
        data_tests: [not_null]
      - name: uplift
        description: "Uplift observé (peut être négatif : collaboration moins impactante que le solo)."
        data_tests: [not_null]
