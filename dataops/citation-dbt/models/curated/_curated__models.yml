version: 2

# Tests dbt sur la couche curated (Parquet external relu pour exécuter les tests).
# Invariants vrais à TOUTE échelle, SAUF le relationships author_id sciemment omis :
# l'entité `authors` d'OpenAlex n'est PAS un sur-ensemble des author_id référencés par les
# works (fusions/redirections OpenAlex non réconciliées — merged_ids ne couvre pas les
# auteurs, ADR 0059) → 1133+ orphelins prouvés en prod. On garde not_null ; le
# relationships author_id→authors est omis (faux échecs). Le volet citations (curated_edges)
# a été retiré : le mart EUNICoast ne porte plus referenced_works (ADR 0105).
models:
  - name: curated_works
    description: "Œuvres canoniques (dédupliquées), Parquet external immuable."
    columns:
      - name: work_id
        data_tests: [not_null, unique]

  - name: curated_authorships
    description: "Liens œuvre↔auteur canoniques."
    columns:
      - name: work_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('curated_works')
                field: work_id
      - name: author_id
        data_tests: [not_null]

  - name: curated_work_topics
    description: "Provenance topic↔œuvre (grain publication, ADR 0059). Socle de la purge chirurgicale."
    columns:
      - name: work_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('curated_works')
                field: work_id
      - name: topic_id
        data_tests: [not_null]

  - name: curated_work_keywords
    description: "Provenance mot-clé↔œuvre (grain publication, ADR 0059). Socle de la purge chirurgicale."
    columns:
      - name: work_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('curated_works')
                field: work_id
      - name: keyword_id
        data_tests: [not_null]

  - name: curated_eunicoast_works
    description: "Périmètre EUNICoast (projection de curated_works), porte le FWCI (ADR 0105)."
    columns:
      - name: work_id
        data_tests: [not_null, unique]
      - name: publication_year
        data_tests: [not_null]

  - name: curated_pair_uplift_labels
    description: >-
      Labels d'uplift FWCI observé par paire (ADR 0067, lot 3) — cible d'entraînement.
      Une ligne par (author_a, author_b) ayant ≥2 co-publications EUNICoast avec
      baseline solo ANTÉRIEURE des deux côtés (anti-fuite temporelle). uplift =
      copub_fwci − moyenne des baselines solo.
    columns:
      - name: author_a
        data_tests: [not_null]
      - name: author_b
        data_tests: [not_null]
      - name: uplift
        description: "Uplift observé (peut être négatif : collaboration moins impactante que le solo)."
        data_tests: [not_null]
