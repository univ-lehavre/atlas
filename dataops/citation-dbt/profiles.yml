# Profil dbt-duckdb : backend DuckDB configuré pour le lakehouse S3 (étape 3.1).
#
# DuckDB lit le brut JSONL.gz et écrit le Parquet sur le stockage objet en
# path-style (SeaweedFS au banc, RGW Ceph en prod). Les identifiants viennent de
# l'ENVIRONNEMENT (jamais en dur) — mêmes variables que le code Python
# (resources.duckdb_s3_config_from_env) : AWS_ACCESS_KEY_ID/SECRET, BUCKET_HOST/PORT.
#
# USE_SSL : http au banc/MinIO (port 8333/9000), https en prod si l'endpoint l'est.
# Ici on cible le banc (use_ssl false) ; la prod surchargera via DBT_S3_USE_SSL.
#
# ENDPOINT : le httpfs de DuckDB (c-ares) BUTE sur la forme QUASI-FQDN que le ConfigMap
# de l'OBC Rook expose en prod (`rook-ceph-rgw-datalake.rook-ceph.svc`) — avec un search
# domain externe (ndots:5), la résolution du FQDN complet timeoute (piège FQDN prod,
# cf. cluster#458 ; parité `resources._short_incluster_host`). On retire donc le suffixe
# de cluster (`.svc.cluster.local` / `.svc`) → nom COURT ns-qualifié qui résout fiablement.
# Inoffensif au banc (SeaweedFS `seaweedfs` n'a pas ces suffixes).
citation:
  target: dev
  outputs:
    dev:
      type: duckdb
      path: ":memory:"
      # Scalabilité au datalake complet (691 GiB) : DuckDB tournait en `:memory:` SANS
      # borne → un modèle curated qui matérialise en lisant tout le brut (ex. curated_edges :
      # DISTINCT + ORDER BY sur ~8M arêtes) faisait OOM-killer le pod de run. On BORNE la
      # RAM et on autorise le SPILLING sur disque : au-delà de memory_limit, DuckDB déborde
      # ses tris/jointures dans temp_directory au lieu de saturer. memory_limit dérivable de
      # l'env (ADR 0023 : le banc léger baisse via DBT_DUCKDB_MEMORY_LIMIT ; défaut prod
      # généreux, nœuds à ~235 GiB libres). temp_directory = emptyDir monté sur le pod de run
      # (cf. definitions._SPILL_MOUNT). threads=60 exploite les 80 cœurs du nœud (le pod de run
      # RÉSERVE 16→60 cœurs via _RUN_RESOURCES). memory_limit (24GB) < limit pod (28Gi) → DuckDB
      # spille sur disque AVANT que le cgroup ne tue le pod. preserve_insertion_order=false :
      # moins de buffering. Tout ce triplet dérivable de l'env (banc léger baisse).
      settings:
        memory_limit: "{{ env_var('DBT_DUCKDB_MEMORY_LIMIT', '64GB') }}"
        temp_directory: "{{ env_var('DBT_DUCKDB_TEMP_DIR', '/tmp/duckdb-spill') }}"
        threads: "{{ env_var('DBT_DUCKDB_THREADS', '60') }}"
        preserve_insertion_order: false
      extensions:
        - httpfs
      secrets:
        - type: s3
          key_id: "{{ env_var('AWS_ACCESS_KEY_ID') }}"
          secret: "{{ env_var('AWS_SECRET_ACCESS_KEY') }}"
          region: us-east-1
          endpoint: "{{ env_var('BUCKET_HOST') | replace('.svc.cluster.local', '') | replace('.svc', '') }}:{{ env_var('BUCKET_PORT', '8333') }}"
          url_style: path
          use_ssl: "{{ env_var('DBT_S3_USE_SSL', 'false') }}"
