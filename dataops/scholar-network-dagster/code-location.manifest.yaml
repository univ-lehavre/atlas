# Manifeste de déclaration montant (atlas → cluster) — ADR cluster 0094.
#
# atlas DÉCLARE ce que la code-location `scholar-network` apporte et consomme ; cluster LIT
# ce fichier pour valider les dépendances + la capacité AVANT d'instancier l'Application
# Argo CD, et pour ordonner le déploiement. atlas ne duplique pas le contrat cluster : il
# déclare ce qu'il consomme + contre quelle `contractVersion`, et cluster valide. Toute
# dérive (version inconnue, dépendance absente) échoue bruyamment.
#
# `revision` est le SIGNAL CANONIQUE d'évolution : un nouveau SHA poussé = nouvelle version
# à réconcilier. Le tag lisible `registry:80/scholar-network-dagster:<revision>` trace le
# lien commit→image, mais le DÉPLOIEMENT se fait PAR DIGEST `@sha256` (ancre d'immuabilité,
# jamais par tag mutable — ADR cluster 0095 §2 + cluster 0006, ADR atlas 0075). cluster build
# à ce `revision`, lit le digest produit et l'injecte dans l'overlay (write-back @sha256) ; le
# tag ne sert qu'à la traçabilité humaine, l'immuabilité tient au digest.

codeLocation: scholar-network
ready: false # SQUELETTE (lot 1) : structure conforme, chargeable, mais aucun asset métier encore
revision: "0000000" # placeholder ; renseigné (SHA git court de main) quand le pipeline sera livrable
contractVersion: "1.0" # contract_version ciblé (cluster/contract/endpoints.example.yaml)

# Besoins déclarés → cluster valide la capacité AVANT de déployer.
# Ces valeurs concernent les pods de RUN (K8sRunLauncher) qui exécutent le pipeline,
# PAS le serveur gRPC de la code-location (dont les requests, plus modestes — cpu 100m /
# mem 384Mi, base/code-location.yaml — ne portent pas le travail).
# Dimensionnement INITIAL et VOLONTAIREMENT modeste (squelette) : le brut pré-filtré et la
# semi-jointure des deux passes (lots 2–4) débordent DuckDB sur disque (temp_directory) au
# lieu d'OOM ; le `disk` est un scratch BLOC (PVC RBD) pour ce spill RÉSIDUEL — il NE stocke
# PAS le datalake (qui vit en S3 objet, cf. buckets). Le dimensionnement RÉEL sera mesuré et
# ajusté aux lots 2–4 (plan 2026-07-13-scholar-network §5), pas figé d'avance.
resources:
  cpu: 500m
  memory: 4Gi # tient un lot du brut pré-filtré + la table chercheurs en mémoire → spill minimal
  disk: 50Gi # scratch bloc (PVC RBD) : spill DuckDB résiduel, pas le datalake

dependsOn:
  # Dépendances INTER-applicatives (autres code-locations gRPC). AUCUNE :
  # scholar-network lit le snapshot OpenAlex (ingestion propre), pas les marts d'une autre
  # code-location ; il est disjoint de `citation` (ADR 0103, autonomie ADR 0055).
  codeLocations: []
  database: [pgvector] # base logique CNPG (profils chercheurs + extension vector)
  secrets: [pgvector-pg-auth] # secret dérivé (ns dagster) pour atteindre Postgres cross-ns
  # Stockage OBJET (OBC S3 RGW Ceph), distinct d'un volume bloc : brut pré-filtré caché
  # (mode full) + périmètre final des works (immuables dt=/run=, donc cumulatifs).
  buckets:
    - name: scholar-network-datalake # convention <service>-<usage> (cf. citation-datalake)
      size: 3Ti # brut pré-filtré projeté + accumulation des partitions immuables
      storageClass: rook-ceph-datalake
  # Migration de schéma métier FOURNIE par atlas (cluster l'applique en hook PreSync).
  # AUCUNE au squelette : la migration pgvector des profils chercheurs viendra au lot 5.
  migrations: []
