# Prod : l'ObjectBucketClaim génère un Secret (AWS_*) ET un ConfigMap (BUCKET_*)
# du nom de la claim. La code-location branche les deux.
#
# DAGSTER_CURRENT_IMAGE est l'image que le K8sRunLauncher donne aux pods de RUN
# (run workers). kustomize `images:` ne réécrit QUE le champ `image:` du
# conteneur, pas cette valeur d'env — on l'aligne ici explicitement sur le tag
# de prod, sinon le serveur gRPC tournerait sur le bon tag mais les runs sur
# `:dev` (code divergent). Tenir ce tag synchronisé avec `images[].newTag` de
# la kustomization.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mediawatch-dagster
  namespace: dagster
spec:
  template:
    spec:
      containers:
        - name: grpc
          env:
            - name: DAGSTER_CURRENT_IMAGE
              value: registry:80/mediawatch-dagster:0.0.0 # exemple ; = images[].newTag
            # Prod (RGW Ceph) : endpoint en TLS → dbt-duckdb doit ouvrir le S3 en https.
            - name: DBT_S3_USE_SSL
              value: "true"
            # Prod : la classification lit le référentiel ROR INGÉRÉ (autonome), pas le
            # seed d'exemple (ADR 0065). Relayé en var dbt ref_source par dbt.py.
            - name: MEDIAWATCH_REF_SOURCE
              value: ingested
          envFrom:
            - secretRef:
                name: mediawatch-datalake
            - configMapRef:
                name: mediawatch-datalake
