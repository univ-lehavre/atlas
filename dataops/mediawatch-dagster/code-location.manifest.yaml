# Manifeste de déclaration montant (atlas → cluster) — ADR cluster 0094.
#
# atlas DÉCLARE ce que la code-location `mediawatch` apporte et consomme ; cluster LIT ce
# fichier pour valider les dépendances + la capacité AVANT d'instancier l'Application Argo
# CD, et pour ordonner le déploiement. Ce manifeste REMPLACE la copie figée du contrat
# cluster (cause racine de l'audit atlas#499 / cluster#499) : atlas ne duplique plus le
# contrat, il déclare ce qu'il consomme + contre quelle `contractVersion`, et cluster
# valide. Toute dérive (version inconnue, dépendance absente) échoue bruyamment.
#
# `revision` est le SIGNAL CANONIQUE d'évolution : un nouveau SHA poussé = nouvelle version
# à réconcilier ; l'image registry:80/mediawatch-dagster:<revision> en DÉRIVE (même tag).

codeLocation: mediawatch
ready: true # code mergé sur main, testé (102 tests, 96 % couv), validate.sh OK (bench + prod)
revision: fe6b0793 # SHA git court de main ; l'image en dérive (même tag)
contractVersion: "1.0" # contract_version ciblé (cluster/contract/endpoints.example.yaml)

# Besoins déclarés → cluster valide la capacité AVANT de déployer.
# Ces valeurs concernent les pods de RUN (K8sRunLauncher) qui exécutent les
# transformations, PAS le serveur gRPC de la code-location (dont les requests, plus
# modestes — cpu 100m / mem 384Mi, base/code-location.yaml — ne portent pas le travail).
# Volumétrie modeste vs citation : mediawatch matérialise des fichiers GKG quotidiens
# (pull HTTP incrémental, ADR 0064) avec dbt-duckdb, pas le snapshot OpenAlex complet —
# d'où des ressources plus basses. Le `disk` est un scratch BLOC (PVC RBD) pour le spill
# RÉSIDUEL de DuckDB (temp_directory) ; il NE stocke PAS le datalake (qui vit en S3 objet,
# cf. buckets). Valeurs = défaut raisonnable, ajustables par instance (ADR 0031).
resources:
  cpu: 500m
  memory: 2Gi # transformations dbt-duckdb sur fenêtres GKG quotidiennes
  disk: 20Gi # scratch bloc (PVC RBD) : spill DuckDB résiduel, pas le datalake

dependsOn:
  # Dépendances INTER-applicatives (autres code-locations gRPC). AUCUNE : mediawatch
  # lit le flux GKG de GDELT (pull HTTP propre, ADR 0064), pas les marts de `citation` ;
  # le projet `mediawatch-dbt` n'est PAS une dépendance, il est EMBARQUÉ dans l'image
  # (COPY au build + manifest dbt généré par `dbt parse`, Dockerfile) → couvert par
  # `revision`, rien à déclarer ici.
  codeLocations: []
  # Périmètre v1 « articles seulement » (ADR 0064) : aucune base applicative ni index
  # vectoriel (contrairement à citation/pgvector) → pas de database, pas de secret PG.
  database: []
  secrets: []
  # Stockage OBJET (OBC S3 RGW Ceph), distinct d'un volume bloc : raw GKG + curated +
  # marts servis (immuables dt=/run=, donc cumulatifs).
  buckets:
    - name: mediawatch-datalake # convention <service>-<usage> (cf. citation-datalake, mlflow-artifacts)
      size: 500Gi # flux GKG quotidien + accumulation des partitions immuables (revoir à l'usage)
      storageClass: rook-ceph-datalake
  # Aucune migration de schéma : mediawatch n'a pas de base SQL applicative (v1 articles).
  migrations: []
